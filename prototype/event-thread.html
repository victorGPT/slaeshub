<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub — 事件详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .state-btn { transition: all 0.15s ease; }
    .state-btn.active { transform: scale(1.02); }
    .timeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .timeline-line { width: 2px; background: #2E3440; flex-shrink: 0; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- A. Top Nav with Back -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <a onclick="history.back()" class="w-8 h-8 flex items-center justify-center text-[#EAECEF] cursor-pointer">
      <i class="fa-solid fa-chevron-left text-[16px]"></i>
    </a>
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">事件详情</h1>
    <div class="w-8"></div>
  </div>

  <!-- Content -->
  <div id="page-content" class="px-4 pb-8"></div>

</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;

  // Parse event ID from URL
  var params = new URLSearchParams(window.location.search);
  var eventId = params.get('id');
  var evt = eventId ? D.events.find(function(e) { return e.id === eventId; }) : null;

  if (!evt) {
    document.getElementById('page-content').innerHTML =
      '<div class="flex flex-col items-center justify-center py-20 text-[#848E9C]">'
      + '<i class="fa-solid fa-circle-xmark text-[40px] mb-3 text-[#474D57]"></i>'
      + '<span class="text-[14px]">未找到事件</span>'
      + '</div>';
    return;
  }

  var client = D.clientsById[evt.client_uid] || null;
  var isRisk = (evt.type === '风控触发');

  // Helper: get status label from client trend data
  function getStatusLabel(c) {
    if (!c) return { label: '未知', arrow: '' };
    var rate = c.adjustedTrendRate;
    var r2 = c.rSquared;
    if (r2 < 0.5) return { label: '波动不定', arrow: '↕' };
    if (rate <= -0.04) return { label: '快速流失', arrow: '↘' };
    if (rate <= -0.02) return { label: '缓慢流失', arrow: '↘' };
    if (rate >= 0.04) return { label: '快速增长', arrow: '↗' };
    if (rate >= 0.02) return { label: '缓慢增长', arrow: '↗' };
    return { label: '稳定', arrow: '→' };
  }

  // Load BD tags from localStorage
  var tagKey = client ? ('bd_tags_' + client.uid) : '';
  var bdTags = [];
  try {
    bdTags = JSON.parse(localStorage.getItem(tagKey) || '["偏好短线","英文沟通"]');
  } catch(e) {
    bdTags = ['偏好短线', '英文沟通'];
  }

  // Load task state from sessionStorage
  var stateKey = 'task_state_' + evt.id;
  var currentState = sessionStorage.getItem(stateKey) || evt.task_state || '待处理';

  // Urgency dot emoji
  var urgencyDot = { critical: '🔴', warning: '🟡', info: '🟢' };
  var dot = urgencyDot[evt.urgency] || '⚪';

  var sl = getStatusLabel(client);
  var depositDisplay = client ? client.depositDisplay : '—';
  var welfareRemaining = client && client.welfare ? client.welfare.remainingDisplay : '—';

  // ─── Build HTML ───

  var html = '';

  // ═══ Block A: Event Header ═══
  html += '<div class="pt-4 pb-3">';
  html +=   '<div class="flex items-center gap-2 mb-1">';
  html +=     '<span class="text-[16px]">' + dot + '</span>';
  html +=     '<span class="text-[15px] font-semibold" style="color:' + evt.color + '">' + evt.type + (evt.sub_type ? ' · ' + evt.sub_type : '') + '</span>';
  html +=   '</div>';
  html +=   '<div class="text-[13px] text-[#848E9C] mb-3">';
  html +=     evt.client_name + ' · ' + evt.time_ago;
  html +=   '</div>';
  if (evt.amount_display) {
    html += '<div class="text-[28px] font-bold leading-tight" style="color:' + evt.color + '">';
    html +=   evt.amount_display;
    html += '</div>';
  }
  html += '</div>';

  // Divider
  html += '<div class="border-t border-[#2E3440]"></div>';

  // ═══ Block B: Client Summary ═══
  html += '<div class="bg-[#1E2329] rounded-xl border border-[#2E3440] p-4 mt-4">';
  html +=   '<div class="flex items-center justify-between mb-2">';
  html +=     '<div class="text-[14px] text-[#EAECEF]">';
  html +=       '资沉 <span class="font-semibold text-[#F0B90B]">' + depositDisplay + '</span>';
  html +=       ' · <span class="text-[#848E9C]">' + sl.arrow + sl.label + '</span>';
  html +=     '</div>';
  html +=   '</div>';
  html +=   '<div class="text-[13px] text-[#848E9C] mb-1.5">';
  html +=     'BD标签: ' + bdTags.map(function(t) {
                return '<span class="text-[#EAECEF]">' + t + '</span>';
              }).join(' · ');
  html +=   '</div>';
  html +=   '<div class="text-[13px] text-[#848E9C] mb-2.5">上次跟进: 3天前</div>';
  html +=   '<a href="client-detail.html?uid=' + (client ? client.uid : '') + '" class="text-[13px] text-[#4DA6FF] font-medium">';
  html +=     '→ 查看完整资料';
  html +=   '</a>';
  html += '</div>';

  // ═══ Block C: Action Area (3-in-1) ═══
  html += '<div class="bg-[#1E2329] rounded-xl border border-[#2E3440] mt-3 overflow-hidden">';

  // C1: Action suggestion (always shown)
  html +=   '<div class="p-4 border-b border-[#2E3440]">';
  html +=     '<div class="text-[13px] text-[#848E9C] mb-1">行动建议</div>';
  html +=     '<div class="text-[14px] text-[#EAECEF] font-medium">→ ' + evt.action + '</div>';
  html +=   '</div>';

  if (isRisk) {
    // C2-risk: Copy info block for risk_control events
    html += '<div class="p-4">';
    html +=   '<div class="text-[13px] text-[#848E9C] mb-2">一键复制</div>';
    html +=   '<div class="text-[13px] text-[#EAECEF] space-y-1 mb-3 font-mono">';
    html +=     '<div>客户UID: ' + (client ? client.uid : evt.client_uid) + '</div>';
    html +=     '<div>风控类型: ' + (evt.risk_type || evt.sub_type || '—') + '</div>';
    html +=     '<div>触发时间: ' + evt.time_ago + '</div>';
    html +=     '<div>客户资沉: ' + depositDisplay + '</div>';
    html +=   '</div>';
    html +=   '<button onclick="copyRiskInfo()" id="btn-copy-risk" class="w-full py-2.5 rounded-lg text-[13px] font-semibold bg-[#F6465D]/15 text-[#F6465D] border border-[#F6465D]/30 active:opacity-70">';
    html +=     '复制信息发给研发';
    html +=   '</button>';
    html += '</div>';
  } else {
    // C2: Script template
    if (evt.script) {
      html += '<div class="p-4 border-b border-[#2E3440]">';
      html +=   '<div class="text-[13px] text-[#848E9C] mb-1">话术模板</div>';
      html +=   '<div class="text-[13px] text-[#EAECEF] leading-relaxed mb-3">"' + evt.script + '"</div>';
      html +=   '<button onclick="copyScript()" id="btn-copy-script" class="w-full py-2.5 rounded-lg text-[13px] font-semibold bg-[#F0B90B]/15 text-[#F0B90B] border border-[#F0B90B]/30 active:opacity-70">';
      html +=     '复制话术';
      html +=   '</button>';
      html += '</div>';
    }

    // C3: Welfare
    html += '<div class="p-4">';
    html +=   '<div class="flex items-center justify-between mb-3">';
    html +=     '<div class="text-[13px] text-[#848E9C]">福利金</div>';
    html +=     '<div class="text-[14px] font-semibold text-[#0ECB81]">剩余 ' + welfareRemaining + '</div>';
    html +=   '</div>';
    html +=   '<button class="w-full py-2.5 rounded-lg text-[13px] font-semibold bg-[#0ECB81]/15 text-[#0ECB81] border border-[#0ECB81]/30 active:opacity-70">';
    html +=     '发放福利金';
    html +=   '</button>';
    html += '</div>';
  }

  html += '</div>';

  // ═══ Block D: Task State ═══
  html += '<div class="mt-4">';
  html +=   '<div class="text-[13px] text-[#848E9C] mb-2">任务状态</div>';
  html +=   '<div class="flex gap-2" id="state-buttons">';

  var states = [
    { label: '待处理', color: '#F6465D' },
    { label: '跟进中', color: '#4DA6FF' },
    { label: '已完成', color: '#0ECB81' },
    { label: '已忽略', color: '#848E9C' }
  ];

  states.forEach(function(s) {
    var isActive = (s.label === currentState);
    if (isActive) {
      html += '<button onclick="setTaskState(this, \'' + s.label + '\')" '
        + 'class="state-btn active flex-1 py-2.5 rounded-lg text-[13px] font-semibold border" '
        + 'style="background:' + hexToRgba(s.color, 0.15) + ';color:' + s.color + ';border-color:' + hexToRgba(s.color, 0.3) + '">'
        + s.label + '</button>';
    } else {
      html += '<button onclick="setTaskState(this, \'' + s.label + '\')" '
        + 'class="state-btn flex-1 py-2.5 rounded-lg text-[13px] bg-[#2B3139] text-[#848E9C] border border-transparent">'
        + s.label + '</button>';
    }
  });

  html +=   '</div>';
  html += '</div>';

  // ═══ Block E: Follow-up Records ═══
  var followups = getFollowups(evt.type);

  html += '<div class="mt-4 mb-4">';
  html +=   '<div class="flex items-center justify-between mb-3">';
  html +=     '<span class="text-[14px] font-semibold text-[#EAECEF]">跟进记录</span>';
  html +=     '<span class="text-[13px] text-[#4DA6FF] cursor-pointer">+ 添加记录</span>';
  html +=   '</div>';

  // Timeline
  followups.forEach(function(f, i) {
    var isLast = (i === followups.length - 1);
    html += '<div class="flex gap-3">';
    html +=   '<div class="flex flex-col items-center">';
    html +=     '<div class="timeline-dot" style="background:' + f.dotColor + '"></div>';
    if (!isLast) {
      html +=   '<div class="timeline-line flex-1 my-1"></div>';
    }
    html +=   '</div>';
    html +=   '<div class="pb-4 min-w-0 flex-1">';
    html +=     '<div class="flex items-center justify-between mb-0.5">';
    html +=       '<span class="text-[13px] font-medium text-[#EAECEF]">' + f.title + '</span>';
    html +=       '<span class="text-[11px] text-[#474D57]">' + f.time + '</span>';
    html +=     '</div>';
    html +=     '<div class="text-[12px] text-[#848E9C] leading-relaxed">' + f.detail + '</div>';
    html +=   '</div>';
    html += '</div>';
  });

  html += '</div>';

  document.getElementById('page-content').innerHTML = html;

  // ─── Helper: hex to rgba ───
  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // ─── Follow-up records by event type ───
  function getFollowups(type) {
    if (type === '风控触发') {
      return [
        { title: '联系研发排查', time: '03-30 14:20', detail: '已将客户信息发送至研发团队，等待排查结果。', dotColor: '#F6465D' },
        { title: '研发回复', time: '03-30 16:45', detail: '风控规则误触发，已提交解除申请。', dotColor: '#4DA6FF' },
        { title: '通知客户', time: '03-31 09:10', detail: '已电话告知客户限制将在24小时内解除，客户表示理解。', dotColor: '#0ECB81' }
      ];
    }
    if (type === '大额出金') {
      return [
        { title: '电话回访', time: '03-29 10:30', detail: '尝试联系客户了解出金原因，未接听。', dotColor: '#F6465D' },
        { title: '电话回访', time: '03-30 14:00', detail: '客户接听，表示资金临时周转需要，计划月底回流。', dotColor: '#4DA6FF' },
        { title: '跟进确认', time: '03-31 09:00', detail: '发送权益说明，提醒续存优惠活动。', dotColor: '#0ECB81' }
      ];
    }
    if (type === '大额入金') {
      return [
        { title: '推荐产品', time: '03-29 11:00', detail: '向客户推荐理财产品及合约交易方案。', dotColor: '#0ECB81' },
        { title: '客户反馈', time: '03-30 15:30', detail: '客户对理财产品感兴趣，要求发送详细资料。', dotColor: '#4DA6FF' },
        { title: '发送资料', time: '03-31 08:30', detail: '已发送产品说明书及历史收益数据。', dotColor: '#F0B90B' }
      ];
    }
    // 理财到期 or other
    return [
      { title: '到期提醒', time: '03-29 09:00', detail: '系统自动发送理财到期提醒通知。', dotColor: '#F0B90B' },
      { title: '电话回访', time: '03-30 10:15', detail: '联系客户确认续存意向，客户考虑中。', dotColor: '#4DA6FF' },
      { title: '推荐续存', time: '03-31 09:30', detail: '推送续存权益方案，年化提升至 X%。', dotColor: '#0ECB81' }
    ];
  }

  // ─── Global functions ───

  // Copy script to clipboard
  window.copyScript = function() {
    var text = evt.script;
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('btn-copy-script');
      btn.textContent = '已复制 ✓';
      setTimeout(function() { btn.textContent = '复制话术'; }, 1500);
    });
  };

  // Copy risk info to clipboard
  window.copyRiskInfo = function() {
    var uid = client ? client.uid : evt.client_uid;
    var text = '客户 UID: ' + uid
      + '\n风控类型: ' + (evt.risk_type || evt.sub_type || '—')
      + '\n触发时间: ' + evt.time_ago
      + '\n客户资沉: ' + depositDisplay
      + '\n请协助排查，谢谢。';
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('btn-copy-risk');
      btn.textContent = '已复制 ✓';
      setTimeout(function() { btn.textContent = '复制信息发给研发'; }, 1500);
    });
  };

  // Task state toggle
  var stateColors = {
    '待处理': '#F6465D',
    '跟进中': '#4DA6FF',
    '已完成': '#0ECB81',
    '已忽略': '#848E9C'
  };

  window.setTaskState = function(el, state) {
    // Reset all buttons
    document.querySelectorAll('#state-buttons .state-btn').forEach(function(btn) {
      btn.className = 'state-btn flex-1 py-2.5 rounded-lg text-[13px] bg-[#2B3139] text-[#848E9C] border border-transparent';
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
    });
    // Activate clicked
    var c = stateColors[state];
    el.style.background = hexToRgba(c, 0.15);
    el.style.color = c;
    el.style.borderColor = hexToRgba(c, 0.3);
    el.className = 'state-btn active flex-1 py-2.5 rounded-lg text-[13px] font-semibold border';
    // Persist to sessionStorage
    sessionStorage.setItem(stateKey, state);
  };

})();
</script>

</body>
</html>
