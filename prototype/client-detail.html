<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>客户详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .tab-btn { transition: color 0.15s; }
    .tab-btn.active { color: #F0B90B; }
    .tab-btn.active .tab-line { background: #F0B90B; }
    .tab-line { height: 2px; background: transparent; transition: background 0.15s; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div id="sticky-top" class="sticky top-0 z-20 bg-[#0B0E11]">
    <!-- Nav bar -->
    <div class="h-[44px] border-b border-[#2E3440] flex items-center justify-between px-4">
      <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center">
        <i class="fa-solid fa-chevron-left text-[16px] text-[#EAECEF]"></i>
      </button>
      <h1 class="text-[16px] font-bold text-[#EAECEF]">客户详情</h1>
      <div class="w-8"></div>
    </div>

    <!-- Unified Header Card -->
    <div class="mx-3 mt-2 mb-2 bg-[#1E2329] rounded-2xl border border-[#2E3440] overflow-hidden">
      <!-- Row 1: Identity -->
      <div class="flex items-center gap-3 px-4 pt-3 pb-2">
        <button id="fav-btn" onclick="toggleFav()" class="w-8 h-8 flex items-center justify-center rounded-full bg-[#2B3139] flex-shrink-0 active:scale-95 transition-transform">
          <i id="fav-icon" class="fa-regular fa-star text-[14px] text-[#474D57]"></i>
        </button>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <button id="uid-copy-btn" onclick="copyUid()" class="flex items-center gap-1.5 active:opacity-70">
              <span id="client-uid" class="text-[16px] font-bold text-[#EAECEF] tabular-nums tracking-wide"></span>
              <i class="fa-regular fa-copy text-[10px] text-[#474D57]"></i>
            </button>
            <!-- status badge removed: no threshold classification without real data -->
          </div>
        </div>
        <span id="from-badge" class="text-[9px] px-1.5 py-[1px] rounded hidden flex-shrink-0"></span>
      </div>

      <!-- Row 2: Deposit Hero + 8w Delta -->
      <div class="px-4 pb-2">
        <div class="flex items-end gap-3">
          <!-- Current deposit -->
          <div>
            <div class="text-[10px] text-[#474D57] mb-0.5">7日资沉</div>
            <span id="deposit-hero" class="text-[28px] font-bold text-[#EAECEF] tracking-tight leading-none"></span>
          </div>
          <!-- 8w comparison: delta badge -->
          <div id="deposit-delta" class="mb-1 flex items-center gap-1">
            <!-- filled by JS: arrow icon + percentage + absolute change -->
          </div>
        </div>
        <!-- 8w avg small reference -->
        <div class="mt-1 text-[10px] text-[#474D57]">
          8周均 <span id="deposit-avg" class="tabular-nums"></span>
        </div>
      </div>

      <!-- Row 3: Memo -->
      <div class="px-4 pb-3">
        <input id="memo-input" type="text" class="w-full bg-[#2B3139] text-[#EAECEF] text-[11px] rounded-lg px-3 py-1.5 border border-[#2E3440] outline-none placeholder-[#474D57]" placeholder="备忘..." />
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="flex border-b border-[#2E3440]">
      <button class="tab-btn active flex-1 py-2 text-center text-[13px] font-medium text-[#848E9C]" data-tab="events">
        <span>事件</span>
        <div class="tab-line mt-1 mx-auto w-10 rounded-full"></div>
      </button>
      <button class="tab-btn flex-1 py-2 text-center text-[13px] font-medium text-[#848E9C]" data-tab="assets">
        <span>资产</span>
        <div class="tab-line mt-1 mx-auto w-10 rounded-full"></div>
      </button>
      <button class="tab-btn flex-1 py-2 text-center text-[13px] font-medium text-[#848E9C]" data-tab="profile">
        <span>档案</span>
        <div class="tab-line mt-1 mx-auto w-10 rounded-full"></div>
      </button>
    </div>
  </div>

  <!-- Tab Content -->
  <div id="tab-events" class="tab-content pb-[120px]"></div>
  <div id="tab-assets" class="tab-content pb-[120px] hidden"></div>
  <div id="tab-profile" class="tab-content pb-[120px] hidden"></div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var fromParam = params.get('from');
  var c = uid ? D.clientsById[uid] : null;

  if (!c) {
    document.getElementById('tab-events').innerHTML =
      '<div class="mx-4 mt-8 bg-[#1E2329] rounded-xl border border-[#2E3440] p-6 text-center text-[#848E9C]">未找到客户数据</div>';
    return;
  }

  function esc(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // --- Seeded random ---
  function seededRandom(seed) {
    var x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  // --- Flow data ---
  var flowWeeks = [];
  var seedBase = parseInt(c.uid, 10) || 1;
  for (var i = 1; i < c.weeks.length; i++) {
    var delta = c.weeks[i] - c.weeks[i - 1];
    var r = seededRandom(seedBase + i);
    var inflow, outflow;
    if (delta > 0) {
      inflow = delta * (1.2 + r * 0.6);
      outflow = inflow - delta;
    } else if (delta < 0) {
      outflow = Math.abs(delta) * (1.2 + r * 0.6);
      inflow = outflow - Math.abs(delta);
    } else {
      inflow = c.fMean * (0.01 + r * 0.04);
      outflow = inflow * (0.95 + seededRandom(seedBase + i + 100) * 0.1);
    }
    flowWeeks.push({ inflow: Math.round(inflow), outflow: Math.round(outflow) });
  }

  var thisWeekFlow = flowWeeks[flowWeeks.length - 1];
  var baselineWeeks = flowWeeks.slice(0, -1); // all except last (this week)
  var avgInflow = Math.round(baselineWeeks.reduce(function(s, w) { return s + w.inflow; }, 0) / baselineWeeks.length);
  var avgOutflow = Math.round(baselineWeeks.reduce(function(s, w) { return s + w.outflow; }, 0) / baselineWeeks.length);

  function fmtFlow(v) {
    var abs = Math.abs(v);
    if (abs >= 10000) return '$' + Math.round(abs / 10000) + '万';
    if (abs >= 1000) return '$' + (abs / 1000).toFixed(1) + '千';
    return '$' + Math.round(abs);
  }

  // === STICKY HEADER ===

  // === HEADER CARD ===
  var badge = c.statusBadge;

  // Identity: UID as primary
  document.getElementById('client-uid').textContent = c.uid;

  // Favorite
  var favKey = 'fav_' + c.uid;
  var isFav = localStorage.getItem(favKey) === '1';
  function renderFav() {
    var icon = document.getElementById('fav-icon');
    if (isFav) {
      icon.className = 'fa-solid fa-star text-[14px] text-[#F0B90B]';
    } else {
      icon.className = 'fa-regular fa-star text-[14px] text-[#474D57]';
    }
  }
  renderFav();
  window.toggleFav = function() {
    isFav = !isFav;
    localStorage.setItem(favKey, isFav ? '1' : '0');
    renderFav();
  };
  // Status badge removed — delta percentage already shows direction

  // From badge
  var fromMap = {
    'event': { label: '事件', bg: 'rgba(77,166,255,0.12)', color: '#4DA6FF' },
    'clients': { label: '列表', bg: 'rgba(132,142,156,0.1)', color: '#848E9C' },
    'search': { label: '搜索', bg: 'rgba(132,142,156,0.1)', color: '#848E9C' }
  };
  if (fromParam && fromMap[fromParam]) {
    var fb = document.getElementById('from-badge');
    fb.textContent = fromMap[fromParam].label;
    fb.style.background = fromMap[fromParam].bg;
    fb.style.color = fromMap[fromParam].color;
    fb.classList.remove('hidden');
  }

  // Deposit hero
  document.getElementById('deposit-hero').textContent = c.thisWeekDisplay || '-';
  document.getElementById('deposit-avg').textContent = c.depositDisplay;

  // Delta: this week vs 8w avg
  var thisWeekVal = c.weeks[c.weeks.length - 1];
  var avgVal = c.fMean;
  var deltaAbs = thisWeekVal - avgVal;
  var deltaPct = avgVal > 0 ? ((thisWeekVal - avgVal) / avgVal * 100) : 0;
  var isUp = deltaAbs >= 0;

  var deltaEl = document.getElementById('deposit-delta');
  var deltaColor = isUp ? '#0ECB81' : '#F6465D';
  var deltaBg = isUp ? 'rgba(14,203,129,0.12)' : 'rgba(246,70,93,0.12)';
  var arrowChar = isUp ? '▲' : '▼';
  var sign = isUp ? '+' : '';

  deltaEl.innerHTML = '<div class="flex items-center gap-1 px-1.5 py-0.5 rounded" style="background:' + deltaBg + '">'
    + '<span class="text-[11px]" style="color:' + deltaColor + '">' + arrowChar + '</span>'
    + '<span class="text-[12px] font-bold tabular-nums" style="color:' + deltaColor + '">' + sign + deltaPct.toFixed(1) + '%</span>'
    + '</div>'
    + '<span class="text-[10px] tabular-nums" style="color:' + deltaColor + '">' + sign + fmtFlow(Math.round(deltaAbs)) + '</span>';

  // Memo
  var memoKey = 'memo_' + c.uid;
  var memoInput = document.getElementById('memo-input');
  memoInput.value = localStorage.getItem(memoKey) || '';
  memoInput.addEventListener('input', function() {
    localStorage.setItem(memoKey, memoInput.value);
  });

  // UID copy
  window.copyUid = function() {
    navigator.clipboard.writeText(c.uid).then(function() {
      var btn = document.getElementById('uid-copy-btn');
      var icon = btn.querySelector('i');
      icon.className = 'fa-solid fa-check text-[9px] text-[#0ECB81]';
      setTimeout(function() { icon.className = 'fa-regular fa-copy text-[9px] text-[#848E9C]'; }, 1200);
    });
  };

  // === TAB SWITCHING ===
  var tabBtns = document.querySelectorAll('.tab-btn');
  var tabPanels = document.querySelectorAll('.tab-content');
  tabBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var target = btn.getAttribute('data-tab');
      tabBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      tabPanels.forEach(function(p) { p.classList.add('hidden'); });
      document.getElementById('tab-' + target).classList.remove('hidden');
    });
  });

  // === TAB 1: EVENTS ===
  var eventsHtml = '';

  // Module 4: Current Events
  var events = (D.eventsByClientUid && D.eventsByClientUid[uid]) || [];
  var processedSet = {};
  try {
    var processed = JSON.parse(sessionStorage.getItem('processed_events') || '[]');
    processed.forEach(function(id) { processedSet[id] = true; });
  } catch(e) {}
  var pendingEvents = events.filter(function(ev) { return !processedSet[ev.id]; });

  eventsHtml += '<div class="mx-4 mt-3 bg-[#1E2329] rounded-xl border border-[#2E3440] p-3">'
    + '<div class="text-[13px] font-semibold text-[#EAECEF] mb-2">当前事件</div>'
    + '<div class="space-y-2.5">';
  if (pendingEvents.length === 0) {
    eventsHtml += '<div class="flex items-center justify-center gap-2 py-4 text-[#848E9C]">'
      + '<i class="fa-solid fa-circle-check text-[#0ECB81]"></i>'
      + '<span class="text-[12px]">暂无待处理事件</span>'
      + '</div>';
  } else {
    pendingEvents.forEach(function(ev) {
      var stateColor = ev.task_state === '待处理' ? '#F0B90B' : (ev.task_state === '已完成' ? '#0ECB81' : '#848E9C');
      eventsHtml += '<a href="event-thread.html?id=' + ev.id + '" class="flex items-start gap-2 block">'
        + '<span class="w-2 h-2 rounded-full flex-shrink-0 mt-1.5" style="background:' + ev.color + '"></span>'
        + '<div class="flex-1 min-w-0">'
        + '<div class="flex items-center gap-1.5 flex-wrap">'
        + '<span class="text-[12px] text-[#EAECEF]">' + ev.type + (ev.sub_type ? ' · ' + ev.sub_type : '') + '</span>'
        + '<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:rgba(255,255,255,0.06);color:' + stateColor + '">' + ev.task_state + '</span>'
        + '</div>'
        + '<div class="flex items-center gap-2 mt-0.5">'
        + '<span class="text-[11px] font-medium" style="color:' + ev.color + '">' + ev.amount_display + '</span>'
        + '<span class="text-[10px] text-[#474D57]">' + ev.time_ago + '</span>'
        + '</div>'
        + '</div>'
        + '<i class="fa-solid fa-chevron-right text-[10px] text-[#474D57] mt-1.5"></i>'
        + '</a>';
    });
  }
  eventsHtml += '</div></div>';

  // Module 5: Follow-up Records
  function getFollowups() {
    if (c.status === '流失') {
      return [
        { date: '03-28 14:30', bd: 'BD 李明远', text: '电话回访，客户表示近期有大额出金计划' },
        { date: '03-25 10:00', bd: 'BD 李明远', text: '发送续存权益说明，客户已读' },
        { date: '03-20 16:45', bd: '系统', text: '触发资沉流失预警' }
      ];
    } else if (c.status === '增长') {
      return [
        { date: '03-28 11:00', bd: 'BD 李明远', text: '推荐理财产品组合，客户表示感兴趣' },
        { date: '03-24 15:30', bd: 'BD 李明远', text: '祝贺客户资沉增长，沟通后续理财配置' },
        { date: '03-19 09:00', bd: '系统', text: '触发资沉增长提示' }
      ];
    }
    return [
      { date: '03-27 16:00', bd: 'BD 李明远', text: '例行回访，客户状态正常，无特殊需求' },
      { date: '03-20 10:30', bd: 'BD 李明远', text: '发送月度资产报告，客户已读' },
      { date: '03-15 14:00', bd: '系统', text: '定期回访提醒' }
    ];
  }

  var followups = getFollowups();
  eventsHtml += '<div class="mx-4 mt-3 mb-4 bg-[#1E2329] rounded-xl border border-[#2E3440] p-3">'
    + '<div class="flex items-center justify-between mb-2">'
    + '<div class="text-[13px] font-semibold text-[#EAECEF]">跟进记录</div>'
    + '<span class="text-[11px] text-[#F0B90B] cursor-pointer">+ 添加记录</span>'
    + '</div>'
    + '<div class="border-l-2 border-[#2E3440] pl-3 space-y-3">';
  followups.forEach(function(f) {
    var isSystem = f.bd === '系统';
    eventsHtml += '<div class="relative">'
      + '<div class="absolute -left-[17px] top-[6px] w-2 h-2 rounded-full ' + (isSystem ? 'bg-[#474D57]' : 'bg-[#4DA6FF]') + '"></div>'
      + '<div class="text-[10px] text-[#848E9C]">' + f.date + ' · ' + f.bd + '</div>'
      + '<div class="text-[12px] text-[#EAECEF] mt-0.5">' + f.text + '</div>'
      + '</div>';
  });
  eventsHtml += '</div></div>';

  document.getElementById('tab-events').innerHTML = eventsHtml;

  // === TAB 2: ASSETS ===
  var assetsHtml = '';

  // Module 6: Deposit Distribution
  var dd = c.depositDist;
  var ddTotal = dd.futures + dd.leverage + dd.savings + dd.card + dd.cloud + dd.mini;
  var ddItems = [
    { name: '双仓合约', value: dd.futures, display: dd.futuresDisplay },
    { name: '超级杠杆', value: dd.leverage, display: dd.leverageDisplay },
    { name: '理财', value: dd.savings, display: dd.savingsDisplay },
    { name: '金融卡', value: dd.card, display: dd.cardDisplay },
    { name: '云算力', value: dd.cloud, display: dd.cloudDisplay },
    { name: 'Mini合约', value: dd.mini, display: dd.miniDisplay }
  ].sort(function(a, b) { return b.value - a.value; });
  ddItems.forEach(function(item) {
    item.pct = ddTotal > 0 ? Math.round(item.value / ddTotal * 100) : 0;
  });

  // 资金分布 (reuse deltaAbs/deltaPct from header)
  var distChgColor = deltaPct >= 0 ? '#0ECB81' : '#F6465D';
  var distChgChar = deltaPct >= 0 ? '▲' : '▼';
  var distChgSign = deltaPct >= 0 ? '+' : '';

  assetsHtml += '<div class="mx-4 mt-3 bg-[#1E2329] rounded-xl border border-[#2E3440] p-3">'
    + '<div class="flex items-start justify-between mb-3">'
    + '<div><div class="text-[13px] font-semibold text-[#EAECEF]">资金分布</div></div>'
    + '<div class="text-right">'
    + '<div class="text-[16px] font-bold tabular-nums" style="color:#F0B90B">' + c.depositDisplay + '</div>'
    + '<div class="text-[10px] mt-0.5" style="color:' + distChgColor + '">' + distChgChar + ' ' + distChgSign + deltaPct.toFixed(1) + '%</div>'
    + '</div>'
    + '</div>'
    + '<div class="h-[1px] bg-[#2E3440] mb-3"></div>';
  ddItems.forEach(function(item, idx) {
    var barColor = idx < 2 ? '#F0B90B' : '#4DA6FF';
    assetsHtml += '<div class="mb-2 last:mb-0">'
      + '<div class="flex items-center justify-between mb-0.5">'
      + '<span class="text-[11px] text-[#EAECEF]">' + item.name + '</span>'
      + '<span class="text-[11px] text-[#848E9C]">' + item.display + ' <span class="text-[10px]">' + item.pct + '%</span></span>'
      + '</div>'
      + '<div class="w-full h-[5px] rounded-full bg-[#2B3139]">'
      + '<div class="h-full rounded-full" style="width:' + Math.max(item.pct, 1) + '%;background:' + barColor + '"></div>'
      + '</div>'
      + '</div>';
  });
  assetsHtml += '</div>';

  // Module 7 (业务参与) removed — merged into 资金分布 above

  // Module 8: Asset Flow Chart (complete redesign)
  var maxFlow = Math.max.apply(null, flowWeeks.map(function(w) { return Math.max(w.inflow, w.outflow); }).concat([1]));
  var maxBarH = 60;

  // Totals
  var totalInflow = flowWeeks.reduce(function(s, w) { return s + w.inflow; }, 0);
  var totalOutflow = flowWeeks.reduce(function(s, w) { return s + w.outflow; }, 0);
  var netFlow = totalInflow - totalOutflow;

  function fmtFlowAmt(v) {
    if (Math.abs(v) >= 10000) return Math.round(v / 10000) + '万';
    if (Math.abs(v) >= 1000) return (v / 10000).toFixed(1) + '万';
    return Math.round(v) + '';
  }

  // Y-axis ticks: 3 levels (maxFlow rounded up)
  var yTop = maxFlow;
  var yMid = Math.round(maxFlow / 2);

  // 资沉流动
  // Baseline per-week averages (excluding this week)
  var baselineInflow = baselineWeeks.reduce(function(s, w) { return s + w.inflow; }, 0);
  var baselineOutflow = baselineWeeks.reduce(function(s, w) { return s + w.outflow; }, 0);
  var baselineNetFlow = baselineInflow - baselineOutflow;
  var avgInflowPerWeek = Math.round(baselineInflow / baselineWeeks.length);
  var avgOutflowPerWeek = Math.round(baselineOutflow / baselineWeeks.length);
  var avgNetPerWeek = Math.round(baselineNetFlow / baselineWeeks.length);
  var netFlowColor = avgNetPerWeek >= 0 ? '#0ECB81' : '#F6465D';
  var netFlowSign = avgNetPerWeek >= 0 ? '+' : '-';

  // This week's net flow vs 8w avg net flow
  var thisWeekNet = thisWeekFlow.inflow - thisWeekFlow.outflow;
  var flowChgPct = Math.abs(avgNetPerWeek) > 0 ? ((thisWeekNet - avgNetPerWeek) / Math.abs(avgNetPerWeek) * 100) : 0;
  var flowChgColor = flowChgPct >= 0 ? '#0ECB81' : '#F6465D';
  var flowChgChar = flowChgPct >= 0 ? '▲' : '▼';
  var flowChgSign = flowChgPct >= 0 ? '+' : '';

  assetsHtml += '<div class="mx-4 mt-3 bg-[#1E2329] rounded-xl border border-[#2E3440] p-3">'
    + '<div class="flex items-start justify-between mb-3">'
    + '<div><div class="text-[13px] font-semibold text-[#EAECEF]">资沉流动</div></div>'
    + '<div class="text-right">'
    + '<div class="text-[16px] font-bold tabular-nums" style="color:' + netFlowColor + '">' + netFlowSign + '$' + fmtFlowAmt(Math.abs(avgNetPerWeek)) + '/周</div>'
    + '<div class="text-[10px] mt-0.5" style="color:' + flowChgColor + '">' + flowChgChar + ' ' + flowChgSign + flowChgPct.toFixed(1) + '%</div>'
    + '</div>'
    + '</div>'
    + '<div class="h-[1px] bg-[#2E3440] mb-3"></div>';

  // Chart area with Y-axis
  assetsHtml += '<div class="flex">';

  // Y-axis labels (left side)
  assetsHtml += '<div class="flex flex-col flex-shrink-0" style="width:36px">';
  // Top half labels
  assetsHtml += '<div style="height:' + maxBarH + 'px" class="flex flex-col justify-between">'
    + '<span class="text-[9px] text-[#474D57] leading-none">' + fmtFlowAmt(yTop) + '</span>'
    + '<span class="text-[9px] text-[#474D57] leading-none">' + fmtFlowAmt(yMid) + '</span>'
    + '</div>';
  // Zero
  assetsHtml += '<div class="text-[9px] text-[#848E9C] leading-none" style="height:12px;line-height:12px">0</div>';
  // Bottom half labels
  assetsHtml += '<div style="height:' + maxBarH + 'px" class="flex flex-col justify-between">'
    + '<span class="text-[9px] text-[#474D57] leading-none">' + fmtFlowAmt(yMid) + '</span>'
    + '<span class="text-[9px] text-[#474D57] leading-none">' + fmtFlowAmt(yTop) + '</span>'
    + '</div>';
  assetsHtml += '</div>';

  // Bars area
  assetsHtml += '<div class="flex-1">';

  // Inflow bars
  assetsHtml += '<div class="flex items-end justify-around" style="height:' + maxBarH + 'px">';
  flowWeeks.forEach(function(w) {
    var h = maxFlow > 0 ? Math.round(w.inflow / maxFlow * maxBarH) : 0;
    assetsHtml += '<div style="width:24px;height:' + Math.max(h, 1) + 'px;background:#0ECB81;border-radius:2px 2px 0 0"></div>';
  });
  assetsHtml += '</div>';

  // Zero line
  assetsHtml += '<div style="height:1px;background:#474D57;margin:0 -4px"></div>';

  // Outflow bars
  assetsHtml += '<div class="flex items-start justify-around" style="height:' + maxBarH + 'px">';
  flowWeeks.forEach(function(w) {
    var h = maxFlow > 0 ? Math.round(w.outflow / maxFlow * maxBarH) : 0;
    assetsHtml += '<div style="width:24px;height:' + Math.max(h, 1) + 'px;background:#F6465D;border-radius:0 0 2px 2px"></div>';
  });
  assetsHtml += '</div>';

  // X-axis labels
  assetsHtml += '<div class="flex justify-around mt-1">';
  for (var wi = 0; wi < flowWeeks.length; wi++) {
    var xLabel = (wi === flowWeeks.length - 1) ? '本周' : 'W' + (wi + 2);
    assetsHtml += '<div style="width:24px" class="text-center text-[9px] text-[#848E9C]">' + xLabel + '</div>';
  }
  assetsHtml += '</div>';

  assetsHtml += '</div>'; // bars area
  assetsHtml += '</div>'; // chart flex

  // Legend
  assetsHtml += '<div class="flex items-center gap-4 mt-2 pt-2 border-t border-[#2E3440]">'
    + '<div class="flex items-center gap-1"><span class="w-2 h-2 rounded-sm bg-[#0ECB81]"></span><span class="text-[10px] text-[#848E9C]">流入</span></div>'
    + '<div class="flex items-center gap-1"><span class="w-2 h-2 rounded-sm bg-[#F6465D]"></span><span class="text-[10px] text-[#848E9C]">流出</span></div>'
    + '</div>';

  assetsHtml += '</div>';

  // Net Contribution
  var nc = c.netContribution;
  var ncWowColor = nc.wow >= 0 ? '#0ECB81' : '#F6465D';
  var ncItems = [
    { name: '合约', value: nc.futures, isRevenue: true },
    { name: '杠杆', value: nc.leverage, isRevenue: true },
    { name: 'Mini合约', value: nc.mini, isRevenue: true },
    { name: '金融卡', value: nc.card, isRevenue: true },
    { name: '云算力', value: nc.cloud, isRevenue: true },
    { name: '理财利息', value: nc.savingsInterest, isRevenue: false },
    { name: '返佣', value: nc.rebate, isRevenue: false }
  ];
  var ncMax = Math.max.apply(null, ncItems.map(function(i) { return Math.abs(i.value); }));

  var ncWowChar = nc.wow >= 0 ? '▲' : '▼';
  assetsHtml += '<div class="mx-4 mt-3 bg-[#1E2329] rounded-xl border border-[#2E3440] p-3">'
    + '<div class="flex items-start justify-between mb-3">'
    + '<div><div class="text-[13px] font-semibold text-[#EAECEF]">7日利润贡献</div></div>'
    + '<div class="text-right">'
    + '<div class="text-[16px] font-bold tabular-nums" style="color:#F0B90B">' + nc.totalDisplay + '</div>'
    + '<div class="text-[10px] mt-0.5" style="color:' + ncWowColor + '">' + ncWowChar + ' ' + nc.wowDisplay + '</div>'
    + '</div>'
    + '</div>'
    + '<div class="h-[1px] bg-[#2E3440] mb-3"></div>';
  ncItems.forEach(function(item) {
    var color = item.isRevenue ? '#0ECB81' : '#F6465D';
    var sign = item.value >= 0 ? '+' : '';
    var displayVal = sign + (Math.abs(item.value) >= 10000 ? (item.value / 10000).toFixed(1) + '万' : Math.round(item.value));
    var barW = ncMax > 0 ? Math.round(Math.abs(item.value) / ncMax * 100) : 0;
    assetsHtml += '<div class="flex items-center gap-2 mb-1.5">'
      + '<span class="w-[52px] text-[10px] text-[#848E9C] flex-shrink-0">' + item.name + '</span>'
      + '<div class="flex-1 h-[4px] rounded-full bg-[#2B3139]">'
      + '<div class="h-full rounded-full" style="width:' + Math.max(barW, 2) + '%;background:' + color + '"></div>'
      + '</div>'
      + '<span class="text-[10px] font-medium w-[48px] text-right flex-shrink-0" style="color:' + color + '">$ ' + displayVal + '</span>'
      + '</div>';
  });
  assetsHtml += '</div>';

  // Client P&L
  var pnl = c.clientPnl;
  var pnlItems = [
    { name: '双仓合约', data: pnl.futures7d },
    { name: '超级杠杆', data: pnl.leverage7d },
    { name: 'Mini合约', data: pnl.mini7d },
    { name: '现货', data: pnl.spot7d }
  ];
  var pnlMax = Math.max.apply(null, pnlItems.map(function(i) { return Math.abs(i.data.value); }).concat([1]));

  // 7日交易盈亏
  var pnlAvgVal = pnl.weeklyAvg8w.value;
  var pnl7dVal = pnl.total7d.value;
  var pnlChgPct = Math.abs(pnlAvgVal) > 0 ? ((pnl7dVal - pnlAvgVal) / Math.abs(pnlAvgVal) * 100) : 0;
  var pnlChgColor = pnlChgPct >= 0 ? '#0ECB81' : '#F6465D';
  var pnlChgChar = pnlChgPct >= 0 ? '▲' : '▼';
  var pnlChgSign = pnlChgPct >= 0 ? '+' : '';

  assetsHtml += '<div class="mx-4 mt-3 mb-4 bg-[#1E2329] rounded-xl border border-[#2E3440] p-3">'
    + '<div class="flex items-start justify-between mb-3">'
    + '<div><div class="text-[13px] font-semibold text-[#EAECEF]">7日交易盈亏</div></div>'
    + '<div class="text-right">'
    + '<div class="text-[16px] font-bold tabular-nums" style="color:' + pnl.total7d.color + '">' + pnl.total7d.display + '</div>'
    + '<div class="text-[10px] mt-0.5" style="color:' + pnlChgColor + '">' + pnlChgChar + ' ' + pnlChgSign + pnlChgPct.toFixed(1) + '%</div>'
    + '</div>'
    + '</div>'
    + '<div class="h-[1px] bg-[#2E3440] mb-3"></div>';
  pnlItems.forEach(function(item) {
    var d = item.data;
    var barW = pnlMax > 0 ? Math.round(Math.abs(d.value) / pnlMax * 100) : 0;
    assetsHtml += '<div>'
      + '<div class="flex items-center justify-between mb-0.5">'
      + '<span class="text-[11px] text-[#EAECEF]">' + item.name + '</span>'
      + '<span class="text-[11px] font-medium" style="color:' + d.color + '">' + d.display + '</span>'
      + '</div>'
      + '<div class="w-full h-[4px] rounded-full bg-[#2B3139]">'
      + '<div class="h-full rounded-full" style="width:' + Math.max(barW, 2) + '%;background:' + d.color + '"></div>'
      + '</div>'
      + '</div>';
  });
  assetsHtml += '</div>';

  document.getElementById('tab-assets').innerHTML = assetsHtml;

  // === TAB 3: PROFILE ===
  var profileHtml = '';

  // Module 9: BD Tags
  var tagKey = 'bd_tags_' + c.uid;
  var savedTags = JSON.parse(localStorage.getItem(tagKey) || 'null');
  if (!savedTags) {
    savedTags = ['偏好短线', '英文沟通'];
    localStorage.setItem(tagKey, JSON.stringify(savedTags));
  }

  profileHtml += '<div class="mx-4 mt-3 bg-[#1E2329] rounded-xl border border-[#2E3440] p-3" id="bd-tags-card">'
    + '<div class="text-[13px] font-semibold text-[#EAECEF] mb-2">BD 标签</div>'
    + '<div id="bd-tags-container" class="flex flex-wrap gap-1.5"></div>'
    + '</div>';

  // Module 10: Notes
  var noteKey = 'bd_note_' + c.uid;
  var savedNote = localStorage.getItem(noteKey) || '';

  profileHtml += '<div class="mx-4 mt-3 mb-4 bg-[#1E2329] rounded-xl border border-[#2E3440] p-3">'
    + '<div class="text-[13px] font-semibold text-[#EAECEF] mb-2">BD 备注</div>'
    + '<textarea id="bd-note" class="w-full bg-[#2B3139] text-[#EAECEF] text-[12px] rounded-lg p-3 border border-[#2E3440] outline-none resize-none min-h-[100px] placeholder-[#474D57]" placeholder="添加备注...">' + esc(savedNote) + '</textarea>'
    + '</div>';

  document.getElementById('tab-profile').innerHTML = profileHtml;

  // === INTERACTIVE: BD Note auto-save ===
  var noteEl = document.getElementById('bd-note');
  if (noteEl) {
    noteEl.addEventListener('input', function() {
      localStorage.setItem(noteKey, noteEl.value);
    });
  }

  // === INTERACTIVE: BD Tags ===
  function renderTags() {
    var container = document.getElementById('bd-tags-container');
    if (!container) return;
    var inner = savedTags.map(function(tag) {
      return '<span class="bd-tag text-[11px] px-2.5 py-1 rounded-full bg-[#0D1F2D] text-[#4DA6FF] cursor-pointer" data-tag="' + esc(tag) + '">'
        + esc(tag) + ' <i class="fa-solid fa-xmark text-[9px] ml-1 opacity-60"></i></span>';
    }).join('');
    inner += '<span id="add-tag-btn" class="text-[11px] px-2.5 py-1 rounded-full border border-dashed border-[#474D57] text-[#474D57] cursor-pointer">+ 添加标签</span>';
    container.innerHTML = inner;
    bindTagEvents();
  }

  function bindTagEvents() {
    var addBtn = document.getElementById('add-tag-btn');
    if (addBtn) {
      addBtn.addEventListener('click', function() {
        var newTag = prompt('输入新标签:');
        if (!newTag || !newTag.trim()) return;
        savedTags.push(newTag.trim());
        localStorage.setItem(tagKey, JSON.stringify(savedTags));
        renderTags();
      });
    }
    document.querySelectorAll('.bd-tag').forEach(function(el) {
      el.addEventListener('click', function() {
        var tag = el.getAttribute('data-tag');
        savedTags = savedTags.filter(function(t) { return t !== tag; });
        localStorage.setItem(tagKey, JSON.stringify(savedTags));
        renderTags();
      });
    });
  }

  renderTags();

})();
</script>

</body>
</html>
