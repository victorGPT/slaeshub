<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sales Hub — 我的</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="mock-data.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dark-bg': '#0B0E11',
            'dark-card': '#1E2329',
            'dark-hover': '#2B3139',
            'dark-border': '#2B3139',
            'brand-gold': '#F0B90B',
            'brand-gold-hover': '#D4A50A',
            'profit-green': '#0ECB81',
            'loss-red': '#F6465D',
            'info-blue': '#1E88E5',
            'text-primary': '#EAECEF',
            'text-secondary': '#848E9C',
            'text-tertiary': '#5E6673',
          },
          fontFamily: {
            'sans': ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
            'mono': ['"SF Mono"', 'Monaco', '"Fira Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #0B0E11; overscroll-behavior: none; }
    .menu-item:active { background: #2B3139; }
    .menu-item { transition: background 0.15s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeUp 0.35s ease forwards; opacity: 0; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-dark-bg text-text-primary w-full min-h-screen flex flex-col">
  <div class="h-[44px] flex items-end justify-between px-6 pb-1 bg-dark-bg sticky top-0 z-50">
    <span class="text-[14px] font-semibold">14:23</span>
    <div class="flex items-center gap-1">
      <i class="fas fa-signal text-[12px]"></i>
      <i class="fas fa-wifi text-[12px]"></i>
      <i class="fas fa-battery-full text-[12px]"></i>
    </div>
  </div>

  <div class="h-[56px] flex items-center justify-between px-4 bg-dark-bg sticky top-[44px] z-50 border-b border-dark-border">
    <h1 class="text-[18px] font-bold">我的</h1>
    <div class="w-[44px] h-[44px]"></div>
  </div>

  <div class="flex-1 overflow-y-auto pb-[90px]">
    <!-- 头像 + 名字 -->
    <div class="flex flex-col items-center mt-10 animate-in" style="animation-delay: 0.05s">
      <div class="w-[80px] h-[80px] rounded-full bg-[#2B3139] flex items-center justify-center">
        <i class="fas fa-user text-[34px] text-text-secondary"></i>
      </div>
      <p id="owner-name" class="text-[20px] font-bold mt-4">我的账户</p>
    </div>

    <!-- 退出登录 -->
    <div class="mx-4 mt-8 bg-dark-card rounded-xl overflow-hidden animate-in" style="animation-delay: 0.1s">
      <a href="javascript:void(0)" onclick="showToast('已退出登录')" class="menu-item flex items-center justify-between px-4 py-3.5 active:opacity-85">
        <div class="flex items-center gap-3">
          <div class="w-[32px] h-[32px] rounded-lg bg-[rgba(246,70,93,0.12)] flex items-center justify-center">
            <i class="fas fa-right-from-bracket text-[14px] text-loss-red"></i>
          </div>
          <span class="text-[14px] text-loss-red">退出登录</span>
        </div>
        <i class="fas fa-chevron-right text-[12px] text-text-tertiary"></i>
      </a>
    </div>
  </div>

  <div class="fixed-bar bg-dark-card border-t border-dark-border z-50">
    <div class="flex items-center justify-around h-[56px]">
      <a href="clients.html" class="flex flex-col items-center gap-0.5 min-w-[44px] min-h-[44px] justify-center active:opacity-85">
        <i class="fas fa-users text-[18px] text-text-tertiary"></i>
        <span class="text-[10px] text-text-tertiary">客户</span>
      </a>
      <a href="events.html" class="flex flex-col items-center gap-0.5 min-w-[44px] min-h-[44px] justify-center active:opacity-85">
        <i class="fas fa-bolt text-[18px] text-text-tertiary"></i>
        <span class="text-[10px] text-text-tertiary">事件</span>
      </a>
      <a href="javascript:void(0)" onclick="showToast('数据模块即将上线')" class="flex flex-col items-center gap-0.5 min-w-[44px] min-h-[44px] justify-center active:opacity-85">
        <i class="fas fa-chart-line text-[18px] text-text-tertiary"></i>
        <span class="text-[10px] text-text-tertiary">数据</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center gap-0.5 min-w-[44px] min-h-[44px] justify-center">
        <i class="fas fa-user text-[18px] text-brand-gold"></i>
        <span class="text-[10px] text-brand-gold font-medium">我的</span>
      </a>
    </div>
    <div class="h-[34px] bg-dark-card"></div>
  </div>

  <div id="toast" class="fixed top-[120px] left-1/2 -translate-x-1/2 bg-dark-card text-text-primary text-[13px] px-4 py-2 rounded-lg border border-dark-border shadow-lg z-[200] opacity-0 pointer-events-none transition-opacity duration-200"></div>

  <script>
    const DATA = window.PROTOTYPE_DATA || {};
    const CLIENTS = Array.isArray(DATA.clients) ? DATA.clients : [];
    const ownerName = CLIENTS[0]?.bdOwner || '我的账户';
    document.getElementById('owner-name').textContent = ownerName;

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1';
      setTimeout(() => { t.style.opacity = '0'; }, 1800);
    }
  </script>
</body>
</html>
