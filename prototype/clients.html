<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 客户</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-center px-4">
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">客户</h1>
  </div>

  <!-- Search Bar -->
  <div class="px-4 pt-3 pb-2">
    <div class="flex items-center bg-[#1E2329] rounded-lg border border-[#2E3440] px-3 py-2">
      <i class="fa-solid fa-magnifying-glass text-[14px] text-[#848E9C] mr-2"></i>
      <input id="search-input" type="text" placeholder="搜索客户名称或UID"
        class="flex-1 bg-transparent text-[14px] text-[#EAECEF] outline-none placeholder-[#848E9C]" />
    </div>
  </div>

  <!-- Sort Info -->
  <div id="sort-info" class="px-4 pb-2 text-[11px] text-[#848E9C]"></div>

  <!-- Client List -->
  <div id="client-list" class="overflow-y-auto pb-[100px]" style="scrollbar-width:none;"></div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;
  var searchInput = document.getElementById('search-input');

  function getStatusLabel(c) {
    var rate = c.adjustedTrendRate;
    var pct = Math.abs(rate * 100).toFixed(1);
    if (rate <= -0.01) return { label: '流失 ' + pct + '%', bg: 'rgba(246,70,93,0.15)', color: '#F6465D' };
    if (rate >= 0.01) return { label: '增长 ' + pct + '%', bg: 'rgba(14,203,129,0.15)', color: '#0ECB81' };
    return { label: '稳定', bg: 'rgba(132,142,156,0.15)', color: '#848E9C' };
  }

  function getLastContactHours(uid) {
    var evts = D.eventsByClientUid[uid];
    if (!evts || evts.length === 0) return 999;
    var min = Infinity;
    evts.forEach(function(e) { if (e.age_hours < min) min = e.age_hours; });
    return min;
  }

  function lastContactLabel(hours) {
    if (hours >= 999) return '7天未联系';
    if (hours < 24) return '今天联系';
    if (hours < 48) return '1天前联系';
    if (hours < 72) return '2天前联系';
    if (hours < 168) return Math.floor(hours / 24) + '天前联系';
    return '7天未联系';
  }

  function rowHTML(c) {
    var s = getStatusLabel(c);
    var h = getLastContactHours(c.uid);
    var lbl = lastContactLabel(h);
    var lblColor = (h >= 168 || h >= 999) ? '#F6465D' : '#848E9C';
    return '<a href="client-detail.html?uid=' + c.uid + '" class="flex items-center px-4 py-3 border-b border-[#2E3440] active:bg-[#2B3139]">'
      + '<div class="flex-1 min-w-0">'
      +   '<div class="flex items-center gap-2">'
      +     '<span class="text-[13px] font-medium text-[#EAECEF] truncate">' + c.name + '</span>'
      +     '<span class="text-[11px] text-[#474D57]">' + c.uid + '</span>'
      +   '</div>'
      + '</div>'
      + '<div class="flex items-center gap-3 flex-shrink-0 ml-2">'
      +   '<span class="text-[14px] font-bold text-[#EAECEF]">' + c.depositDisplay + '</span>'
      +   '<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:' + s.bg + ';color:' + s.color + '">' + s.label + '</span>'
      +   '<span class="text-[10px] text-right" style="color:' + lblColor + ';min-width:32px">' + lbl + '</span>'
      + '</div>'
      + '</a>';
  }

  function renderList() {
    var query = searchInput.value.toLowerCase();
    var filtered = D.clients.filter(function(c) {
      return !query || c.name.toLowerCase().includes(query) || c.uid.includes(query);
    });
    filtered.sort(function(a, b) {
      return getLastContactHours(b.uid) - getLastContactHours(a.uid);
    });

    document.getElementById('sort-info').textContent =
      '按最近联系时间排序 · 共 ' + filtered.length + ' 位客户';

    document.getElementById('client-list').innerHTML = filtered.length
      ? filtered.map(function(c) { return rowHTML(c); }).join('')
      : '<div class="py-8 text-center text-[#848E9C] text-[13px]">未找到匹配的客户</div>';
  }

  searchInput.addEventListener('input', renderList);
  renderList();
})();
</script>

</body>
</html>
