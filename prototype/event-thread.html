<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub — 事件详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; display: none; }
    .sheet-overlay.active { display: flex; align-items: flex-end; justify-content: center; }
    .sheet-panel { width: 393px; max-height: 80vh; overflow-y: auto; }
    .channel-btn, .result-btn {
      padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
      background: #2B3139; color: #848E9C; border: 1px solid #2E3440; cursor: pointer;
      transition: all 0.15s;
    }
    .channel-btn.selected, .result-btn.selected {
      background: rgba(77,166,255,0.15); color: #4DA6FF; border-color: rgba(77,166,255,0.4);
    }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[44px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <a onclick="history.back()" class="w-8 h-8 flex items-center justify-center text-[#EAECEF] cursor-pointer">
      <i class="fa-solid fa-chevron-left text-[16px]"></i>
    </a>
    <h1 class="text-[16px] font-bold text-[#EAECEF]">事件详情</h1>
    <div id="nav-status-badge" class="w-16 flex justify-end"></div>
  </div>

  <!-- Scrollable Content -->
  <div id="page-content" class="pb-[120px]"></div>

</div>

<!-- Bottom Action Bar -->
<div id="bottom-bar" class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30" style="display:none;">
  <div id="bottom-bar-inner" class="flex items-center gap-3 px-4 py-3"></div>
  <div class="h-[34px]"></div>
</div>

<!-- Bottom Sheet: Add Activity -->
<div id="sheet-overlay" class="sheet-overlay" onclick="closeSheet(event)">
  <div class="sheet-panel bg-[#1E2329] rounded-t-2xl border-t border-[#2E3440]" onclick="event.stopPropagation()">

    <!-- Sheet Header -->
    <div class="flex items-center justify-between px-4 pt-4 pb-3 border-b border-[#2E3440]">
      <span class="text-[16px] font-bold text-[#EAECEF]">添加活动记录</span>
      <button onclick="closeSheet()" class="w-8 h-8 flex items-center justify-center text-[#848E9C]">
        <i class="fa-solid fa-xmark text-[18px]"></i>
      </button>
    </div>

    <div class="px-4 pt-3 pb-2">

      <!-- 沟通渠道 -->
      <div class="mb-4">
        <div class="text-[12px] text-[#848E9C] mb-2">沟通渠道 <span class="text-[#F6465D]">*</span></div>
        <div id="channel-options" class="flex flex-wrap gap-2">
          <button class="channel-btn" onclick="selectChannel(this, 'Telegram')">Telegram</button>
          <button class="channel-btn" onclick="selectChannel(this, 'WhatsApp')">WhatsApp</button>
          <button class="channel-btn" onclick="selectChannel(this, '微信')">微信</button>
          <button class="channel-btn" onclick="selectChannel(this, '电话')">电话</button>
          <button class="channel-btn" onclick="selectChannel(this, '线下')">线下</button>
          <button class="channel-btn" onclick="selectChannel(this, '邮件')">邮件</button>
        </div>
      </div>

      <!-- 沟通结果 -->
      <div class="mb-4">
        <div class="text-[12px] text-[#848E9C] mb-2">沟通结果 <span class="text-[#F6465D]">*</span></div>
        <div id="result-options" class="flex flex-wrap gap-2">
          <button class="result-btn" onclick="selectResult(this, '已联系上')">已联系上</button>
          <button class="result-btn" onclick="selectResult(this, '有回复')">有回复</button>
          <button class="result-btn" onclick="selectResult(this, '已见面')">已见面</button>
          <button class="result-btn" onclick="selectResult(this, '未接通')">未接通</button>
          <button class="result-btn" onclick="selectResult(this, '未回复')">未回复</button>
          <button class="result-btn" onclick="selectResult(this, '仅发送消息')">仅发送消息</button>
        </div>
      </div>

      <!-- 备注 -->
      <div class="mb-4">
        <div class="text-[12px] text-[#848E9C] mb-2">备注（选填）</div>
        <textarea id="sheet-summary" rows="3"
          class="w-full bg-[#2B3139] text-[#EAECEF] text-[13px] rounded-lg px-3 py-2.5 border border-[#2E3440] outline-none placeholder-[#474D57] resize-none"
          placeholder="这次聊了什么？"></textarea>
      </div>

      <!-- 更新下一步 -->
      <div class="mb-4">
        <div class="text-[12px] text-[#848E9C] mb-2">更新下一步（选填，留空则保持原有）</div>
        <input id="sheet-next-action" type="text"
          class="w-full bg-[#2B3139] text-[#EAECEF] text-[13px] rounded-lg px-3 py-2.5 border border-[#2E3440] outline-none placeholder-[#474D57]"
          placeholder="例：下周发报价单" />
      </div>

      <!-- 更新跟进日期 -->
      <div class="mb-5">
        <div class="text-[12px] text-[#848E9C] mb-2">更新跟进日期（选填）</div>
        <input id="sheet-follow-up-at" type="date"
          class="w-full bg-[#2B3139] text-[#EAECEF] text-[13px] rounded-lg px-3 py-2.5 border border-[#2E3440] outline-none" />
      </div>

      <!-- 保存按钮 -->
      <button onclick="saveActivity()"
        class="w-full bg-[#F0B90B] text-[#0B0E11] font-semibold text-[14px] rounded-xl py-3 border-0 cursor-pointer mb-2 active:opacity-80">
        保存活动记录
      </button>
    </div>

  </div>
</div>

<script src="mock-data.js"></script>
<script>
(function() {

  // ── Mock data init ─────────────────────────────────────────────
  var MOCK_EVENTS = [
    {
      id: 'evt_001',
      title: '拜访胡军 - 云算力意向跟进',
      client_uid: '52339391',
      status: '跟进中',
      next_action: '发正式报价单',
      follow_up_at: '2026-04-10',
      created_at: '2026-04-04',
      activities: [
        { id: 'act_002', occurred_at: '2026-04-07', channel: '电话', result: '已联系上', summary: '客户确认有意向，需要报价单' },
        { id: 'act_001', occurred_at: '2026-04-04', channel: '线下', result: '已见面', summary: '首次拜访，对云算力产品感兴趣' }
      ]
    },
    {
      id: 'evt_002',
      title: '李强 - 理财产品推荐',
      client_uid: '60122841',
      status: '跟进中',
      next_action: '确认是否收到产品资料',
      follow_up_at: '2026-04-08',
      created_at: '2026-04-05',
      activities: [
        { id: 'act_003', occurred_at: '2026-04-05', channel: 'Telegram', result: '仅发送消息', summary: '发送了理财产品介绍，等待回复' }
      ]
    }
  ];

  if (!localStorage.getItem('active_events')) {
    localStorage.setItem('active_events', JSON.stringify(MOCK_EVENTS));
  }

  // ── State ──────────────────────────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var eventId = params.get('id') || 'evt_001';

  var selectedChannel = '';
  var selectedResult = '';

  function loadEvent() {
    var all = JSON.parse(localStorage.getItem('active_events') || '[]');
    return all.find(function(e) { return e.id === eventId; }) || null;
  }

  function saveEvent(evt) {
    var all = JSON.parse(localStorage.getItem('active_events') || '[]');
    var idx = all.findIndex(function(e) { return e.id === evt.id; });
    if (idx !== -1) all[idx] = evt;
    else all.push(evt);
    localStorage.setItem('active_events', JSON.stringify(all));
  }

  // ── Helpers ───────────────────────────────────────────────────
  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function fmtDate(str) {
    // Returns "M月D日" from "YYYY-MM-DD"
    if (!str) return '';
    var parts = str.split('-');
    if (parts.length < 3) return str;
    return parseInt(parts[1], 10) + '月' + parseInt(parts[2], 10) + '日';
  }

  function findClient(uid) {
    var D = window.PROTOTYPE_DATA;
    if (!D || !D.clients) return null;
    return D.clients.find(function(c) { return c.uid === uid; }) || null;
  }

  // ── Render ────────────────────────────────────────────────────
  function render() {
    var evt = loadEvent();
    if (!evt) {
      document.getElementById('page-content').innerHTML =
        '<div class="flex flex-col items-center justify-center py-20 text-[#848E9C]">'
        + '<i class="fa-solid fa-circle-xmark text-[40px] mb-3 text-[#474D57]"></i>'
        + '<span class="text-[14px]">未找到事件</span>'
        + '</div>';
      return;
    }

    var client = findClient(evt.client_uid);
    var isDone = evt.status === '已完成';

    // ── Nav badge ──
    var badgeEl = document.getElementById('nav-status-badge');
    if (isDone) {
      badgeEl.innerHTML = '<span class="text-[11px] px-2 py-0.5 rounded-full bg-[rgba(14,203,129,0.15)] text-[#0ECB81]">已完成</span>';
    } else {
      badgeEl.innerHTML = '<span class="text-[11px] px-2 py-0.5 rounded-full bg-[rgba(77,166,255,0.15)] text-[#4DA6FF]">跟进中</span>';
    }

    // ── Client display values ──
    var clientLine = '';
    if (client) {
      var depDisplay = client.depositDisplay || client.thisWeekDisplay || '';
      clientLine = esc(evt.client_uid) + ' (' + esc(client.name || '') + ')'
        + (depDisplay ? '&nbsp;&nbsp;<span class="text-[#474D57]">' + esc(depDisplay) + '</span>' : '');
    } else {
      clientLine = esc(evt.client_uid);
    }

    var html = '';

    // ── Event Info Card ──
    html += '<div class="bg-[#1E2329] rounded-xl border border-[#2E3440] mx-4 mt-3 p-4">';

    // Title
    html += '<div class="text-[15px] font-bold text-[#EAECEF]">' + esc(evt.title) + '</div>';

    // Client row
    html += '<div class="text-[11px] text-[#848E9C] mt-1.5">客户：' + clientLine + '</div>';

    // Next action
    if (evt.next_action) {
      html += '<div class="mt-2 pt-2 border-t border-[#2E3440]">';
      html +=   '<span class="text-[11px] text-[#848E9C]">下一步</span>';
      html +=   '<span class="text-[11px] text-[#F0B90B] ml-1">' + esc(fmtDate(evt.follow_up_at)) + '</span>';
      html +=   '<span class="text-[12px] text-[#EAECEF] mt-0.5 block">' + esc(evt.next_action) + '</span>';
      html += '</div>';
    }

    html += '</div>'; // end event info card

    // ── Activity Timeline ──
    var acts = evt.activities || [];
    html += '<div class="mx-4 mt-3 mb-2">';

    // Title row
    html += '<div class="flex items-center gap-2">';
    html +=   '<span class="text-[13px] font-semibold text-[#EAECEF]">活动记录</span>';
    html +=   '<span class="text-[11px] text-[#474D57]">' + acts.length + ' 条</span>';
    html += '</div>';

    if (acts.length === 0) {
      html += '<div class="py-8 text-center text-[#474D57] text-[12px]">还没有活动记录<br>点击下方按钮记录第一次沟通</div>';
    } else {
      html += '<div class="border-l-2 border-[#2E3440] ml-1 pl-4 mt-3">';
      acts.forEach(function(act) {
        var hasSummary = act.summary && act.summary.trim().length > 0;
        var dotColor = hasSummary ? '#4DA6FF' : '#474D57';
        html += '<div class="relative mb-5 last:mb-1">';
        // Timeline dot
        html += '<div class="absolute -left-[21px] top-[3px] w-2.5 h-2.5 rounded-full border-2 border-[#0B0E11]" style="background:' + dotColor + '"></div>';
        // Date
        html += '<div class="text-[10px] text-[#848E9C] mb-0.5">' + esc(fmtDate(act.occurred_at)) + '</div>';
        // Channel · result
        html += '<div class="text-[13px] text-[#EAECEF] font-medium">' + esc(act.channel) + ' · ' + esc(act.result) + '</div>';
        // Summary
        if (hasSummary) {
          html += '<div class="text-[11px] text-[#848E9C] mt-0.5">' + esc(act.summary) + '</div>';
        }
        html += '</div>';
      });
      html += '</div>'; // end timeline
    }

    html += '</div>'; // end activity section

    // ── Completed timestamp (if done) ──
    if (isDone && evt.completed_at) {
      html += '<div class="mx-4 mt-2 mb-4 text-center text-[11px] text-[#474D57]">';
      html +=   '已于 ' + esc(fmtDate(evt.completed_at)) + ' 标记完成';
      html += '</div>';
    }

    document.getElementById('page-content').innerHTML = html;

    // ── Bottom bar ──
    var bottomBar = document.getElementById('bottom-bar');
    var bottomInner = document.getElementById('bottom-bar-inner');
    if (isDone) {
      bottomBar.style.display = 'none';
    } else {
      bottomBar.style.display = 'block';
      bottomInner.innerHTML =
        '<button onclick="openActivitySheet()" class="flex-1 bg-[#F0B90B] text-[#0B0E11] font-semibold text-[13px] rounded-xl py-3 border-0 cursor-pointer active:opacity-80">+ 添加活动记录</button>'
        + '<button onclick="markComplete()" class="px-4 bg-[#2E3440] text-[#848E9C] text-[13px] rounded-xl py-3 border-0 cursor-pointer active:opacity-80">标记已完成</button>';
    }
  }

  // ── Sheet controls ─────────────────────────────────────────────
  window.openActivitySheet = function() {
    // Reset form state
    selectedChannel = '';
    selectedResult = '';
    document.querySelectorAll('.channel-btn').forEach(function(b) { b.classList.remove('selected'); });
    document.querySelectorAll('.result-btn').forEach(function(b) { b.classList.remove('selected'); });
    document.getElementById('sheet-summary').value = '';
    document.getElementById('sheet-next-action').value = '';
    document.getElementById('sheet-follow-up-at').value = '';
    document.getElementById('sheet-overlay').classList.add('active');
  };

  window.closeSheet = function(e) {
    if (e && e.target !== document.getElementById('sheet-overlay')) return;
    document.getElementById('sheet-overlay').classList.remove('active');
  };

  window.selectChannel = function(btn, val) {
    document.querySelectorAll('.channel-btn').forEach(function(b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedChannel = val;
  };

  window.selectResult = function(btn, val) {
    document.querySelectorAll('.result-btn').forEach(function(b) { b.classList.remove('selected'); });
    btn.classList.add('selected');
    selectedResult = val;
  };

  window.saveActivity = function() {
    if (!selectedChannel || !selectedResult) {
      alert('请选择沟通渠道和沟通结果');
      return;
    }

    var evt = loadEvent();
    if (!evt) return;

    var today = new Date();
    var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
    var todayStr = today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());

    var newActivity = {
      id: 'act_' + Date.now(),
      occurred_at: todayStr,
      channel: selectedChannel,
      result: selectedResult,
      summary: document.getElementById('sheet-summary').value.trim()
    };

    evt.activities = evt.activities || [];
    evt.activities.unshift(newActivity);

    var newNextAction = document.getElementById('sheet-next-action').value.trim();
    var newFollowUpAt = document.getElementById('sheet-follow-up-at').value;
    if (newNextAction) evt.next_action = newNextAction;
    if (newFollowUpAt) evt.follow_up_at = newFollowUpAt;

    saveEvent(evt);
    document.getElementById('sheet-overlay').classList.remove('active');
    render();
  };

  // ── Mark complete ──────────────────────────────────────────────
  window.markComplete = function() {
    if (!confirm('确认标记此事件为已完成？')) return;
    var evt = loadEvent();
    if (!evt) return;
    evt.status = '已完成';
    var today = new Date();
    var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
    evt.completed_at = today.getFullYear() + '-' + pad(today.getMonth() + 1) + '-' + pad(today.getDate());
    saveEvent(evt);
    render();
  };

  // ── Init ──────────────────────────────────────────────────────
  render();

})();
</script>

</body>
</html>
