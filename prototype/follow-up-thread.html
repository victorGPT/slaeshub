(function() {
  var params = new URLSearchParams(location.search);
  var fuId = params.get('fuId');
  var shared = window.EventCenterShared;

  // Load event
  var fuEvents = [];
  try { fuEvents = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
  var ev = fuEvents.find(function(e) { return e.id === fuId; });

  if (!ev) {
    document.getElementById('view-profile-btn').innerHTML =
      '<span class="text-[13px] text-[#848E9C]">未找到跟进事件</span>';
    return;
  }

  // Load client
  var D = window.PROTOTYPE_DATA;
  var c = D && D.clientsById ? D.clientsById[ev.client_uid] : null;

  function esc(s) { return String(s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function timeAgo(isoStr) {
    if (!isoStr) return '';
    var now = new Date(), then = new Date(isoStr);
    if (isNaN(then)) return '';
    var diff = Math.floor((now - then) / 1000);
    if (diff < 3600) return '刚刚';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    var days = Math.floor(diff / 86400);
    if (days < 7) return days + '天前';
    if (days < 30) return Math.floor(days / 7) + '周前';
    return (then.getMonth() + 1) + '月' + then.getDate() + '日';
  }

  var todayStr = new Date().toISOString().split('T')[0];

  function daysInfo(fuAt) {
    if (!fuAt) return { text: '未设定', color: '#474D57' };
    var d = Math.round((new Date(fuAt) - new Date(todayStr)) / 86400000);
    if (d < 0) return { text: '逾期' + Math.abs(d) + '天', color: '#F6465D' };
    if (d === 0) return { text: '今天', color: '#F0B90B' };
    if (d === 1) return { text: '明天', color: '#F0B90B' };
    return { text: d + '天后', color: '#4DA6FF' };
  }



  // ── ① 客户附属行 ──
  document.getElementById('client-uid').textContent = ev.client_uid;
  document.getElementById('view-profile-btn').href = 'client-detail.html?uid=' + ev.client_uid;

  var _allClients = (window.PROTOTYPE_DATA || {}).clients || [];
  var _depositRank = c ? _allClients.filter(function(cl){ return cl.fMean > c.fMean; }).length + 1 : 9999;
  var _profitTotal = c && c.netContribution ? c.netContribution.total : 0;
  var _profitRank = _allClients.filter(function(cl){
    return (cl.netContribution ? cl.netContribution.total : 0) > _profitTotal;
  }).length + 1;

  function getAnalysis() {
    var t = ev.type || '';
    var rankCtx = _depositRank <= 20 ? '资沉排名前20，属核心高价值客户' :
                  _depositRank <= 50 ? '资沉排名前50，属优质客户' : '属活跃客户';
    var map = {
      '大额充值': '客户发生大额充值，' + rankCtx + '，建议主动跟进，巩固资金留存意愿。',
      '大额提现': '客户发生大额提现，存在资金流失风险，建议立即联系了解原因并尝试挽留。',

      '账户封禁': '客户账户遭到封禁，影响正常操作，需紧急跟进协助处理，避免客户流失。',
      '主动联系': '您主动发起了对该客户的联系，建议结合客户近期动态选择合适的话题切入。',
      '客户反馈': '客户有主动反馈，说明参与度较高，建议及时回应并转化为深度关系。'
    };
    return map[t] || ('建议根据客户当前情况，选择合适的跟进策略主动维系关系。');
  }

  function getRecommendedStrategy() {
    var t = ev.type || '';
    if ((t === '大额充值' || t === '大额盈利') && (_depositRank <= 20 || _profitRank <= 20)) return 'incentive';
    if (t === '大额盈利' && _depositRank <= 50) return 'cash';
    if (t === '客户反馈' && (_depositRank <= 20 || _profitRank <= 20)) return 'cash';
    if ((t === '大额充值' || t === '大额盈利') && _depositRank <= 50) return 'meeting';
    if (t === '账户封禁' || t === '大额提现' || t === '大额亏损') return 'script';
    return 'script';
  }

  var STRATEGY_REASONS = {
    script: function() {
      var t = ev.type || '';
      if (t === '大额提现') return '客户有提现意向，话术跟进可在不施压的前提下了解原因，尝试留存资金。';
      if (t === '大额亏损') return '客户情绪可能较低，主动发送关怀话术可稳定关系，降低流失风险。';
      if (t === '账户封禁') return '账户异常情况需第一时间通过话术安抚客户情绪，同步处理进度。';
      return '话术跟进成本低、响应快，适合作为基础维系手段。';
    },
    incentive: function() {
      var amt = _depositRank <= 10 ? '1000U' : _depositRank <= 20 ? '500U' : '200U';
      var profitStr = _profitTotal > 0 ? '，近期利润贡献约 ¥' + Math.round(_profitTotal / 10000 * 10) / 10 + ' 万' : '';
      return '该客户资沉排名 #' + _depositRank + profitStr + '，建议发放 ' + amt + ' 礼金以强化粘性，回报率高。';
    },
    meeting: function() {
      return '客户资沉排名 #' + _depositRank + '，属高价值客户，面谈可建立更深信任，建议本周内安排。';
    },
    cash: function() {
      var amt = _depositRank <= 10 ? '¥3000' : _depositRank <= 20 ? '¥1500' : '¥500';
      var profitStr = _profitTotal > 0 ? '，利润贡献约 ¥' + Math.round(_profitTotal / 10000 * 10) / 10 + ' 万' : '';
      return '该客户资沉排名 #' + _depositRank + profitStr + '，建议发放 ' + amt + ' 现金奖励，见效快、感知强，适合此类时机。';
    }
  };

  function getCashSuggestion() {
    var amt = _depositRank <= 10 ? '¥3000' : _depositRank <= 20 ? '¥1500' : _depositRank <= 50 ? '¥500' : '¥200';
    var profitStr = _profitTotal > 0 ? '利润贡献约 ¥' + Math.round(_profitTotal / 10000 * 10) / 10 + ' 万，' : '';
    var reason = profitStr + '资沉排名 #' + _depositRank + '，建议发放 ' + amt + ' 现金奖励，见效快感知强，适合当前时机。';
    return { amount: '建议发放 ' + amt, reason: reason };
  }

  function getIncentiveSuggestion() {
    var amt = _depositRank <= 10 ? '1000U' : _depositRank <= 20 ? '500U' : _depositRank <= 50 ? '200U' : '200U';
    var profitStr = _profitTotal > 0 ? '近期利润贡献约 ¥' + Math.round(_profitTotal / 10000 * 10) / 10 + ' 万，' : '';
    var reason = profitStr + '资沉排名 #' + _depositRank + '，建议发放 ' + amt + ' 作为客户回馈，预计可有效提升留存率。';
    return { amount: '建议发放 ' + amt, reason: reason };
  }

  var TOOL_LABELS = { script: '话术跟进', incentive: '发放礼金', meeting: '面谈邀约', cash: '现金奖励' };

  window.switchTool = function(tab) {
    ['script','incentive','meeting','cash'].forEach(function(t) {
      document.getElementById('tool-panel-' + t).style.display = t === tab ? 'block' : 'none';
    });
  };

  function closeOtherStrategies() {
    document.getElementById('other-strategies-panel').style.display = 'none';
    document.getElementById('other-strategies-chevron').className = 'fa-solid fa-chevron-down';
  }

  window.toggleOtherStrategies = function() {
    var panel = document.getElementById('other-strategies-panel');
    var isOpen = panel.style.display !== 'none';
    if (isOpen) {
      closeOtherStrategies();
    } else {
      panel.style.display = 'block';
      document.getElementById('other-strategies-chevron').className = 'fa-solid fa-chevron-up';
    }
  };

  function buildOtherStrategyBtns(recommended) {
    var others = ['script','incentive','meeting','cash'].filter(function(t){ return t !== recommended; });
    var colors = { script: '#0ECB81', incentive: '#F0B90B', meeting: '#4DA6FF', cash: '#B45CF4' };
    document.getElementById('other-strategy-btns').innerHTML = others.map(function(t) {
      var c = colors[t];
      return '<button onclick="switchTool(\'' + t + '\');closeOtherStrategies();document.getElementById(\'tool-rec-label\').textContent=TOOL_LABELS[\'' + t + '\']"'
        + ' style="flex:1;height:34px;border-radius:8px;font-size:12px;cursor:pointer;background:#2B3139;color:' + c + ';border:1px solid ' + c + '33;font-weight:500">'
        + TOOL_LABELS[t] + '</button>';
    }).join('');
  }

  function renderScriptPills() {
    var pills = document.getElementById('script-style-pills');
    pills.innerHTML = SCRIPT_STYLES.map(function(s) {
      var active = s === _curStyle;
      return '<button onclick="selectScriptStyle(\'' + s + '\')" style="padding:4px 10px;border-radius:999px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;'
        + (active ? 'background:#0ECB81;color:#0B0E11;font-weight:600;border:1px solid #0ECB81'
                  : 'background:#2B3139;color:#848E9C;border:1px solid #2E3440')
        + '">' + s + '</button>';
    }).join('');
  }

  function updateScriptText() {
    var map = SCRIPT_TEMPLATES[ev.type] || SCRIPT_FALLBACK;
    document.getElementById('script-content').textContent = map[_curStyle] || '';
  }

  window.selectScriptStyle = function(style) {
    _curStyle = style;
    renderScriptPills();
    updateScriptText();
  };

  window.copyScript = function() {
    var text = document.getElementById('script-content').textContent;
    if (!text) return;
    var btn = document.getElementById('copy-script-btn');
    navigator.clipboard.writeText(text).then(function() {
      btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:6px"></i>已复制';
      setTimeout(function() { btn.innerHTML = '<i class="fa-regular fa-copy" style="margin-right:6px"></i>复制话术'; }, 1500);
    });
  };

  function renderIncentivePills() {
    var pills = document.getElementById('incentive-style-pills');
    pills.innerHTML = SCRIPT_STYLES.map(function(s) {
      var active = s === _curIncentiveStyle;
      return '<button onclick="selectIncentiveStyle(\'' + s + '\')" style="padding:4px 10px;border-radius:999px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;'
        + (active ? 'background:#F0B90B;color:#0B0E11;font-weight:600;border:1px solid #F0B90B'
                  : 'background:#2B3139;color:#848E9C;border:1px solid #2E3440')
        + '">' + s + '</button>';
    }).join('');
  }

  function updateIncentiveText() {
    document.getElementById('incentive-script-content').textContent = INCENTIVE_SCRIPTS[_curIncentiveStyle] || '';
  }

  window.selectIncentiveStyle = function(style) {
    _curIncentiveStyle = style;
    renderIncentivePills();
    updateIncentiveText();
  };

  window.copyIncentiveScript = function() {
    var text = document.getElementById('incentive-script-content').textContent;
    if (!text) return;
    var btn = document.getElementById('copy-incentive-btn');
    navigator.clipboard.writeText(text).then(function() {
      btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:6px"></i>已复制';
      setTimeout(function() { btn.innerHTML = '<i class="fa-regular fa-copy" style="margin-right:6px"></i>复制话术'; }, 1500);
    });
  };

  function renderMeetingPills() {
    var pills = document.getElementById('meeting-style-pills');
    pills.innerHTML = SCRIPT_STYLES.map(function(s) {
      var active = s === _curMeetingStyle;
      return '<button onclick="selectMeetingStyle(\'' + s + '\')" style="padding:4px 10px;border-radius:999px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;'
        + (active ? 'background:#4DA6FF;color:#0B0E11;font-weight:600;border:1px solid #4DA6FF'
                  : 'background:#2B3139;color:#848E9C;border:1px solid #2E3440')
        + '">' + s + '</button>';
    }).join('');
  }

  function updateMeetingText() {
    document.getElementById('meeting-content').textContent = MEETING_SCRIPTS[_curMeetingStyle] || '';
  }

  window.selectMeetingStyle = function(style) {
    _curMeetingStyle = style;
    renderMeetingPills();
    updateMeetingText();
  };

  window.copyMeeting = function() {
    var text = document.getElementById('meeting-content').textContent;
    if (!text) return;
    var btn = document.getElementById('copy-meeting-btn');
    navigator.clipboard.writeText(text).then(function() {
      btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:6px"></i>已复制';
      setTimeout(function() { btn.innerHTML = '<i class="fa-regular fa-copy" style="margin-right:6px"></i>复制邀约话术'; }, 1500);
    });
  };

  function renderCashPills() {
    var pills = document.getElementById('cash-style-pills');
    pills.innerHTML = SCRIPT_STYLES.map(function(s) {
      var active = s === _curCashStyle;
      return '<button onclick="selectCashStyle(\'' + s + '\')" style="padding:4px 10px;border-radius:999px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;'
        + (active ? 'background:#B45CF4;color:#0B0E11;font-weight:600;border:1px solid #B45CF4'
                  : 'background:#2B3139;color:#848E9C;border:1px solid #2E3440')
        + '">' + s + '</button>';
    }).join('');
  }

  function updateCashText() {
    document.getElementById('cash-script-content').textContent = CASH_SCRIPTS[_curCashStyle] || '';
  }

  window.selectCashStyle = function(style) {
    _curCashStyle = style;
    renderCashPills();
    updateCashText();
  };

  window.copyCashScript = function() {
    var text = document.getElementById('cash-script-content').textContent;
    if (!text) return;
    var btn = document.getElementById('copy-cash-btn');
    navigator.clipboard.writeText(text).then(function() {
      btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:6px"></i>已复制';
      setTimeout(function() { btn.innerHTML = '<i class="fa-regular fa-copy" style="margin-right:6px"></i>复制话术'; }, 1500);
    });
  };

  // ── 初始化工具包 ──
  document.getElementById('tool-analysis').textContent = getAnalysis();
  var sug = getIncentiveSuggestion();
  document.getElementById('incentive-amount-text').textContent = sug.amount;
  document.getElementById('incentive-reason-text').textContent = sug.reason;
  var cashSug = getCashSuggestion();
  document.getElementById('cash-amount-text').textContent = cashSug.amount;
  document.getElementById('cash-reason-text').textContent = cashSug.reason;
  renderScriptPills();
  updateScriptText();
  renderIncentivePills();
  updateIncentiveText();
  renderMeetingPills();
  updateMeetingText();
  renderCashPills();
  updateCashText();
  var _recommended = getRecommendedStrategy();
  document.getElementById('tool-rec-label').textContent = TOOL_LABELS[_recommended] || '';
  buildOtherStrategyBtns(_recommended);
  switchTool(_recommended);

  // ── 底部单按钮逻辑 ──
  var shared2 = window.EventCenterShared;
  function getFlagged() { return shared2 ? shared2.loadFlagged(localStorage) : []; }
  function isFlagged() {
    return getFlagged().some(function(f) { return f.fuId === ev.id; });
  }
  function syncActionBtn() {
    var btn = document.getElementById('action-btn');
    if (!btn) return;
    if (isFlagged()) {
      btn.textContent = '已完成';
      btn.style.background = '#2B3139';
      btn.style.color = '#EAECEF';
      btn.style.border = '1px solid #2E3440';
    } else {
      btn.textContent = '加入待办';
      btn.style.background = 'rgba(240,185,11,0.15)';
      btn.style.color = '#F0B90B';
      btn.style.border = '1px solid rgba(240,185,11,0.35)';
    }
  }
  window.handleActionBtn = function() {
    if (isFlagged()) {
      // 已完成：从待办移除 + 标记已结束
      if (shared2) {
        shared2.saveFlagged(localStorage, shared2.removeFlaggedEntry(getFlagged(), ev.id));
        shared2.saveClosed(localStorage, shared2.closeEventIds(shared2.loadClosed(localStorage), ev.id));
      }
    } else {
      // 加入待办
      if (shared2) {
        var next = shared2.upsertFlaggedEntry(getFlagged(), ev.id, 'pending', new Date().toISOString());
        shared2.saveFlagged(localStorage, next);
      }
    }
    if (history.length > 1) { history.back(); } else { location.reload(); }
  };
  syncActionBtn();

  // ── 编辑标题 ──
  window.enterEditMode = function() {
    var textarea = document.getElementById('task-title-edit');
    textarea.value = ev.title || '';
    document.getElementById('task-title-view').classList.add('hidden');
    textarea.classList.remove('hidden');
    document.getElementById('edit-actions').classList.remove('hidden');
    textarea.focus();
  };
  window.cancelEdit = function() {
    document.getElementById('task-title-view').classList.remove('hidden');
    document.getElementById('task-title-edit').classList.add('hidden');
    document.getElementById('edit-actions').classList.add('hidden');
  };
  window.saveEdit = function() {
    var newTitle = document.getElementById('task-title-edit').value.trim();
    if (!newTitle) return;
    ev.title = newTitle;
    var all = [];
    try { all = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    all.forEach(function(e) { if (e.id === ev.id) e.title = newTitle; });
    localStorage.setItem('follow_up_events', JSON.stringify(all));
    document.getElementById('event-goal').textContent = newTitle;
    window.cancelEdit();
  };

  window.openDeleteSheet = function() {
    var sheet = document.getElementById('delete-sheet');
    sheet.style.display = 'flex';
  };
  window.closeDeleteSheet = function() {
    document.getElementById('delete-sheet').style.display = 'none';
  };
  window.confirmDelete = function() {
    var fuId = new URLSearchParams(location.search).get('fuId');
    var all = [];
    try { all = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    all = all.filter(function(e) { return e.id !== fuId; });
    localStorage.setItem('follow_up_events', JSON.stringify(all));
    if (shared) {
      shared.saveFlagged(localStorage, shared.removeFlaggedEntry(shared.loadFlagged(localStorage), fuId));
      shared.saveClosed(localStorage, shared.reopenEventIds(shared.loadClosed(localStorage), fuId));
    }
    history.back();
  };

})();
</script>

<div id="delete-sheet" style="display:none;position:fixed;inset:0;z-index:50;align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeDeleteSheet()">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6);pointer-events:none"></div>
  <div style="position:relative;width:393px;background:#1E2329;border-radius:16px 16px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));z-index:1">
    <div style="font-size:15px;font-weight:600;color:#EAECEF;margin-bottom:6px">删除任务</div>
    <div style="font-size:13px;color:#848E9C;margin-bottom:20px">删除后无法恢复，确认删除这个任务吗？</div>
    <div style="display:flex;gap:8px">
      <button onclick="closeDeleteSheet()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;color:#848E9C;border:1px solid #2E3440;background:none;cursor:pointer">取消</button>
      <button onclick="confirmDelete()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;background:#F6465D;color:#fff;border:0;cursor:pointer">确认删除</button>
    </div>
  </div>
</div>

</body>
</html>
