<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub — 任务详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg': '#0B0E11', 'hub-card': '#1E2329', 'hub-border': '#2E3440',
            'hub-gold': '#F0B90B', 'hub-red': '#F6465D', 'hub-green': '#0ECB81',
            'hub-blue': '#4DA6FF', 'hub-text': '#EAECEF', 'hub-muted': '#848E9C',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .pill-btn { padding: 5px 12px; border-radius: 999px; font-size: 12px; background: #2B3139; color: #848E9C; border: 1px solid #2E3440; cursor: pointer; white-space: nowrap; }
    .pill-btn.active { background: #F0B90B; color: #0B0E11; font-weight: 600; border-color: #F0B90B; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full pb-[140px]">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[44px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center">
      <i class="fa-solid fa-chevron-left text-[16px] text-[#EAECEF]"></i>
    </button>
    <h1 class="text-[16px] font-bold text-[#EAECEF]">任务详情</h1>
    <span id="status-badge" class="text-[11px] px-2.5 py-1 rounded-full font-medium"></span>
  </div>

  <!-- ① 客户信息卡 -->
  <div id="client-card" class="mx-3 mt-2 mb-2 bg-[#1E2329] rounded-2xl border border-[#2E3440] overflow-hidden">
    <!-- Row 1: Identity -->
    <div class="flex items-center gap-3 px-4 pt-3 pb-2">
      <button id="fav-btn" onclick="toggleFav()" class="w-8 h-8 flex items-center justify-center rounded-full bg-[#2B3139] flex-shrink-0 active:scale-95 transition-transform">
        <i id="fav-icon" class="fa-regular fa-star text-[14px] text-[#474D57]"></i>
      </button>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <button id="uid-btn" onclick="copyUid()" class="flex items-center gap-1.5 active:opacity-70">
            <span id="client-uid" class="text-[16px] font-bold text-[#EAECEF] tabular-nums tracking-wide"></span>
            <i class="fa-regular fa-copy text-[10px] text-[#474D57]"></i>
          </button>
          <span id="client-nickname" class="text-[12px] text-[#848E9C]"></span>
        </div>
      </div>
    </div>
    <!-- Row 2: Tags -->
    <div id="tags-row" class="px-4 pb-2 flex flex-wrap gap-1"></div>
    <!-- Row 3: 资沉主指标 -->
    <div class="px-4 pb-2">
      <div class="text-[10px] text-[#474D57] mb-0.5">资沉</div>
      <div class="flex items-baseline gap-2">
        <span id="deposit-hero" class="text-[28px] font-bold text-[#EAECEF] tracking-tight leading-none"></span>
        <div id="deposit-delta" class="flex items-center gap-0.5 text-[11px]"></div>
      </div>
    </div>
    <!-- Row 4: 充提 / 利润贡献 / 交易盈亏 -->
    <div class="flex px-4 pb-3 gap-0">
      <div class="flex-1">
        <div class="text-[10px] text-[#474D57] mb-0.5">充提</div>
        <span id="cashflow-hero" class="text-[15px] font-bold leading-none">--</span>
      </div>
      <div class="flex-1">
        <div class="text-[10px] text-[#474D57] mb-0.5">利润贡献</div>
        <span id="profit-hero" class="text-[15px] font-bold text-[#4DA6FF] leading-none">--</span>
      </div>
      <div class="flex-1">
        <div class="text-[10px] text-[#474D57] mb-0.5">交易盈亏</div>
        <span id="pnl-hero" class="text-[15px] font-bold text-[#848E9C] leading-none">--</span>
      </div>
    </div>
    <div class="flex justify-end px-4 pb-2 -mt-1">
      <span id="data-refresh-time" class="text-[9px] text-[#474D57]"></span>
    </div>
  </div>

  <div class="px-4 pb-1 -mt-1 flex justify-end">
    <a id="full-profile-link" href="#" class="text-[11px] text-[#4DA6FF]">查看完整资料 →</a>
  </div>

  <!-- ② 任务信息卡 -->
  <div class="mx-3 mt-3 bg-[#1E2329] rounded-2xl border border-[#2E3440] p-4">
    <div class="mb-3">
      <div class="text-[11px] text-[#848E9C] mb-1">任务名称</div>
      <div id="event-goal" class="text-[15px] font-semibold text-[#EAECEF]"></div>
      <div id="event-meta" class="text-[11px] text-[#848E9C] mt-1.5"></div>
    </div>
    <!-- 活动记录 -->
    <div class="border-t border-[#2E3440] pt-3">
      <div class="text-[12px] text-[#848E9C] mb-2">活动记录</div>
      <div id="activities-list" class="border-l-2 border-[#2E3440] pl-3 space-y-3"></div>
    </div>
    <div class="border-t border-[#2E3440] mt-3 pt-3">
      <button onclick="openDeleteSheet()" style="font-size:12px;color:#F6465D;background:none;border:none;cursor:pointer;padding:0">删除任务</button>
    </div>
  </div>

</div>

<!-- ③ 底部操作栏 -->
<div id="action-bar" class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30 px-4 pt-3" style="padding-bottom:calc(0.75rem + env(safe-area-inset-bottom))">
</div>

<!-- 已结束 Bottom Sheet -->
<div id="done-sheet" class="fixed inset-0 z-50 hidden items-end justify-center" onclick="if(event.target===this)closeDoneSheet()">
  <div class="absolute inset-0 bg-black/60"></div>
  <div class="relative w-[393px] bg-[#1E2329] rounded-t-2xl p-5" style="padding-bottom:calc(1.25rem + env(safe-area-inset-bottom))">
    <div class="flex items-center justify-between mb-4">
      <span class="text-[15px] font-semibold text-[#EAECEF]">完成任务</span>
      <button onclick="closeDoneSheet()" class="w-7 h-7 flex items-center justify-center text-[#848E9C] text-[18px]">✕</button>
    </div>
    <div class="text-[11px] text-[#848E9C] mb-2">结果</div>
    <div class="flex gap-2 mb-4">
      <button id="done-outcome-success" onclick="selectOutcome('成功')" class="done-outcome-btn flex-1 py-2 rounded-xl text-[13px] border border-[#0ECB81] text-[#0ECB81] active:opacity-70" style="font-weight:600">成功</button>
      <button id="done-outcome-fail" onclick="selectOutcome('失败')" class="done-outcome-btn flex-1 py-2 rounded-xl text-[13px] border border-[#2E3440] text-[#848E9C] active:opacity-70">失败</button>
      <button id="done-outcome-other" onclick="selectOutcome('其他')" class="done-outcome-btn flex-1 py-2 rounded-xl text-[13px] border border-[#2E3440] text-[#848E9C] active:opacity-70">其他</button>
    </div>
    <div class="text-[11px] text-[#848E9C] mb-1">本次内容 + 说明（选填）</div>
    <textarea id="done-note" rows="3" class="w-full bg-[#2B3139] text-[#EAECEF] text-[13px] rounded-lg px-3 py-2.5 border border-[#2E3440] outline-none placeholder-[#474D57] resize-none mb-4" placeholder="记录这次做了什么、结果如何..."></textarea>
    <button onclick="confirmDone()" class="w-full py-3 rounded-xl text-[14px] font-semibold bg-[#0ECB81] text-[#0B0E11] active:opacity-80">确认完成</button>
  </div>
</div>

<!-- 继续跟进 Bottom Sheet -->
<div id="followup-sheet" class="fixed inset-0 z-50 hidden items-end justify-center" onclick="if(event.target===this)closeFollowupSheet()">
  <div class="absolute inset-0 bg-black/60"></div>
  <div class="relative w-[393px] bg-[#1E2329] rounded-t-2xl p-5" style="padding-bottom:calc(1.25rem + env(safe-area-inset-bottom))">
    <div class="flex items-center justify-between mb-4">
      <span class="text-[15px] font-semibold text-[#EAECEF]">继续跟进</span>
      <button onclick="closeFollowupSheet()" class="w-7 h-7 flex items-center justify-center text-[#848E9C] text-[18px]">✕</button>
    </div>
    <div class="text-[11px] text-[#848E9C] mb-1">本次跟进内容（选填）</div>
    <textarea id="followup-note" rows="3" class="w-full bg-[#2B3139] text-[#EAECEF] text-[13px] rounded-lg px-3 py-2.5 border border-[#2E3440] outline-none placeholder-[#474D57] resize-none mb-4" placeholder="简要说明这次做了什么..."></textarea>
    <div class="text-[11px] text-[#848E9C] mb-2">下次提醒</div>
    <div class="flex gap-2 mb-3">
      <button id="fu-days-3" onclick="selectFollowupDays(3)" class="fu-days-btn flex-1 py-2 rounded-xl text-[13px] border border-[#F0B90B] text-[#F0B90B] active:opacity-70">3天后</button>
      <button id="fu-days-7" onclick="selectFollowupDays(7)" class="fu-days-btn flex-1 py-2 rounded-xl text-[13px] border border-[#2E3440] text-[#848E9C] active:opacity-70">1周后</button>
      <button id="fu-days-0" onclick="selectFollowupDays(0)" class="fu-days-btn flex-1 py-2 rounded-xl text-[13px] border border-[#2E3440] text-[#848E9C] active:opacity-70">自定义</button>
    </div>
    <input type="date" id="followup-custom-date" class="hidden w-full bg-[#2B3139] text-[#EAECEF] text-[12px] rounded-lg px-3 py-2 border border-[#2E3440] outline-none mb-3" style="color-scheme:dark">
    <button onclick="confirmFollowup()" class="w-full py-3 rounded-xl text-[14px] font-semibold bg-[#F0B90B] text-[#0B0E11] active:opacity-80">确认</button>
  </div>
</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var fuId = params.get('fuId');

  // Load event
  var fuEvents = [];
  try { fuEvents = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
  var ev = fuEvents.find(function(e) { return e.id === fuId; });

  if (!ev) {
    document.getElementById('client-card').innerHTML =
      '<div class="p-8 text-center text-[#848E9C] text-[13px]">未找到跟进事件</div>';
    return;
  }

  // Load client
  var D = window.PROTOTYPE_DATA;
  var c = D && D.clientsById ? D.clientsById[ev.client_uid] : null;

  function esc(s) { return String(s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function timeAgo(isoStr) {
    if (!isoStr) return '';
    var now = new Date(), then = new Date(isoStr);
    if (isNaN(then)) return '';
    var diff = Math.floor((now - then) / 1000);
    if (diff < 3600) return '刚刚';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    var days = Math.floor(diff / 86400);
    if (days < 7) return days + '天前';
    if (days < 30) return Math.floor(days / 7) + '周前';
    return (then.getMonth() + 1) + '月' + then.getDate() + '日';
  }

  var todayStr = new Date().toISOString().split('T')[0];

  function daysInfo(fuAt) {
    if (!fuAt) return { text: '未设定', color: '#474D57' };
    var d = Math.round((new Date(fuAt) - new Date(todayStr)) / 86400000);
    if (d < 0) return { text: '逾期' + Math.abs(d) + '天', color: '#F6465D' };
    if (d === 0) return { text: '今天', color: '#F0B90B' };
    if (d === 1) return { text: '明天', color: '#F0B90B' };
    return { text: d + '天后', color: '#4DA6FF' };
  }

  // ── Status badge ──
  var STATUS_STYLE = {
    '未开始': { bg: 'rgba(240,185,11,0.15)', color: '#F0B90B' },
    '跟进中': { bg: 'rgba(77,166,255,0.15)', color: '#4DA6FF' },
    '已结束': { bg: 'rgba(14,203,129,0.15)', color: '#0ECB81' },
  };
  var ss = STATUS_STYLE[ev.status] || STATUS_STYLE['已结束'];
  var badge = document.getElementById('status-badge');
  badge.textContent = ev.status;
  badge.style.background = ss.bg;
  badge.style.color = ss.color;

  // ── ① Client header ──
  document.getElementById('client-uid').textContent = ev.client_uid;
  document.getElementById('full-profile-link').href = 'client-detail.html?uid=' + ev.client_uid;

  if (c) {
    var nickname = localStorage.getItem('nickname_' + c.uid) || '';
    document.getElementById('client-nickname').textContent = nickname;

    function fmtUSDT(val, showSign) {
      var abs = Math.abs(val);
      var sign = showSign ? (val >= 0 ? '+' : '-') : (val < 0 ? '-' : '');
      var num = abs >= 1000000 ? (abs / 1000000).toFixed(1) + 'M'
              : abs >= 1000   ? (abs / 1000).toFixed(1) + 'K'
              :                  Math.round(abs).toString();
      return sign + '$' + num;
    }

    // 资沉
    document.getElementById('deposit-hero').textContent = fmtUSDT(c.fMean);

    // deposit-delta（用均值对比）
    var allClients2 = (window.PROTOTYPE_DATA || {}).clients || [];
    var weeks = c.weeks || [];
    var depDeltaEl = document.getElementById('deposit-delta');
    if (weeks.length >= 2) {
      var avg8 = 0;
      for (var j = 0; j < weeks.length - 1; j++) avg8 += weeks[j];
      avg8 = avg8 / (weeks.length - 1);
      var pct = avg8 > 0 ? ((weeks[weeks.length - 1] - avg8) / avg8 * 100) : 0;
      var isUp = pct >= 0;
      var dColor = isUp ? '#0ECB81' : '#F6465D';
      depDeltaEl.innerHTML = '<span style="color:' + dColor + ';font-size:11px">' + (isUp ? '+' : '') + pct.toFixed(1) + '%</span>';
    }

    // 充提
    var cashflowEl = document.getElementById('cashflow-hero');
    var delta = weeks.length >= 2 ? weeks[weeks.length - 1] - weeks[weeks.length - 2] : null;
    if (delta !== null) {
      cashflowEl.textContent = fmtUSDT(delta, true);
      cashflowEl.style.color = delta >= 0 ? '#0ECB81' : '#F6465D';
    } else {
      cashflowEl.textContent = '--'; cashflowEl.style.color = '#474D57';
    }

    // 利润贡献
    var profitEl = document.getElementById('profit-hero');
    if (c.netContribution && c.netContribution.total) {
      profitEl.textContent = fmtUSDT(c.netContribution.total);
      profitEl.style.color = '#4DA6FF';
    } else { profitEl.textContent = '--'; }

    // 交易盈亏
    var pnlEl = document.getElementById('pnl-hero');
    var pnlVal = c.clientPnl && c.clientPnl.total7d ? c.clientPnl.total7d.value : null;
    if (pnlVal !== null) {
      pnlEl.textContent = fmtUSDT(pnlVal, true);
      pnlEl.style.color = pnlVal >= 0 ? '#0ECB81' : '#F6465D';
    } else { pnlEl.textContent = '--'; pnlEl.style.color = '#848E9C'; }

    // 刷新时间
    var refreshEl = document.getElementById('data-refresh-time');
    var D2 = window.PROTOTYPE_DATA;
    if (refreshEl && D2 && D2.generatedAt) {
      var rd = new Date(D2.generatedAt);
      refreshEl.textContent = '数据截至 ' + (rd.getMonth() + 1) + '月' + rd.getDate() + '日';
    }

    // Fav
    var favKey = 'fav_' + c.uid;
    var isFav = localStorage.getItem(favKey) === '1';
    function renderFav() {
      var icon = document.getElementById('fav-icon');
      icon.className = isFav
        ? 'fa-solid fa-star text-[14px] text-[#F0B90B]'
        : 'fa-regular fa-star text-[14px] text-[#474D57]';
    }
    renderFav();
    window.toggleFav = function() {
      isFav = !isFav;
      localStorage.setItem(favKey, isFav ? '1' : '0');
      renderFav();
    };

    // sysTags 完整版
    var sysTags = [];
    var depositRank = allClients2.filter(function(cl) { return cl.fMean > c.fMean; }).length + 1;
    if (depositRank <= 100) {
      var dc = depositRank <= 10 ? '#F0B90B' : depositRank <= 50 ? '#4DA6FF' : '#848E9C';
      var dbg = depositRank <= 10 ? 'rgba(240,185,11,0.12)' : depositRank <= 50 ? 'rgba(77,166,255,0.12)' : 'rgba(132,142,156,0.12)';
      sysTags.push({ label: '资沉 #' + depositRank, color: dc, bg: dbg });
    }
    var myProfit = c.netContribution ? c.netContribution.total : 0;
    var profitRank = allClients2.filter(function(cl) {
      return (cl.netContribution ? cl.netContribution.total : 0) > myProfit;
    }).length + 1;
    if (profitRank <= 100) {
      var pc2 = profitRank <= 10 ? '#F0B90B' : profitRank <= 50 ? '#4DA6FF' : '#848E9C';
      var pbg2 = profitRank <= 10 ? 'rgba(240,185,11,0.12)' : profitRank <= 50 ? 'rgba(77,166,255,0.12)' : 'rgba(132,142,156,0.12)';
      sysTags.push({ label: '利润 #' + profitRank, color: pc2, bg: pbg2 });
    }
    var myPnl = c.clientPnl && c.clientPnl.total7d ? c.clientPnl.total7d.value : 0;
    var pnlRank = allClients2.filter(function(cl) {
      return (cl.clientPnl && cl.clientPnl.total7d ? cl.clientPnl.total7d.value : 0) > myPnl;
    }).length + 1;
    if (pnlRank <= 100) {
      var prc2 = pnlRank <= 10 ? '#F0B90B' : pnlRank <= 50 ? '#4DA6FF' : '#848E9C';
      var prb2 = pnlRank <= 10 ? 'rgba(240,185,11,0.12)' : pnlRank <= 50 ? 'rgba(77,166,255,0.12)' : 'rgba(132,142,156,0.12)';
      sysTags.push({ label: '盈亏 #' + pnlRank, color: prc2, bg: prb2 });
    }
    var manualTags = [];
    try { manualTags = JSON.parse(localStorage.getItem('bd_tags_' + c.uid) || '[]'); } catch(e) {}
    var tagsHtml = '';
    sysTags.forEach(function(t) {
      tagsHtml += '<span style="font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid ' + t.color + '30;color:' + t.color + ';background:' + t.bg + '">' + t.label + '</span>';
    });
    manualTags.forEach(function(t) {
      tagsHtml += '<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:#2B3139;color:#EAECEF">' + t + '</span>';
    });
    document.getElementById('tags-row').innerHTML = tagsHtml;
  }

  // Copy UID
  window.copyUid = function() {
    navigator.clipboard.writeText(ev.client_uid).then(function() {
      var icon = document.querySelector('#uid-btn i');
      icon.className = 'fa-solid fa-check text-[9px] text-[#0ECB81]';
      setTimeout(function() { icon.className = 'fa-regular fa-copy text-[10px] text-[#474D57]'; }, 1200);
    });
  };

  // ── ② Task info ──
  document.getElementById('event-goal').textContent = ev.title || '—';
  var firstAct = (ev.activities || []).find(function(a) { return a.type === '创建'; });
  var metaParts = [];
  if (firstAct && firstAct.note) metaParts.push(firstAct.note);
  if (ev.created_at) {
    var cd = new Date(ev.created_at);
    metaParts.push(cd.getFullYear() + '-' + ('0'+(cd.getMonth()+1)).slice(-2) + '-' + ('0'+cd.getDate()).slice(-2));
  }
  document.getElementById('event-meta').textContent = metaParts.join(' · ');

  var TYPE_META = {
    '创建': { color: '#F0B90B', label: '创建' },
    '跟进': { color: '#4DA6FF', label: '跟进' },
    '结束': { color: '#0ECB81', label: '结束' },
  };

  function renderActivities() {
    var list = document.getElementById('activities-list');
    var acts = ev.activities || [];
    if (acts.length === 0) {
      list.innerHTML = '<div class="text-[12px] text-[#474D57] py-1 pb-2">暂无活动记录</div>';
      return;
    }
    list.innerHTML = acts.slice().reverse().map(function(a) {
      var meta = TYPE_META[a.type];
      var dotColor = meta ? meta.color : '#4DA6FF';
      var typeTag = meta ? '<span style="color:' + meta.color + ';font-weight:600">[' + meta.label + ']</span> · ' : '';
      var timeLabel = timeAgo(a.occurred_at) || (a.occurred_at || '').slice(0, 10) || '';
      var body;
      if (a.type === '创建' || a.type === '跟进' || a.type === '结束') {
        var outcomeMap = { '成功': '#0ECB81', '失败': '#F6465D', '其他': '#848E9C' };
        var outcomeTag = (a.type === '结束' && a.outcome) ? '<span style="color:' + (outcomeMap[a.outcome] || '#848E9C') + ';font-weight:600;margin-right:4px">' + esc(a.outcome) + '</span>' : '';
        body = outcomeTag + esc(a.note || (a.type === '创建' ? '创建了跟进任务' : ''));
      } else {
        body = (a.channel || '') + (a.result ? ' · ' + a.result : '') + (a.summary ? '：' + esc(a.summary) : '');
      }
      return '<div class="relative pb-1">'
        + '<div class="absolute -left-[17px] top-[5px] w-2 h-2 rounded-full" style="background:' + dotColor + '"></div>'
        + '<div class="text-[10px] text-[#848E9C]">' + typeTag + timeLabel + ' · BD</div>'
        + (body ? '<div class="text-[12px] text-[#EAECEF] mt-0.5">' + body + '</div>' : '')
        + '</div>';
    }).join('');
  }
  renderActivities();

  // ── 继续跟进 sheet ──
  var _selectedFollowupDays = 3;

  window.openFollowupSheet = function() {
    document.getElementById('followup-note').value = '';
    document.getElementById('followup-custom-date').classList.add('hidden');
    _selectedFollowupDays = 3;
    document.querySelectorAll('.fu-days-btn').forEach(function(b) {
      b.style.borderColor = '#2E3440'; b.style.color = '#848E9C';
    });
    var d3 = document.getElementById('fu-days-3');
    d3.style.borderColor = '#F0B90B'; d3.style.color = '#F0B90B';
    var sheet = document.getElementById('followup-sheet');
    sheet.classList.remove('hidden'); sheet.classList.add('flex');
  };

  window.closeFollowupSheet = function() {
    var sheet = document.getElementById('followup-sheet');
    sheet.classList.add('hidden'); sheet.classList.remove('flex');
  };

  window.selectFollowupDays = function(days) {
    _selectedFollowupDays = days;
    document.querySelectorAll('.fu-days-btn').forEach(function(b) {
      b.style.borderColor = '#2E3440'; b.style.color = '#848E9C';
    });
    var btnId = days === 3 ? 'fu-days-3' : days === 7 ? 'fu-days-7' : 'fu-days-0';
    var activeBtn = document.getElementById(btnId);
    activeBtn.style.borderColor = '#F0B90B'; activeBtn.style.color = '#F0B90B';
    var customEl = document.getElementById('followup-custom-date');
    if (days === 0) {
      customEl.classList.remove('hidden');
      var d = new Date(); d.setDate(d.getDate() + 3);
      customEl.value = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    } else {
      customEl.classList.add('hidden');
    }
  };

  window.confirmFollowup = function() {
    var note = document.getElementById('followup-note').value.trim();
    var fuAt;
    if (_selectedFollowupDays === 0) {
      fuAt = document.getElementById('followup-custom-date').value;
    } else {
      var d = new Date(); d.setDate(d.getDate() + _selectedFollowupDays);
      fuAt = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
    }
    var activity = { type: '跟进', note: note, occurred_at: new Date().toISOString() };

    var all = [];
    try { all = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    all.forEach(function(e) {
      if (e.id === ev.id) {
        if (!e.activities) e.activities = [];
        e.activities.push(activity);
        if (fuAt) e.follow_up_at = fuAt;
        e.status = '跟进中';
        ev.activities = e.activities;
        ev.follow_up_at = e.follow_up_at;
        ev.status = e.status;
      }
    });
    sessionStorage.setItem('follow_up_events', JSON.stringify(all));

    // Write to comm_records for timeline sync
    var commKey = 'comm_records_' + ev.client_uid;
    var crs = [];
    try { crs = JSON.parse(sessionStorage.getItem(commKey) || '[]'); } catch(e) {}
    crs.unshift({
      occurred_at: activity.occurred_at, date: activity.occurred_at, bd: 'BD',
      title: ev.title, text: note || '跟进',
      event_id: ev.id, event_title: ev.title || ''
    });
    sessionStorage.setItem(commKey, JSON.stringify(crs));

    closeFollowupSheet();
    renderActivities();
    var ss2 = STATUS_STYLE['跟进中'];
    badge.textContent = '跟进中'; badge.style.background = ss2.bg; badge.style.color = ss2.color;
    renderActionBar();
  };

  // ── ③ Action bar ──
  function renderActionBar() {
    var bar = document.getElementById('action-bar');
    if (ev.status === '已结束') {
      var outcomeColor = { '成功': '#0ECB81', '失败': '#F6465D', '其他': '#848E9C' };
      var oc = ev.done_outcome || '';
      var ocHtml = oc ? '<span style="color:' + (outcomeColor[oc] || '#848E9C') + ';font-weight:600;margin-right:4px">' + oc + '</span>' : '';
      bar.innerHTML = '<div class="text-center text-[12px] text-[#474D57] py-2">'
        + '任务完成 · ' + ocHtml + (ev.done_note ? '"' + esc(ev.done_note) + '"' : '')
        + '</div>';
      return;
    }
    bar.innerHTML = '<div class="flex gap-2">'
      + '<button onclick="openFollowupSheet()" class="flex-1 py-3 rounded-xl text-[13px] font-semibold bg-[#4DA6FF] text-[#0B0E11] active:opacity-80">继续跟进</button>'
      + '<button onclick="openDoneSheet()" class="flex-1 py-3 rounded-xl text-[13px] font-semibold bg-[#0ECB81] text-[#0B0E11] active:opacity-80">完成任务</button>'
      + '</div>';
  }
  renderActionBar();

  function saveStatus(status, doneNote) {
    var all = [];
    try { all = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    all.forEach(function(e) {
      if (e.id === ev.id) {
        e.status = status;
        if (doneNote !== undefined) { e.done_note = doneNote; e.done_at = new Date().toISOString(); }
        ev.status = e.status;
        ev.done_note = e.done_note;
      }
    });
    sessionStorage.setItem('follow_up_events', JSON.stringify(all));
  }

  window.setFollowing = function() {
    saveStatus('跟进中');
    var ss2 = STATUS_STYLE['跟进中'];
    badge.textContent = '跟进中';
    badge.style.background = ss2.bg;
    badge.style.color = ss2.color;
    renderActionBar();
  };


  var _doneOutcome = '成功';
  window.selectOutcome = function(val) {
    _doneOutcome = val;
    var colors = { '成功': '#0ECB81', '失败': '#F6465D', '其他': '#848E9C' };
    var ids = { '成功': 'done-outcome-success', '失败': 'done-outcome-fail', '其他': 'done-outcome-other' };
    ['成功','失败','其他'].forEach(function(v) {
      var btn = document.getElementById(ids[v]);
      if (!btn) return;
      if (v === val) { btn.style.borderColor = colors[v]; btn.style.color = colors[v]; btn.style.fontWeight = '600'; }
      else { btn.style.borderColor = '#2E3440'; btn.style.color = '#848E9C'; btn.style.fontWeight = '400'; }
    });
  };
  window.openDoneSheet = function() {
    _doneOutcome = '成功';
    document.getElementById('done-note').value = '';
    window.selectOutcome('成功');
    var sheet = document.getElementById('done-sheet');
    sheet.classList.remove('hidden');
    sheet.classList.add('flex');
  };
  window.closeDoneSheet = function() {
    var sheet = document.getElementById('done-sheet');
    sheet.classList.add('hidden');
    sheet.classList.remove('flex');
  };
  window.confirmDone = function() {
    var note = document.getElementById('done-note').value.trim();
    var outcome = _doneOutcome;
    var doneAct = { type: '结束', outcome: outcome, note: note, occurred_at: new Date().toISOString() };
    var all = [];
    try { all = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    all.forEach(function(e) {
      if (e.id === ev.id) {
        if (!e.activities) e.activities = [];
        e.activities.push(doneAct);
        e.status = '已结束'; e.done_note = note; e.done_outcome = outcome; e.done_at = doneAct.occurred_at;
        ev.activities = e.activities; ev.status = e.status;
        ev.done_note = note; ev.done_outcome = outcome;
      }
    });
    sessionStorage.setItem('follow_up_events', JSON.stringify(all));

    // Write to comm_records timeline
    var commKey = 'comm_records_' + ev.client_uid;
    var crs = [];
    try { crs = JSON.parse(sessionStorage.getItem(commKey) || '[]'); } catch(e) {}
    var bodyText = '[结束] ' + outcome + (note ? ' · ' + note : '');
    crs.unshift({
      occurred_at: doneAct.occurred_at, date: doneAct.occurred_at, bd: 'BD',
      title: ev.title, text: bodyText,
      event_id: ev.id, event_title: ev.title || ''
    });
    sessionStorage.setItem(commKey, JSON.stringify(crs));

    closeDoneSheet();
    var ss2 = STATUS_STYLE['已结束'];
    badge.textContent = '已结束'; badge.style.background = ss2.bg; badge.style.color = ss2.color;
    renderActivities();
    renderActionBar();
  };

  window.openDeleteSheet = function() {
    var sheet = document.getElementById('delete-sheet');
    sheet.style.display = 'flex';
  };
  window.closeDeleteSheet = function() {
    document.getElementById('delete-sheet').style.display = 'none';
  };
  window.confirmDelete = function() {
    var fuId = new URLSearchParams(location.search).get('fuId');
    var all = [];
    try { all = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    all = all.filter(function(e) { return e.id !== fuId; });
    sessionStorage.setItem('follow_up_events', JSON.stringify(all));
    history.back();
  };
})();
</script>

<!-- 删除确认 Sheet -->
<div id="delete-sheet" style="display:none;position:fixed;inset:0;z-index:50;align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeDeleteSheet()">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6);pointer-events:none"></div>
  <div style="position:relative;width:393px;background:#1E2329;border-radius:16px 16px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));z-index:1">
    <div style="font-size:15px;font-weight:600;color:#EAECEF;margin-bottom:6px">删除任务</div>
    <div style="font-size:13px;color:#848E9C;margin-bottom:20px">删除后无法恢复，确认删除这个任务吗？</div>
    <div style="display:flex;gap:8px">
      <button onclick="closeDeleteSheet()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;color:#848E9C;border:1px solid #2E3440;background:none;cursor:pointer">取消</button>
      <button onclick="confirmDelete()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;background:#F6465D;color:#fff;border:0;cursor:pointer">确认删除</button>
    </div>
  </div>
</div>

</body>
</html>
