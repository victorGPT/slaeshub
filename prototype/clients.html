<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0B0E11" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 客户</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-center px-4 relative">
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">客户</h1>
    <div id="sync-badge" class="absolute right-4 flex items-center gap-1">
      <i class="fa-solid fa-rotate text-[10px] text-[#474D57]"></i>
      <span id="sync-time" class="text-[11px] text-[#474D57]"></span>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="px-4 pt-3 pb-2 relative z-20">
    <div class="flex items-center bg-[#1E2329] rounded-lg border border-[#2E3440] px-3 py-2">
      <i class="fa-solid fa-magnifying-glass text-[14px] text-[#848E9C] mr-2"></i>
      <input id="search-input" type="text" placeholder="搜索客户名称或UID"
        class="flex-1 bg-transparent text-[14px] text-[#EAECEF] outline-none placeholder-[#848E9C]"
        oninput="onSearchInput()" />
      <button id="search-clear" onclick="clearSearch()" class="hidden text-[#848E9C] text-[12px] ml-2 bg-transparent border-0 cursor-pointer">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div id="search-dropdown" class="hidden absolute left-4 right-4 top-full z-40 bg-[#1E2329] rounded-b-lg border border-t-0 border-[#2E3440] max-h-[320px] overflow-y-auto shadow-lg"></div>
  </div>

  <!-- Client List -->
  <div id="client-list" class="overflow-y-auto pb-[100px]" style="scrollbar-width:none;"></div>

</div>

<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="star.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-list-check text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">待办</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div style="height:env(safe-area-inset-bottom,0px)"></div>
</div>

<!-- Tooltip overlay -->
<div id="tip-overlay" onclick="hideTip()" style="display:none;position:fixed;inset:0;z-index:100"></div>
<div id="tip-box" style="display:none;position:fixed;z-index:101;background:#2B3139;border:1px solid #2E3440;border-radius:10px;padding:10px 14px;max-width:180px;font-size:12px;color:#EAECEF;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,0.5)"></div>

<script src="mock-data.js"></script>
<script src="mock-seed.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;
  var searchInput = document.getElementById('search-input');

  // 跟进事件：读取一次，供圆点指示使用
  var _fuEvents = [];
  try { _fuEvents = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
  var _todayStr = new Date().toISOString().split('T')[0];
  function getFollowUpDot(uid) {
    var dot = null;
    _fuEvents.forEach(function(e) {
      if (e.client_uid === uid && e.status !== '已结束') {
        dot = (e.follow_up_at < _todayStr) ? '#F6465D' : '#4DA6FF';
      }
    });
    return dot;
  }

  // 维度配置
  var SORT_CONFIG = {
    deposit:  { color: '#F0B90B' },
    profit:   { color: '#0ECB81' },
    favs:     { color: '#F0B90B' },
  };

  // 收藏 localStorage
  var FAV_KEY = 'slaeshub_favs';
  function getFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch(e) { return []; } }
  function setFavs(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }
  function isFav(uid) { return getFavs().indexOf(uid) !== -1; }
  function toggleFav(uid) {
    var arr = getFavs();
    var idx = arr.indexOf(uid);
    if (idx === -1) arr.push(uid); else arr.splice(idx, 1);
    setFavs(arr);
  }

  // 读取 URL 参数，默认 deposit
  var urlSort = new URLSearchParams(location.search).get('sort') || 'deposit';
  var activeSort = (SORT_CONFIG[urlSort] ? urlSort : 'deposit');
  var sortAsc = false; // 默认倒序（大→小）
  var PAGE_SIZE = 20;
  var currentPage = 1;

  // 金额格式化（K/M/B）
  function fmt(val, withSign) {
    var abs = Math.abs(val);
    var sign = withSign ? (val >= 0 ? '+' : '-') : (val < 0 ? '-' : '');
    if (abs >= 1e9) return sign + (abs / 1e9).toFixed(1) + 'B';
    if (abs >= 1e6) return sign + (abs / 1e6).toFixed(1) + 'M';
    if (abs >= 1e3) return sign + (abs / 1e3).toFixed(1) + 'K';
    return (withSign && val > 0 ? '+' : (val < 0 ? '-' : '')) + Math.round(abs).toLocaleString();
  }
  // 兼容旧调用
  function fmtWan(val) { return fmt(val, true); }

  // 获取当前维度的指标值文本
  function getMetricDisplay(c, sort) {
    if (sort === 'deposit') {
      return c.depositDisplay;
    }
    if (sort === 'profit') {
      return c.netContribution ? c.netContribution.totalDisplay : null;
    }
    return null;
  }

  // 排序函数
  function sortClients(list, sort) {
    var sorted = list.slice();
    if (sort === 'deposit') {
      sorted.sort(function(a, b) { return b.fMean - a.fMean; });
    } else if (sort === 'profit') {
      sorted.sort(function(a, b) {
        var ta = a.netContribution ? a.netContribution.total : 0;
        var tb = b.netContribution ? b.netContribution.total : 0;
        return tb - ta;
      });
    }
    return sorted;
  }

  var TIPS = {
    deposit: '客户过去 7 天持仓资产均值（USDT）',
    profit:  '客户过去 30 天为平台贡献的可统计利润',
  };

  // 表头
  function headerHTML() {
    var s = activeSort;
    var hc = function(col) {
      if (col === 'deposit') return s === 'deposit' ? '#F0B90B' : '#474D57';
      if (col === 'profit')  return s === 'profit'  ? '#0ECB81' : '#474D57';
    };
    var sortIcon = function(col) {
      var isActive = col === s;
      var upColor   = isActive && sortAsc  ? hc(col) : '#474D57';
      var downColor = isActive && !sortAsc ? hc(col) : '#474D57';
      return '<span style="display:inline-flex;flex-direction:column;align-items:center;margin-left:3px;gap:0;line-height:1">'
        + '<i class="fa-solid fa-caret-up"   style="font-size:8px;color:' + upColor   + ';display:block;margin-bottom:-1px"></i>'
        + '<i class="fa-solid fa-caret-down" style="font-size:8px;color:' + downColor + ';display:block"></i>'
        + '</span>';
    };
    var col = function(key, label, align) {
      var a = align || 'right';
      return '<span onclick="sortBy(\'' + key + '\')" style="font-size:13px;font-weight:600;text-align:' + a + ';color:' + hc(key) + ';cursor:pointer;display:flex;align-items:center;justify-content:flex-end;gap:1px;user-select:none">'
        + '<span>' + label + '</span>'
        + sortIcon(key)
        + '<i onclick="event.stopPropagation();showTip(\'' + key + '\',this)" class="fa-regular fa-circle-question" style="color:#474D57;font-size:9px;margin-left:3px;cursor:pointer"></i>'
        + '</span>';
    };
    return '<div style="display:grid;grid-template-columns:1fr 60px 52px;padding:7px 12px 5px;border-bottom:1px solid #2E3440">'
      + '<span style="font-size:13px;font-weight:600;color:#848E9C">客户</span>'
      + col('deposit', '资沉')
      + col('profit',  '利润')
      + '</div>';
  }

  // 渲染单行
  function rowHTML(c, sort, isLast) {
    var border = isLast ? '' : 'border-bottom:1px solid #2E3440;';

    var depositVal = c.fMean != null ? c.fMean : null;
    var depositHTML = depositVal != null
      ? '<span style="font-size:13px;font-weight:700;color:#F0B90B">' + fmt(depositVal, false) + '</span>'
      : '<span style="font-size:13px;color:#474D57">—</span>';

    var profitVal = c.netContribution ? c.netContribution.total : null;
    var profitHTML = profitVal != null
      ? '<span style="font-size:13px;font-weight:600;color:#0ECB81">' + fmt(profitVal, false) + '</span>'
      : '<span style="font-size:13px;color:#474D57">—</span>';

    var dotColor = getFollowUpDot(c.uid);
    var dotHTML = dotColor
      ? '<span style="width:6px;height:6px;border-radius:50%;background:' + dotColor + ';display:inline-block;margin-right:4px;flex-shrink:0;position:relative;top:-1px"></span>'
      : '';

    return '<a href="client-detail.html?uid=' + c.uid + '" '
      + 'style="display:grid;grid-template-columns:1fr 60px 52px;align-items:center;padding:10px 12px;' + border + 'text-decoration:none">'
      + '<div>'
      +   '<div style="font-size:12px;font-weight:600;color:#EAECEF;display:flex;align-items:center">' + dotHTML + c.uid + '</div>'
      +   (c.name ? '<div style="font-size:11px;color:#848E9C;margin-top:1px">' + c.name + '</div>' : '')
      + '</div>'
      + '<div style="text-align:right">' + depositHTML + '</div>'
      + '<div style="text-align:right">' + profitHTML  + '</div>'
      + '</a>';
  }

  // 更新胶囊样式
  function updateTabs() {
    document.querySelectorAll('.sort-tab').forEach(function(btn) {
      var s = btn.getAttribute('data-sort');
      if (s === activeSort) {
        btn.style.background = '#F0B90B';
        btn.style.color = '#0B0E11';
        btn.style.fontWeight = '600';
      } else {
        btn.style.background = '#2E3440';
        btn.style.color = '#848E9C';
        btn.style.fontWeight = '400';
      }
    });
  }

  function renderList() {
    var query = searchInput.value.toLowerCase();
    var pool = D.clients;
    if (activeSort === 'favs') {
      var favArr = getFavs();
      pool = favArr.map(function(uid) {
        return D.clients.filter(function(c) { return c.uid === uid; })[0];
      }).filter(Boolean);
      pool.sort(function(a, b) { return b.fMean - a.fMean; });
    }
    var filtered = pool.filter(function(c) {
      return !query || c.name.toLowerCase().includes(query) || c.uid.includes(query);
    });
    var sorted = activeSort === 'favs' ? filtered : sortClients(filtered, activeSort);
    if (sortAsc) sorted = sorted.slice().reverse();

    var total = sorted.length;
    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;
    var pageItems = sorted.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

    var innerHTML = pageItems.length
      ? pageItems.map(function(c, i) { return rowHTML(c, activeSort, i === pageItems.length - 1); }).join('')
      : activeSort === 'favs'
        ? '<div style="padding:48px 16px;text-align:center;color:#848E9C;font-size:13px">还没有收藏的客户</div>'
        : '<div style="padding:32px 16px;text-align:center;color:#848E9C;font-size:13px">未找到匹配的客户</div>';
    var listHTML = '<div style="margin:0 12px 8px;background:#1E2329;border-radius:16px;border:1px solid #2E3440;overflow:hidden">'
      + headerHTML() + innerHTML + '</div>';

    // 分页控件
    var paginationHTML = totalPages > 1 ? (
      '<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:16px;">'
      + '<button onclick="goPage(' + (currentPage - 1) + ')" style="background:#2E3440;border:0;border-radius:8px;padding:6px 14px;color:' + (currentPage <= 1 ? '#474D57' : '#EAECEF') + ';font-size:13px;cursor:' + (currentPage <= 1 ? 'default' : 'pointer') + '">'
      +   '<i class="fa-solid fa-chevron-left"></i>'
      + '</button>'
      + '<span style="font-size:12px;color:#848E9C">' + currentPage + ' / ' + totalPages + '<span style="margin-left:6px;color:#474D57">共' + total + '人</span></span>'
      + '<button onclick="goPage(' + (currentPage + 1) + ')" style="background:#2E3440;border:0;border-radius:8px;padding:6px 14px;color:' + (currentPage >= totalPages ? '#474D57' : '#EAECEF') + ';font-size:13px;cursor:' + (currentPage >= totalPages ? 'default' : 'pointer') + '">'
      +   '<i class="fa-solid fa-chevron-right"></i>'
      + '</button>'
      + '</div>'
    ) : '';

    document.getElementById('client-list').innerHTML = listHTML + paginationHTML;
  }

  window.goPage = function(p) {
    var totalPages = Math.max(1, Math.ceil(D.clients.length / PAGE_SIZE));
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    renderList();
    document.getElementById('client-list').scrollIntoView({ behavior: 'smooth' });
  };

  window.onToggleFav = function(uid, btn) {
    toggleFav(uid);
    var faved = isFav(uid);
    btn.style.color = faved ? '#F0B90B' : '#474D57';
    btn.innerHTML = '<i class="fa-' + (faved ? 'solid' : 'regular') + ' fa-star text-[14px]"></i>';
    if (activeSort === 'favs') renderList();
  };

  // 列标题排序（点同列切换升降序，点不同列默认降序）
  window.sortBy = function(col) {
    if (activeSort === col) {
      sortAsc = !sortAsc;
    } else {
      activeSort = col;
      sortAsc = false;
    }
    currentPage = 1;
    renderList();
  };

  // Tooltip
  window.showTip = function(col, el) {
    var box = document.getElementById('tip-box');
    var overlay = document.getElementById('tip-overlay');
    box.textContent = TIPS[col] || '';
    var rect = el.getBoundingClientRect();
    var boxW = 180;
    var left = Math.min(rect.left, window.innerWidth - boxW - 12);
    box.style.left = Math.max(12, left) + 'px';
    box.style.top = (rect.bottom + 6) + 'px';
    box.style.display = 'block';
    overlay.style.display = 'block';
  };
  window.hideTip = function() {
    document.getElementById('tip-box').style.display = 'none';
    document.getElementById('tip-overlay').style.display = 'none';
  };

  function renderSearchDropdown(query) {
    var dropdown = document.getElementById('search-dropdown');
    var clearBtn = document.getElementById('search-clear');
    var mainContent = document.getElementById('client-list');
    if (!query) {
      dropdown.classList.add('hidden');
      clearBtn.classList.add('hidden');
      if (mainContent) mainContent.style.display = '';
      return;
    }
    clearBtn.classList.remove('hidden');
    if (mainContent) mainContent.style.display = 'none';
    var q = query.toLowerCase();
    var matches = D.clients.filter(function(c) {
      return c.name.toLowerCase().indexOf(q) !== -1 || c.uid.toLowerCase().indexOf(q) !== -1;
    }).slice(0, 20);
    if (matches.length === 0) {
      dropdown.innerHTML = '<div class="text-center py-6 text-[13px] text-[#848E9C]">未找到匹配客户</div>';
    } else {
      dropdown.innerHTML = matches.map(function(c) {
        return '<a href="client-detail.html?uid=' + c.uid + '" class="flex items-center justify-between px-4 py-3 border-b border-[#2E3440] last:border-0 active:bg-[#2B3139]" style="text-decoration:none">'
          + '<div>'
          +   '<div class="text-[13px] font-medium text-[#EAECEF]">' + c.name + ' <span class="text-[11px] text-[#474D57]">UID ' + c.uid + '</span></div>'
          +   '<div class="text-[12px] text-[#848E9C] mt-0.5">' + (c.depositDisplay || '') + '</div>'
          + '</div>'
          + '<i class="fa-solid fa-chevron-right text-[10px] text-[#474D57]"></i>'
          + '</a>';
      }).join('');
    }
    dropdown.classList.remove('hidden');
  }

  window.onSearchInput = function() {
    var query = searchInput.value.trim();
    renderSearchDropdown(query);
  };

  window.clearSearch = function() {
    searchInput.value = '';
    renderSearchDropdown('');
    searchInput.focus();
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { searchInput.value = ''; renderSearchDropdown(''); }
  });

  // 同步时间角标（模拟：距今约2小时前）
  (function() {
    var d = new Date(Date.now() - 2 * 3600 * 1000 - 17 * 60 * 1000);
    var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
    document.getElementById('sync-time').textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ' 同步';
  })();

  // 初始化
  renderList();
})();
</script>

</body>
</html>
