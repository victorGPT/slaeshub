<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>任务详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':     '#0B0E11',
            'hub-card':   '#1E2329',
            'hub-border': '#2E3440',
            'hub-gold':   '#F0B90B',
            'hub-text':   '#EAECEF',
            'hub-muted':  '#848E9C',
            'hub-dim':    '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Nav bar -->
  <div class="h-[44px] border-b border-[#2E3440] flex items-center justify-between px-4 bg-[#0B0E11]">
    <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center">
      <i class="fa-solid fa-chevron-left text-[16px] text-[#EAECEF]"></i>
    </button>
    <h1 class="text-[16px] font-bold text-[#EAECEF]">任务详情</h1>
    <a id="goto-client" href="#" class="text-[12px] text-[#848E9C]">客户详情</a>
  </div>

  <!-- Client Header Card -->
  <div class="mx-3 mt-3 bg-[#1E2329] rounded-2xl border border-[#2E3440] overflow-hidden">
    <!-- Row 1: Identity -->
    <div class="flex items-center gap-3 px-4 pt-3 pb-2">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <span id="client-uid" class="text-[16px] font-bold text-[#EAECEF] tabular-nums tracking-wide"></span>
          <span id="top-nickname" class="text-[12px] text-[#848E9C]"></span>
        </div>
      </div>
    </div>
    <!-- Row 2: Tags -->
    <div id="tags-row" class="px-4 pb-2 flex flex-wrap gap-1"></div>
    <!-- Row 3: Deposit Hero + Delta -->
    <div class="px-4 pb-3">
      <div class="flex items-end gap-3">
        <div>
          <div class="text-[10px] text-[#474D57] mb-0.5">7日资沉</div>
          <span id="deposit-hero" class="text-[28px] font-bold text-[#EAECEF] tracking-tight leading-none"></span>
        </div>
        <div id="deposit-delta" class="mb-1 flex items-center gap-1"></div>
      </div>
      <div class="flex justify-end mt-0.5">
        <span id="data-refresh-time" class="text-[9px] text-[#474D57]"></span>
      </div>
    </div>
  </div>

  <!-- Task Card -->
  <div class="mx-3 mt-3 bg-[#1E2329] rounded-2xl border border-[#2E3440] p-4">
    <div id="task-text" class="text-[15px] text-[#EAECEF] leading-relaxed"></div>
    <div id="task-time" class="text-[11px] text-[#474D57] mt-2"></div>
    <div id="task-status-badge" class="mt-3"></div>
  </div>

  <!-- Actions -->
  <div class="mx-3 mt-3 flex gap-3">
    <button id="archive-btn" onclick="doArchive()" class="flex-1 h-[44px] bg-[#2B3139] text-[#EAECEF] text-[14px] font-medium rounded-xl border border-[#2E3440] active:opacity-70">归档</button>
    <button onclick="doDelete()" class="flex-1 h-[44px] text-[14px] font-medium rounded-xl active:opacity-70" style="background:rgba(246,70,93,0.12);color:#F6465D;border:1px solid rgba(246,70,93,0.2)">删除</button>
  </div>

</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var taskId = params.get('taskId');
  var c = uid ? D.clientsById[uid] : null;

  if (!c) {
    document.querySelector('.w-full').innerHTML += '<div class="mx-4 mt-8 text-center text-[#848E9C]">未找到客户数据</div>';
    return;
  }

  // 链接到客户详情
  document.getElementById('goto-client').href = 'client-detail.html?uid=' + uid;

  function esc(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function fmtFlow(v) {
    var abs = Math.abs(v);
    if (abs >= 10000) return '$' + Math.round(abs / 10000) + '万';
    if (abs >= 1000)  return '$' + (abs / 1000).toFixed(1) + '千';
    return '$' + Math.round(abs);
  }

  // === Header Card ===
  document.getElementById('client-uid').textContent = c.uid;
  var nick = localStorage.getItem('nickname_' + uid) || '';
  document.getElementById('top-nickname').textContent = nick;

  // 刷新时间
  if (D.generatedAt) {
    var rd = new Date(D.generatedAt);
    document.getElementById('data-refresh-time').textContent = '数据截至 ' + (rd.getMonth()+1) + '月' + rd.getDate() + '日';
  }

  // Deposit hero
  document.getElementById('deposit-hero').textContent = c.thisWeekDisplay || '-';

  // Delta
  var thisWeekVal = c.weeks[c.weeks.length - 1];
  var avgVal = c.fMean;
  var deltaAbs = thisWeekVal - avgVal;
  var deltaPct = avgVal > 0 ? ((thisWeekVal - avgVal) / avgVal * 100) : 0;
  var isUp = deltaAbs >= 0;
  var deltaColor = isUp ? '#0ECB81' : '#F6465D';
  var arrowChar = isUp ? '▲' : '▼';
  var signStr = isUp ? '+' : '';
  document.getElementById('deposit-delta').innerHTML =
    '<span style="font-size:13px;color:' + deltaColor + '">' + arrowChar + '</span>'
    + '<span style="font-size:16px;font-weight:700;color:' + deltaColor + ';margin-left:2px">' + signStr + fmtFlow(Math.round(deltaAbs)) + '</span>'
    + '<span style="font-size:11px;color:' + deltaColor + ';opacity:0.55;margin-left:8px">' + signStr + deltaPct.toFixed(1) + '%</span>';

  // Tags
  var allClients = D.clients;
  var sysTags = [];
  var depositRank = allClients.filter(function(cl) { return cl.fMean > c.fMean; }).length + 1;
  if (depositRank <= 100) {
    var dc = depositRank <= 10 ? '#F0B90B' : depositRank <= 50 ? '#4DA6FF' : '#848E9C';
    var dbg = depositRank <= 10 ? 'rgba(240,185,11,0.12)' : depositRank <= 50 ? 'rgba(77,166,255,0.12)' : 'rgba(132,142,156,0.12)';
    sysTags.push({ label: '资沉 #' + depositRank, color: dc, bg: dbg });
  }
  var myProfit = c.netContribution ? c.netContribution.total : 0;
  var profitRank = allClients.filter(function(cl) {
    return (cl.netContribution ? cl.netContribution.total : 0) > myProfit;
  }).length + 1;
  if (profitRank <= 100) {
    var pc = profitRank <= 10 ? '#F0B90B' : profitRank <= 50 ? '#4DA6FF' : '#848E9C';
    var pbg = profitRank <= 10 ? 'rgba(240,185,11,0.12)' : profitRank <= 50 ? 'rgba(77,166,255,0.12)' : 'rgba(132,142,156,0.12)';
    sysTags.push({ label: '利润 #' + profitRank, color: pc, bg: pbg });
  }
  var manualTags = [];
  try { manualTags = JSON.parse(localStorage.getItem('bd_tags_' + uid) || '[]'); } catch(e) {}
  var tagsHtml = sysTags.map(function(t) {
    return '<span style="font-size:9px;padding:2px 6px;border-radius:4px;border:1px solid ' + t.color + '30;color:' + t.color + ';background:' + t.bg + ';font-weight:500">' + t.label + '</span>';
  }).join('');
  tagsHtml += manualTags.map(function(t) {
    return '<span style="font-size:9px;padding:2px 6px;border-radius:4px;background:#2B3139;color:#EAECEF">' + esc(t) + '</span>';
  }).join('');
  document.getElementById('tags-row').innerHTML = tagsHtml;

  // === Task ===
  var taskKey = 'tasks_' + uid;
  var tasks = [];
  try { tasks = JSON.parse(localStorage.getItem(taskKey) || '[]'); } catch(e) {}
  var task = tasks.find(function(t) { return t.id === taskId; });

  if (!task) {
    document.getElementById('task-text').textContent = '任务不存在或已删除';
    document.getElementById('archive-btn').disabled = true;
    document.querySelector('[onclick="doDelete()"]').disabled = true;
    return;
  }

  function renderTask() {
    document.getElementById('task-text').textContent = task.text;
    document.getElementById('task-time').textContent = '创建于 ' + task.createdDisplay;
    var archiveBtn = document.getElementById('archive-btn');
    if (task.status === '归档') {
      archiveBtn.textContent = '取消归档';
      document.getElementById('task-status-badge').innerHTML =
        '<span style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(132,142,156,0.15);color:#848E9C">已归档</span>';
    } else {
      archiveBtn.textContent = '归档';
      document.getElementById('task-status-badge').innerHTML = '';
    }
  }
  renderTask();

  window.doArchive = function() {
    task.status = task.status === '归档' ? '处理中' : '归档';
    localStorage.setItem(taskKey, JSON.stringify(tasks));
    renderTask();
  };

  window.doDelete = function() {
    if (!confirm('确定删除这个任务吗？')) return;
    tasks = tasks.filter(function(t) { return t.id !== taskId; });
    localStorage.setItem(taskKey, JSON.stringify(tasks));
    history.back();
  };

})();
</script>
</body>
</html>
