<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 事件详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .state-btn { transition: all 0.15s ease; }
    .state-btn.active { transform: scale(1.02); }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav with Back -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <a href="events.html" class="w-8 h-8 flex items-center justify-center text-[#EAECEF]">
      <i class="fa-solid fa-chevron-left text-[16px]"></i>
    </a>
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">事件详情</h1>
    <div class="w-8"></div>
  </div>

  <!-- Content -->
  <div class="px-4 pb-[100px]">

    <!-- Event Header -->
    <div class="bg-[#1E2329] rounded-xl border border-[#2E3440] p-4 mt-4">
      <div class="flex items-start justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-[#F6465D] shrink-0"></span>
          <span class="text-[15px] font-semibold text-[#F6465D]">资沉流失预警</span>
        </div>
        <span class="text-[11px] text-[#848E9C]">2小时前</span>
      </div>
      <div class="flex items-center gap-2 mb-3">
        <div class="w-8 h-8 rounded-full bg-[#2B3139] border border-[#F0B90B] flex items-center justify-center shrink-0">
          <span class="text-[12px] font-bold text-[#F0B90B]">张</span>
        </div>
        <span class="text-[13px] text-[#EAECEF]">张伟 · UID 100023</span>
      </div>
      <div class="border-t border-[#2E3440] pt-3">
        <div class="text-[11px] text-[#848E9C] mb-0.5">资沉变化</div>
        <div class="text-[22px] font-bold text-[#F6465D] leading-tight">-$150万</div>
      </div>
    </div>

    <!-- AI Context -->
    <div class="bg-[#1A2420] border border-[#0ECB81]/30 rounded-xl p-4 mt-3">
      <div class="flex items-center gap-2 mb-3">
        <i class="fa-solid fa-robot text-[#0ECB81] text-[14px]"></i>
        <span class="text-[14px] font-semibold text-[#0ECB81]">AI 背景分析</span>
      </div>
      <p class="text-[13px] text-[#EAECEF] leading-relaxed">
        该客户近7天持续出金，30日均资沉从 $1,350万 降至 $1,200万。理财产品已到期未续存。
      </p>
    </div>

    <!-- Suggested Actions -->
    <div class="bg-[#1E2329] rounded-xl border border-[#2E3440] p-4 mt-3">
      <div class="flex items-center gap-2 mb-3">
        <i class="fa-solid fa-list-check text-[#F0B90B] text-[14px]"></i>
        <span class="text-[14px] font-semibold text-[#EAECEF]">建议行动</span>
      </div>
      <ol class="space-y-2.5 pl-0">
        <li class="flex gap-2">
          <span class="text-[#F0B90B] font-bold text-[13px] shrink-0">1.</span>
          <span class="text-[13px] text-[#EAECEF]">安排销售回访，了解出金原因</span>
        </li>
        <li class="flex gap-2">
          <span class="text-[#F0B90B] font-bold text-[13px] shrink-0">2.</span>
          <span class="text-[13px] text-[#EAECEF]">推送续存权益说明</span>
        </li>
        <li class="flex gap-2">
          <span class="text-[#F0B90B] font-bold text-[13px] shrink-0">3.</span>
          <span class="text-[13px] text-[#EAECEF]">提供资沉补贴券</span>
        </li>
      </ol>
    </div>

    <!-- Task State Buttons -->
    <div class="mt-4 mb-2">
      <div class="text-[13px] text-[#848E9C] mb-2">任务状态</div>
      <div class="flex gap-2" id="state-buttons">
        <button onclick="setTaskState(this, '未开始')"
          class="state-btn active flex-1 py-2.5 rounded-lg text-[13px] font-semibold bg-[#2D1B00] text-[#F0B90B] border border-[#F0B90B]/30">
          未开始
        </button>
        <button onclick="setTaskState(this, '跟进中')"
          class="state-btn flex-1 py-2.5 rounded-lg text-[13px] bg-[#2B3139] text-[#848E9C] border border-transparent">
          跟进中
        </button>
        <button onclick="setTaskState(this, '已完成')"
          class="state-btn flex-1 py-2.5 rounded-lg text-[13px] bg-[#2B3139] text-[#848E9C] border border-transparent">
          已完成
        </button>
        <button onclick="setTaskState(this, '已忽略')"
          class="state-btn flex-1 py-2.5 rounded-lg text-[13px] bg-[#2B3139] text-[#848E9C] border border-transparent">
          已忽略
        </button>
      </div>
    </div>

  </div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script>
  const stateStyles = {
    '未开始': { bg: '#2D1B00', text: '#F0B90B', border: 'rgba(240,185,11,0.3)' },
    '跟进中': { bg: '#0D1F2D', text: '#4DA6FF', border: 'rgba(77,166,255,0.3)' },
    '已完成': { bg: '#0D2620', text: '#0ECB81', border: 'rgba(14,203,129,0.3)' },
    '已忽略': { bg: '#1A1A1A', text: '#848E9C', border: 'rgba(132,142,156,0.3)' },
  };

  function setTaskState(el, state) {
    document.querySelectorAll('#state-buttons .state-btn').forEach(btn => {
      btn.className = 'state-btn flex-1 py-2.5 rounded-lg text-[13px] bg-[#2B3139] text-[#848E9C] border border-transparent';
    });
    const s = stateStyles[state];
    el.style.background = s.bg;
    el.style.color = s.text;
    el.style.borderColor = s.border;
    el.className = 'state-btn active flex-1 py-2.5 rounded-lg text-[13px] font-semibold border';
  }
</script>

</body>
</html>
