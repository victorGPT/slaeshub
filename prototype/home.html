<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[52px] sticky top-0 z-30 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-center px-4">
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">Sales Hub</h1>
  </div>

  <!-- Search Bar (always visible) -->
  <div class="sticky top-[52px] z-20 bg-[#0B0E11] px-4 py-2 relative">
    <div class="flex items-center bg-[#1E2329] rounded-lg px-3 py-2 border border-[#2E3440]">
      <i class="fa-solid fa-magnifying-glass text-[12px] text-[#848E9C] mr-2"></i>
      <input id="search-input" type="text" placeholder="搜索客户名字或 UID..."
             class="flex-1 bg-transparent text-[13px] text-[#EAECEF] outline-none placeholder-[#474D57]"
             oninput="onSearchInput()" />
      <button id="search-clear" onclick="clearSearch()" class="hidden text-[#848E9C] text-[12px] ml-2 bg-transparent border-0 cursor-pointer">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <!-- Search Results Dropdown -->
    <div id="search-dropdown" class="hidden absolute left-0 right-0 top-full z-40 mx-4 bg-[#1E2329] rounded-b-lg border border-t-0 border-[#2E3440] max-h-[320px] overflow-y-auto shadow-lg"></div>
  </div>

  <!-- Event Feed -->
  <div id="event-feed" class="overflow-y-auto pb-[100px]"></div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;

  var URGENCY_ORDER = { critical: 0, warning: 1, info: 2 };
  var TASK_COLORS = {
    '待处理': { bg: 'rgba(246,70,93,0.15)', text: '#F6465D' },
    '跟进中': { bg: 'rgba(77,166,255,0.15)', text: '#4DA6FF' },
    '已完成': { bg: 'rgba(14,203,129,0.15)', text: '#0ECB81' },
    '已忽略': { bg: 'rgba(132,142,156,0.15)', text: '#848E9C' }
  };

  // Sort events by urgency: critical > warning > info
  var sortedEvents = D.events.slice().sort(function(a, b) {
    return (URGENCY_ORDER[a.urgency] || 9) - (URGENCY_ORDER[b.urgency] || 9);
  });

  // Render event feed
  function renderEventFeed() {
    var container = document.getElementById('event-feed');

    if (sortedEvents.length === 0) {
      container.innerHTML =
        '<div class="flex flex-col items-center justify-center py-20 text-[#848E9C]">'
        + '<i class="fa-solid fa-circle-check text-[40px] mb-3 text-[#474D57]"></i>'
        + '<span class="text-[14px]">暂无待处理事件</span>'
        + '</div>';
      return;
    }

    container.innerHTML = sortedEvents.map(function(evt) {
      var tc = TASK_COLORS[evt.task_state] || TASK_COLORS['已忽略'];
      return '<a href="event-thread.html?id=' + evt.id + '" class="block px-4 py-3 border-b border-[#2E3440] active:bg-[#2B3139]">'
        + '<div class="flex items-center gap-2 mb-1">'
        +   '<span class="w-2 h-2 rounded-full flex-shrink-0" style="background:' + evt.color + '"></span>'
        +   '<span class="text-[13px] font-medium text-[#EAECEF]">' + evt.client_name + '</span>'
        +   '<span class="text-[12px] text-[#848E9C]">&middot;</span>'
        +   '<span class="text-[12px] text-[#848E9C]">' + evt.type + '</span>'
        +   (evt.sub_type ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-[#2B3139] text-[#848E9C]">' + evt.sub_type + '</span>' : '')
        + '</div>'
        + '<div class="flex items-center justify-between">'
        +   '<div class="flex items-center gap-2">'
        +     '<span class="text-[14px] font-bold" style="color:' + evt.color + '">' + evt.amount_display + '</span>'
        +     '<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:' + tc.bg + ';color:' + tc.text + '">' + evt.task_state + '</span>'
        +   '</div>'
        +   '<span class="text-[10px] text-[#848E9C]">' + evt.time_ago + '</span>'
        + '</div>'
        + '</a>';
    }).join('');
  }

  // Search
  function getStatusLabel(c) {
    var rate = c.adjustedTrendRate;
    var r2 = c.rSquared;
    if (r2 < 0.5) return { label: '波动不定', bg: 'rgba(132,142,156,0.15)', color: '#848E9C' };
    if (rate <= -0.04) return { label: '快速流失', bg: 'rgba(246,70,93,0.15)', color: '#F6465D' };
    if (rate <= -0.02) return { label: '缓慢流失', bg: 'rgba(240,160,48,0.15)', color: '#F0A030' };
    if (rate >= 0.04) return { label: '快速增长', bg: 'rgba(14,203,129,0.15)', color: '#0ECB81' };
    if (rate >= 0.02) return { label: '缓慢增长', bg: 'rgba(14,203,129,0.10)', color: '#0ECB81' };
    return { label: '稳定', bg: 'rgba(132,142,156,0.15)', color: '#848E9C' };
  }

  function renderSearchResults(query) {
    var dropdown = document.getElementById('search-dropdown');
    var clearBtn = document.getElementById('search-clear');

    if (!query) {
      dropdown.classList.add('hidden');
      clearBtn.classList.add('hidden');
      document.getElementById('event-feed').classList.remove('hidden');
      return;
    }

    clearBtn.classList.remove('hidden');
    var q = query.toLowerCase();
    var matches = D.clients.filter(function(c) {
      return c.name.toLowerCase().indexOf(q) !== -1 || c.uid.toLowerCase().indexOf(q) !== -1;
    }).slice(0, 20);

    if (matches.length === 0) {
      dropdown.innerHTML = '<div class="text-center py-6 text-[13px] text-[#848E9C]">未找到匹配客户</div>';
      dropdown.classList.remove('hidden');
      document.getElementById('event-feed').classList.add('hidden');
      return;
    }

    dropdown.innerHTML = matches.map(function(c) {
      var sl = getStatusLabel(c);
      return '<a href="client-detail.html?uid=' + c.uid + '" class="flex items-center justify-between px-4 py-3 border-b border-[#2E3440] last:border-0 active:bg-[#2B3139]">'
        + '<div class="min-w-0">'
        +   '<div class="flex items-center gap-2">'
        +     '<span class="text-[13px] font-medium text-[#EAECEF] truncate">' + c.name + '</span>'
        +     '<span class="text-[11px] text-[#474D57]">UID ' + c.uid + '</span>'
        +   '</div>'
        +   '<div class="flex items-center gap-2 mt-0.5">'
        +     '<span class="text-[12px] text-[#EAECEF]">' + c.depositDisplay + '</span>'
        +     '<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:' + sl.bg + ';color:' + sl.color + '">' + sl.label + '</span>'
        +   '</div>'
        + '</div>'
        + '<i class="fa-solid fa-chevron-right text-[10px] text-[#474D57] flex-shrink-0"></i>'
        + '</a>';
    }).join('');

    dropdown.classList.remove('hidden');
    document.getElementById('event-feed').classList.add('hidden');
  }

  window.onSearchInput = function() {
    var query = document.getElementById('search-input').value.trim();
    renderSearchResults(query);
  };

  window.clearSearch = function() {
    document.getElementById('search-input').value = '';
    renderSearchResults('');
    document.getElementById('search-input').focus();
  };

  // ESC to clear search
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('search-input').value = '';
      renderSearchResults('');
    }
  });

  // Init
  renderEventFeed();
})();
</script>

</body>
</html>
