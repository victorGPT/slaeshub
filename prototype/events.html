<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 事件中心</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .filter-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filter-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <div class="w-[60px]"></div>
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">事件中心</h1>
    <div class="w-[60px]"></div>
  </div>

  <!-- Tabs -->
  <div class="flex border-b border-[#2E3440]" id="tab-bar">
    <button data-tab="current" class="tab-btn flex-1 py-3 text-[14px] font-medium text-[#848E9C]">当前</button>
    <button data-tab="archived" class="tab-btn flex-1 py-3 text-[14px] font-medium text-[#848E9C]">归档</button>
  </div>

  <!-- Event List -->
  <div id="event-list" class="pb-[100px]"></div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script>
(function() {
  var todayStr = new Date().toISOString().split('T')[0];
  var currentTab = 'current';

  function loadEvents() {
    var arr = [];
    try { arr = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    return arr;
  }

  function daysLabel(fuAt) {
    var d = Math.round((new Date(fuAt) - new Date(todayStr)) / 86400000);
    if (d < 0) return { text: '逾期' + Math.abs(d) + '天', color: '#F6465D' };
    if (d === 0) return { text: '今天', color: '#F0B90B' };
    if (d === 1) return { text: '明天', color: '#F0B90B' };
    return { text: d + '天后', color: '#4DA6FF' };
  }

  function sortScore(ev) {
    if (ev.status === '已结束') return 99999;
    var d = Math.round((new Date(ev.follow_up_at) - new Date(todayStr)) / 86400000);
    return d; // 逾期为负（最小值 = 最前）
  }

  function filtered(events) {
    if (currentTab === 'archived') return events.filter(function(e) { return e.status === '已结束'; });
    return events.filter(function(e) { return e.status !== '已结束'; });
  }

  function renderList(events) {
    var container = document.getElementById('event-list');
    if (events.length === 0) {
      container.innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;color:#848E9C">'
        + '<i class="fa-solid fa-inbox" style="font-size:40px;margin-bottom:12px;color:#474D57"></i>'
        + '<span style="font-size:14px">暂无跟进事件</span>'
        + '<a href="clients.html" style="font-size:12px;color:#4DA6FF;margin-top:8px">打开客户列表，记录主动沟通</a>'
        + '</div>';
      return;
    }

    container.innerHTML = '<div class="px-4 pt-2 space-y-2">' + events.map(function(ev) {
      var isDone = ev.status === '已结束';
      var stateBg, stateColor, borderColor;
      if (isDone) { stateBg = 'rgba(14,203,129,0.08)';  stateColor = '#0ECB81'; borderColor = 'rgba(14,203,129,0.20)'; }
      else        { stateBg = 'rgba(77,166,255,0.10)';  stateColor = '#4DA6FF'; borderColor = 'rgba(77,166,255,0.25)'; }
      var acts = ev.activities || [];
      var createdAct = acts.find(function(a){ return a.type === '创建'; });
      var metaLine = createdAct ? (createdAct.note || '') : '';
      var actCount = acts.length;
      return '<a href="follow-up-thread.html?fuId=' + ev.id + '" style="display:block;text-decoration:none;background:' + stateBg + ';border:1px solid ' + borderColor + ';border-radius:12px;padding:12px">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
        + '<div style="display:flex;align-items:center;gap:6px">'
        + '<span style="font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500;color:' + stateColor + ';background:' + borderColor + '">' + ev.status + '</span>'
        + '<span style="font-size:11px;color:#848E9C">' + (ev.client_name || '') + '</span>'
        + '</div>'
        + '<span style="font-size:10px;color:#848E9C">' + actCount + ' 条记录</span>'
        + '</div>'
        + '<div style="font-size:13px;font-weight:600;margin-bottom:4px;color:' + (isDone ? '#848E9C' : '#EAECEF') + '">' + (ev.title || '—') + '</div>'
        + (metaLine ? '<div style="font-size:11px;color:#848E9C;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + metaLine + '</div>' : '')
        + '</a>';
    }).join('') + '</div>';
  }

  function updateTabs() {
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      var active = btn.getAttribute('data-tab') === currentTab;
      btn.style.color = active ? '#F0B90B' : '#848E9C';
      btn.style.fontWeight = active ? '600' : '500';
      btn.style.borderBottom = active ? '2px solid #F0B90B' : '2px solid transparent';
    });
  }

  function render() {
    var all = loadEvents().sort(function(a, b) { return sortScore(a) - sortScore(b); });
    updateTabs();
    renderList(filtered(all));
  }

  document.getElementById('tab-bar').addEventListener('click', function(e) {
    var btn = e.target.closest('.tab-btn');
    if (!btn) return;
    currentTab = btn.getAttribute('data-tab');
    render();
  });

  render();
})();
</script>


</body>
</html>
