<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sales Hub — 事件中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="mock-data.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg': '#0B0E11',
            'hub-card': '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border': '#2E3440',
            'hub-gold': '#F0B90B',
            'hub-gold-text': '#F8D33A',
            'hub-red': '#F6465D',
            'hub-green': '#0ECB81',
            'hub-blue': '#4DA6FF',
            'hub-text': '#EAECEF',
            'hub-muted': '#848E9C',
            'hub-disabled': '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; overscroll-behavior: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-hub-bg text-hub-text w-full min-h-screen flex flex-col">
  <div class="h-[44px] flex items-end justify-between px-6 pb-1 bg-hub-bg sticky top-0 z-50">
    <span class="text-[14px] font-semibold">14:23</span>
    <div class="flex items-center gap-1.5">
      <i class="fas fa-signal text-[12px]"></i>
      <i class="fas fa-wifi text-[12px]"></i>
      <i class="fas fa-battery-three-quarters text-[12px]"></i>
    </div>
  </div>

  <div class="h-[52px] flex items-center justify-between px-4 bg-hub-bg sticky top-[44px] z-40 border-b border-hub-border">
    <div class="w-8"></div>
    <span class="text-[17px] font-semibold text-hub-text">事件中心</span>
    <div class="relative">
      <button class="w-8 h-8 flex items-center justify-center">
        <i class="fa-solid fa-sliders text-hub-muted text-[16px]"></i>
      </button>
      <span id="open-count" class="absolute -top-0.5 -right-0.5 w-[16px] h-[16px] rounded-full bg-hub-red text-white text-[8px] font-bold flex items-center justify-center leading-none">0</span>
    </div>
  </div>

  <div id="state-tabs" class="flex bg-hub-bg border-b border-hub-border sticky top-[96px] z-30"></div>
  <div id="type-pills" class="px-4 py-2 flex gap-2 overflow-x-auto no-scrollbar bg-hub-bg sticky top-[148px] z-20"></div>

  <div class="px-4 pb-[90px] flex-1 overflow-y-auto no-scrollbar">
    <div id="event-list"></div>
    <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center">
      <i class="fa-regular fa-bell-slash text-hub-disabled text-5xl mb-4"></i>
      <p class="text-hub-muted text-[14px]">暂无相关事件</p>
    </div>
  </div>

  <div class="fixed-bar bg-hub-card border-t border-hub-border z-50">
    <div class="flex items-center justify-around h-[56px] px-2">
      <a href="#" onclick="goHome()" class="flex flex-col items-center gap-0.5 flex-1 py-2">
        <i class="fa-solid fa-house text-[20px] text-hub-muted"></i>
        <span class="text-[10px] text-hub-muted">首页</span>
      </a>
      <a href="clients.html" class="flex flex-col items-center gap-0.5 flex-1 py-2">
        <i class="fa-solid fa-users text-[20px] text-hub-muted"></i>
        <span class="text-[10px] text-hub-muted">客群</span>
      </a>
      <a href="events.html" class="flex flex-col items-center gap-0.5 flex-1 py-2">
        <i class="fa-solid fa-bell text-[20px] text-[#F0B90B]"></i>
        <span class="text-[10px] text-[#F0B90B] font-semibold">事件</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center gap-0.5 flex-1 py-2">
        <i class="fa-solid fa-circle-user text-[20px] text-hub-muted"></i>
        <span class="text-[10px] text-hub-muted">我的</span>
      </a>
    </div>
    <div class="flex justify-center pb-2">
      <div class="w-32 h-1 bg-hub-muted rounded-full opacity-30"></div>
    </div>
  </div>

  <script>
    const DATA = window.PROTOTYPE_DATA || {};
    const EVENTS = Array.isArray(DATA.events) ? DATA.events : [];
    const STATE_ORDER = ['全部', '未开始', '跟进中', '已结束', '已忽略'];
    const TYPE_ORDER = ['全部', '出金预警', '爆仓', '盈利', '充值', '人工'];
    let currentState = '全部';
    let currentType = '全部';

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function goHome() {
      const v = sessionStorage.getItem('homeVersion') || 'a';
      location.href = 'home-' + v + '.html';
    }

    function stateCount(state) {
      if (state === '全部') return EVENTS.length;
      return EVENTS.filter(event => event.state === state).length;
    }

    function typeCount(type) {
      if (type === '全部') return EVENTS.length;
      return EVENTS.filter(event => event.type === type).length;
    }

    function renderStateTabs() {
      const container = document.getElementById('state-tabs');
      container.innerHTML = STATE_ORDER.map(state => {
        const active = state === currentState;
        return `
          <button class="state-tab flex-1 text-center py-3 text-[12px] ${active ? 'border-b-2 border-[#F0B90B] text-[#F0B90B] font-semibold' : 'text-hub-muted'}"
            data-tab="${state}" onclick="filterByState('${state}')">${state} ${stateCount(state)}</button>`;
      }).join('');
      document.getElementById('open-count').textContent = String(stateCount('未开始') + stateCount('跟进中'));
    }

    function renderTypePills() {
      const container = document.getElementById('type-pills');
      container.innerHTML = TYPE_ORDER.filter(type => type === '全部' || typeCount(type) > 0).map(type => {
        const active = type === currentType;
        return `
          <button class="type-pill rounded-full px-3 py-1 text-[11px] whitespace-nowrap ${active ? 'bg-[#F0B90B] text-[#0B0E11] font-semibold' : 'bg-hub-card text-hub-muted border border-hub-border'}"
            data-type="${type}" onclick="filterByType('${type}')">${type === '全部' ? '全部' : `${type} ${typeCount(type)}`}</button>`;
      }).join('');
    }

    function renderEventList() {
      const list = document.getElementById('event-list');
      const filtered = EVENTS.filter(event => {
        const stateMatch = currentState === '全部' || event.state === currentState;
        const typeMatch = currentType === '全部' || event.type === currentType;
        return stateMatch && typeMatch;
      });

      if (!filtered.length) {
        list.innerHTML = '';
        document.getElementById('empty-state').style.display = 'flex';
        return;
      }

      document.getElementById('empty-state').style.display = 'none';
      list.innerHTML = filtered.map(event => `
        <a href="${escapeHtml(event.href)}"
          class="event-card block bg-hub-card rounded-xl border border-hub-border p-4 mb-2 active:bg-hub-card-hover ${event.state === '已忽略' ? 'opacity-60' : ''}"
          data-state="${escapeHtml(event.state)}" data-type="${escapeHtml(event.type)}">
          <div class="flex items-start gap-3">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style="background:${event.iconBg}">
              <i class="fa-solid fa-${event.icon} text-[16px]" style="color:${event.iconColor}"></i>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-1">
                <span class="text-[14px] font-semibold text-hub-text">${escapeHtml(event.title)}</span>
                <div class="flex items-center gap-1.5 flex-shrink-0 ml-2">
                  <span class="text-[10px] px-2 py-0.5 rounded-full" style="background:${event.badgeBg};color:${event.badgeText}">${escapeHtml(event.state)}</span>
                  <span class="text-[11px] text-hub-disabled">${escapeHtml(event.relativeTime)}</span>
                </div>
              </div>
              <p class="text-[12px] text-hub-muted mb-1 truncate">${escapeHtml(event.summary)}</p>
              <p class="text-[12px] ${event.state === '已忽略' ? 'text-hub-disabled' : 'text-[#F0B90B]'} truncate">${escapeHtml(event.state === '已忽略' ? '(已忽略)' : event.suggestion)}</p>
            </div>
            <i class="fa-solid fa-chevron-right text-hub-muted text-[12px] flex-shrink-0 mt-1"></i>
          </div>
        </a>`).join('');
    }

    function filterByState(state) {
      currentState = state;
      renderStateTabs();
      renderEventList();
    }

    function filterByType(type) {
      currentType = type;
      renderTypePills();
      renderEventList();
    }

    renderStateTabs();
    renderTypePills();
    renderEventList();
  </script>
</body>
</html>
