<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>客户详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .tab-btn { transition: color 0.15s; }
    .tab-btn.active { color: #F0B90B; }
    .tab-btn.active .tab-line { background: #F0B90B; }
    .tab-line { height: 2px; background: transparent; transition: background 0.15s; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div id="sticky-top" class="sticky top-0 z-20 bg-[#0B0E11]">
    <!-- Nav bar -->
    <div class="h-[44px] border-b border-[#2E3440] flex items-center justify-between px-4">
      <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center">
        <i class="fa-solid fa-chevron-left text-[16px] text-[#EAECEF]"></i>
      </button>
      <h1 class="text-[16px] font-bold text-[#EAECEF]">客户详情</h1>
      <div class="w-8"></div>
    </div>

    <!-- Unified Header Card -->
    <div class="mx-3 mt-2 mb-2 bg-[#1E2329] rounded-2xl border border-[#2E3440] overflow-hidden">
      <!-- Row 1: Identity -->
      <div class="flex items-center gap-3 px-4 pt-3 pb-2">
        <button id="fav-btn" onclick="toggleFav()" class="w-8 h-8 flex items-center justify-center rounded-full bg-[#2B3139] flex-shrink-0 active:scale-95 transition-transform">
          <i id="fav-icon" class="fa-regular fa-star text-[14px] text-[#474D57]"></i>
        </button>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <button id="uid-copy-btn" onclick="copyUid()" class="flex items-center gap-1.5 active:opacity-70">
              <span id="client-uid" class="text-[16px] font-bold text-[#EAECEF] tabular-nums tracking-wide"></span>
              <i class="fa-regular fa-copy text-[10px] text-[#474D57]"></i>
            </button>
            <!-- top-nickname: 从 worktree-1 引入 -->
            <span id="top-nickname" class="text-[12px] text-[#848E9C]"></span>
          </div>
        </div>
        <span id="from-badge" class="text-[9px] px-1.5 py-[1px] rounded hidden flex-shrink-0"></span>
      </div>

      <!-- Row 2: Tags -->
      <div id="tags-row" class="px-4 pb-2 flex flex-wrap gap-1"></div>

      <!-- Row 3: Deposit Hero + 8w Delta -->
      <div class="px-4 pb-2">
        <div class="flex items-end gap-3">
          <!-- Current deposit -->
          <div>
            <div class="text-[10px] text-[#474D57] mb-0.5">7日资沉</div>
            <span id="deposit-hero" class="text-[28px] font-bold text-[#EAECEF] tracking-tight leading-none"></span>
          </div>
          <!-- 8w comparison: delta badge -->
          <div id="deposit-delta" class="mb-1 flex items-center gap-1">
            <!-- filled by JS: arrow icon + percentage + absolute change -->
          </div>
          <div id="deposit-rank" class="mb-1 text-[10px] text-[#848E9C] tabular-nums"></div>
        </div>
      </div>

      <!-- Row 5: Last Contact -->
      <div id="last-contact-row" class="px-4 pb-3 flex items-center justify-between"></div>
      <!-- Row 6: Active Follow-up (hidden when none) -->
      <div id="active-followup-row" class="hidden px-4 pb-3 flex items-center justify-between"></div>
    </div>

    <!-- Tab Bar -->
    <div class="flex border-b border-[#2E3440]">
      <button class="tab-btn active flex-1 py-2 text-center text-[13px] font-medium text-[#848E9C]" data-tab="assets">
        <span>资产</span>
        <div class="tab-line mt-1 mx-auto w-10 rounded-full"></div>
      </button>
      <button class="tab-btn flex-1 py-2 text-center text-[13px] font-medium text-[#848E9C]" data-tab="events">
        <span>事件</span>
        <div class="tab-line mt-1 mx-auto w-10 rounded-full"></div>
      </button>
      <button class="tab-btn flex-1 py-2 text-center text-[13px] font-medium text-[#848E9C]" data-tab="profile">
        <span>档案</span>
        <div class="tab-line mt-1 mx-auto w-10 rounded-full"></div>
      </button>
    </div>
  </div>

  <!-- Tab Content -->
  <div id="tab-assets" class="tab-content pb-[120px]"></div>
  <div id="tab-events" class="tab-content pb-[120px] hidden"></div>
  <div id="tab-profile" class="tab-content pb-[120px] hidden"></div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var fromParam = params.get('from');
  var c = uid ? D.clientsById[uid] : null;

  if (!c) {
    document.getElementById('tab-events').innerHTML =
      '<div class="mx-4 mt-8 bg-[#1E2329] rounded-xl border border-[#2E3440] p-6 text-center text-[#848E9C]">未找到客户数据</div>';
    return;
  }

  function esc(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // --- timeAgo（从 worktree-1 引入）---
  function timeAgo(isoStr) {
    if (!isoStr) return '';
    var now = new Date();
    var then = new Date(isoStr);
    if (isNaN(then.getTime())) return '';
    var diff = Math.floor((now - then) / 1000);
    if (diff < 3600) return '刚刚';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    var days = Math.floor(diff / 86400);
    if (days < 7) return days + '天前';
    if (days < 30) return Math.floor(days / 7) + '周前';
    return (then.getMonth() + 1) + '月' + then.getDate() + '日';
  }

  // --- Platform averages (across all clients) ---
  var allClients = D.clients;
  var platAvg = { depositChg: 0, flowNetChg: 0, profitChg: 0, pnlChg: 0 };
  var platCounts = { depositChg: 0, flowNetChg: 0, profitChg: 0, pnlChg: 0 };

  allClients.forEach(function(cl) {
    var w = cl.weeks;
    var thisW = w[w.length - 1];
    var avg8 = 0;
    for (var j = 0; j < w.length - 1; j++) avg8 += w[j];
    avg8 = avg8 / (w.length - 1);
    if (avg8 > 0) { platAvg.depositChg += (thisW - avg8) / avg8; platCounts.depositChg++; }

    var nc = cl.netContribution;
    if (nc && nc.total !== undefined) {
      if (nc.wow !== undefined) { platAvg.profitChg += nc.wow; platCounts.profitChg++; }
    }

    var pnl = cl.clientPnl;
    if (pnl && pnl.weeklyAvg8w && Math.abs(pnl.weeklyAvg8w.value) > 0) {
      var pnlRate = (pnl.total7d.value - pnl.weeklyAvg8w.value) / Math.abs(pnl.weeklyAvg8w.value);
      platAvg.pnlChg += pnlRate;
      platCounts.pnlChg++;
    }
  });

  platAvg.depositChg = platCounts.depositChg > 0 ? (platAvg.depositChg / platCounts.depositChg * 100) : 0;
  platAvg.profitChg = platCounts.profitChg > 0 ? (platAvg.profitChg / platCounts.profitChg * 100) : 0;
  platAvg.pnlChg = platCounts.pnlChg > 0 ? (platAvg.pnlChg / platCounts.pnlChg * 100) : 0;

  function fmtAvg(v) {
    var s = v >= 0 ? '+' : '';
    var col = v >= 0 ? '#0ECB81' : '#F6465D';
    return '<span style="color:' + col + '">' + s + v.toFixed(1) + '%</span>';
  }

  // --- Seeded random ---
  function seededRandom(seed) {
    var x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  // --- Flow data ---
  var flowWeeks = [];
  var seedBase = parseInt(c.uid, 10) || 1;
  for (var i = 1; i < c.weeks.length; i++) {
    var delta = c.weeks[i] - c.weeks[i - 1];
    var r = seededRandom(seedBase + i);
    var inflow, outflow;
    if (delta > 0) {
      inflow = delta * (1.2 + r * 0.6);
      outflow = inflow - delta;
    } else if (delta < 0) {
      outflow = Math.abs(delta) * (1.2 + r * 0.6);
      inflow = outflow - Math.abs(delta);
    } else {
      inflow = c.fMean * (0.01 + r * 0.04);
      outflow = inflow * (0.95 + seededRandom(seedBase + i + 100) * 0.1);
    }
    flowWeeks.push({ inflow: Math.round(inflow), outflow: Math.round(outflow) });
  }

  var thisWeekFlow = flowWeeks[flowWeeks.length - 1];
  var baselineWeeks = flowWeeks.slice(0, -1);

  function fmtFlow(v) {
    var abs = Math.abs(v);
    if (abs >= 10000) return '$' + Math.round(abs / 10000) + '万';
    if (abs >= 1000) return '$' + (abs / 1000).toFixed(1) + '千';
    return '$' + Math.round(abs);
  }

  // === HEADER CARD ===
  document.getElementById('client-uid').textContent = c.uid;

  // top-nickname（从 worktree-1 引入）
  var nnSpan = document.getElementById('top-nickname');
  if (nnSpan) nnSpan.textContent = localStorage.getItem('nickname_' + uid) || '';

  // Favorite
  var favKey = 'fav_' + c.uid;
  var isFav = localStorage.getItem(favKey) === '1';
  function renderFav() {
    var icon = document.getElementById('fav-icon');
    if (isFav) {
      icon.className = 'fa-solid fa-star text-[14px] text-[#F0B90B]';
    } else {
      icon.className = 'fa-regular fa-star text-[14px] text-[#474D57]';
    }
  }
  renderFav();
  window.toggleFav = function() {
    isFav = !isFav;
    localStorage.setItem(favKey, isFav ? '1' : '0');
    renderFav();
  };

  // From badge
  var fromMap = {
    'event': { label: '事件', bg: 'rgba(77,166,255,0.12)', color: '#4DA6FF' },
    'clients': { label: '列表', bg: 'rgba(132,142,156,0.1)', color: '#848E9C' },
    'search': { label: '搜索', bg: 'rgba(132,142,156,0.1)', color: '#848E9C' }
  };
  if (fromParam && fromMap[fromParam]) {
    var fb = document.getElementById('from-badge');
    fb.textContent = fromMap[fromParam].label;
    fb.style.background = fromMap[fromParam].bg;
    fb.style.color = fromMap[fromParam].color;
    fb.classList.remove('hidden');
  }

  // Deposit hero
  document.getElementById('deposit-hero').textContent = c.thisWeekDisplay || '-';

  // commRecords: 需在 tags 之前定义（活跃度标签会用到）
  var commRecords = [];
  try { commRecords = JSON.parse(sessionStorage.getItem('comm_records_' + uid) || '[]'); } catch(e) {}

  // --- System Tags（排名型，直观无需理解）---
  var sysTags = [];

  // 资沉排名：全平台，前100才显示
  var depositRank = allClients.filter(function(cl) { return cl.fMean > c.fMean; }).length + 1;
  if (depositRank <= 100) {
    var dc = depositRank <= 10 ? '#F0B90B' : depositRank <= 50 ? '#4DA6FF' : '#848E9C';
    var dbg = depositRank <= 10 ? 'rgba(240,185,11,0.12)' : depositRank <= 50 ? 'rgba(77,166,255,0.12)' : 'rgba(132,142,156,0.12)';
    sysTags.push({ label: '资沉 #' + depositRank, color: dc, bg: dbg });
  }

  // 利润贡献排名：全平台，前100才显示
  var myProfit = c.netContribution ? c.netContribution.total : 0;
  var profitRank = allClients.filter(function(cl) {
    return (cl.netContribution ? cl.netContribution.total : 0) > myProfit;
  }).length + 1;
  if (profitRank <= 100) {
    var pc = profitRank <= 10 ? '#F0B90B' : profitRank <= 50 ? '#4DA6FF' : '#848E9C';
    var pbg = profitRank <= 10 ? 'rgba(240,185,11,0.12)' : profitRank <= 50 ? 'rgba(77,166,255,0.12)' : 'rgba(132,142,156,0.12)';
    sysTags.push({ label: '利润 #' + profitRank, color: pc, bg: pbg });
  }

  var manualTagKey = 'bd_tags_' + c.uid;
  var manualTags = [];
  try { manualTags = JSON.parse(localStorage.getItem(manualTagKey) || '[]'); } catch(e) {}

  // 活跃度标签
  var lastContactDate = null;
  if (c.lastContact) {
    lastContactDate = new Date(c.lastContact);
  } else if (commRecords.length > 0) {
    var latestRecord = commRecords.reduce(function(a, b) {
      return new Date(a.occurred_at || a.date || 0) > new Date(b.occurred_at || b.date || 0) ? a : b;
    });
    lastContactDate = new Date(latestRecord.occurred_at || latestRecord.date || 0);
  }
  if (lastContactDate && !isNaN(lastContactDate.getTime())) {
    var daysSince = Math.floor((new Date() - lastContactDate) / 86400000);
    if (daysSince <= 7) sysTags.push({ label: '7天内活跃', color: '#0ECB81', bg: 'rgba(14,203,129,0.12)' });
    else if (daysSince <= 30) sysTags.push({ label: '近期活跃', color: '#4DA6FF', bg: 'rgba(77,166,255,0.12)' });
    else if (daysSince > 30) sysTags.push({ label: '30天未联系', color: '#F6465D', bg: 'rgba(246,70,93,0.12)' });
  }

  function renderTags() {
    var tagsHtml = '';
    sysTags.forEach(function(t) {
      tagsHtml += '<span class="text-[9px] px-1.5 py-[2px] rounded border font-medium" style="color:' + t.color + ';border-color:' + t.color + '30;background:' + t.bg + '">' + t.label + '</span>';
    });
    manualTags.forEach(function(t, i) {
      tagsHtml += '<span class="text-[9px] px-1.5 py-[2px] rounded bg-[#2B3139] text-[#EAECEF] inline-flex items-center gap-1">'
        + esc(t)
        + '<i class="fa-solid fa-xmark text-[7px] text-[#474D57] cursor-pointer hover:text-[#F6465D]" onclick="removeTag(' + i + ')"></i>'
        + '</span>';
    });
    tagsHtml += '<span class="text-[9px] px-1.5 py-[2px] rounded border border-dashed border-[#474D57] text-[#474D57] cursor-pointer" onclick="addTag()">+ 标签</span>';
    document.getElementById('tags-row').innerHTML = tagsHtml;
  }

  window.removeTag = function(idx) {
    manualTags.splice(idx, 1);
    localStorage.setItem(manualTagKey, JSON.stringify(manualTags));
    renderTags();
  };

  window.addTag = function() {
    var tag = prompt('输入标签名');
    if (tag && tag.trim()) {
      manualTags.push(tag.trim());
      localStorage.setItem(manualTagKey, JSON.stringify(manualTags));
      renderTags();
    }
  };

  renderTags();

  // Delta: this week vs 8w avg
  var thisWeekVal = c.weeks[c.weeks.length - 1];
  var avgVal = c.fMean;
  var deltaAbs = thisWeekVal - avgVal;
  var deltaPct = avgVal > 0 ? ((thisWeekVal - avgVal) / avgVal * 100) : 0;
  var isUp = deltaAbs >= 0;

  var deltaEl = document.getElementById('deposit-delta');
  var deltaColor = isUp ? '#0ECB81' : '#F6465D';
  var deltaBg = isUp ? 'rgba(14,203,129,0.12)' : 'rgba(246,70,93,0.12)';
  var arrowChar = isUp ? '▲' : '▼';
  var signStr = isUp ? '+' : '';

  deltaEl.innerHTML = '<span class="text-[13px]" style="color:' + deltaColor + '">' + arrowChar + '</span>'
    + '<span class="text-[16px] font-bold tabular-nums ml-0.5" style="color:' + deltaColor + '">' + signStr + fmtFlow(Math.round(deltaAbs)) + '</span>'
    + '<span class="text-[11px] tabular-nums ml-2" style="color:' + deltaColor + ';opacity:0.55">' + signStr + deltaPct.toFixed(1) + '%</span>';

  // Memo（DOM 元素已移除，跳过）

  // UID copy
  window.copyUid = function() {
    navigator.clipboard.writeText(c.uid).then(function() {
      var btn = document.getElementById('uid-copy-btn');
      var icon = btn.querySelector('i');
      icon.className = 'fa-solid fa-check text-[9px] text-[#0ECB81]';
      setTimeout(function() { icon.className = 'fa-regular fa-copy text-[9px] text-[#848E9C]'; }, 1200);
    });
  };

  // === TAB SWITCHING ===
  var tabBtns = document.querySelectorAll('.tab-btn');
  var tabPanels = document.querySelectorAll('.tab-content');
  tabBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var target = btn.getAttribute('data-tab');
      tabBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      tabPanels.forEach(function(p) { p.classList.add('hidden'); });
      document.getElementById('tab-' + target).classList.remove('hidden');
    });
  });

  // === TAB 1: EVENTS ===
  var eventsHtml = '';

  // Module: Follow-up Records（跟进记录）

  // 按 occurred_at 降序排列（最新在前）
  var sortedRecords = commRecords.slice().sort(function(a, b) {
    return new Date(b.occurred_at || b.date || 0) - new Date(a.occurred_at || a.date || 0);
  });

  // 构建 event status 查询 map
  var fuEventsMap = {};
  try {
    JSON.parse(sessionStorage.getItem('follow_up_events') || '[]').forEach(function(e) { fuEventsMap[e.id] = e; });
  } catch(e) {}

  var statusBadgeColors = { '跟进中': '#4DA6FF', '已结束': '#0ECB81' };

  // 主动沟通记录转时间线条目
  var commFollowups = sortedRecords.map(function(r) {
    var dateLabel = r.occurred_at || r.date || '';
    var displayDate = timeAgo(dateLabel) || dateLabel;
    var text = r.text || ((r.channel || '') + (r.result ? ' · ' + r.result : '') + (r.summary ? '：' + r.summary : ''));
    var tagHtml = '';
    if (r.event_id && r.event_title) {
      var evStatus = (fuEventsMap[r.event_id] || {}).status || '';
      var sColor = statusBadgeColors[evStatus] || '#848E9C';
      var statusSpan = evStatus ? '<span style="color:' + sColor + ';margin-left:3px;font-size:9px">' + evStatus + '</span>' : '';
      tagHtml = '<a href="follow-up-thread.html?fuId=' + r.event_id + '" class="inline-flex items-center text-[10px] px-1.5 py-0.5 rounded mr-1 active:opacity-70" style="background:rgba(77,166,255,0.12);color:#4DA6FF">' + esc(r.event_title) + statusSpan + '</a>';
    } else if (r.title) {
      tagHtml = '<span class="inline-block text-[10px] px-1.5 py-0.5 rounded mr-1" style="background:rgba(132,142,156,0.15);color:#848E9C">' + esc(r.title) + '</span>';
    }
    return { date: displayDate, bd: r.bd || 'BD', text: text, tagHtml: tagHtml };
  });

  var allFollowups = commFollowups;

  // 读取全局跟进事件
  var allFollowUpEvents = [];
  try { allFollowUpEvents = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
  var clientActiveEvents = allFollowUpEvents.filter(function(e) {
    return e.client_uid === uid && e.status !== '已结束';
  });
  var clientAllEvents = allFollowUpEvents.filter(function(e) {
    return e.client_uid === uid;
  });
  var todayStr = new Date().toISOString().split('T')[0];

  function fuDaysLabel(fuAt) {
    var d = Math.round((new Date(fuAt) - new Date(todayStr)) / 86400000);
    if (d < 0) return { text: '逾期' + Math.abs(d) + '天', color: '#F6465D' };
    if (d === 0) return { text: '今天', color: '#F0B90B' };
    if (d === 1) return { text: '明天', color: '#F0B90B' };
    return { text: d + '天后', color: '#4DA6FF' };
  }

  // Row 5: 上次联系（写入顶部固定头部，不进 eventsHtml）
  var lastContactEl = document.getElementById('last-contact-row');
  if (lastContactEl) {
    if (commRecords.length > 0) {
      var lc = commRecords[0];
      var lcText = (lc.channel && lc.result) ? lc.channel + ' · ' + lc.result : (lc.text || '');

window.openCommForm = function() {
  window._commStatus = '跟进中';
  var sheet = document.getElementById('comm-sheet');
  sheet.style.display = 'flex';
  var now = new Date();
  var pad = function(n) { return n < 10 ? '0' + n : n; };
  var dt = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate())
           + 'T' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  document.getElementById('comm-occurred-at').value = dt;
};

window.closeCommForm = function() {
  document.getElementById('comm-sheet').style.display = 'none';
};

window.selectPill = function(el, group) {
  var cls = 'comm-pill-' + group;
  document.querySelectorAll('.' + cls).forEach(function(p) {
    p.style.background = '#2B3139';
    p.style.color = '#848E9C';
    p.style.border = '1px solid #2E3440';
    p.style.fontWeight = '';
    p.removeAttribute('data-active');
  });
  el.style.background = '#F0B90B';
  el.style.color = '#0B0E11';
  el.style.border = 'none';
  el.style.fontWeight = '600';
  el.setAttribute('data-active', '1');
};

window.submitComm = function() {
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var channelEl = document.querySelector('.comm-pill-channel[data-active="1"]');
  var channel = channelEl ? channelEl.getAttribute('data-val') : 'Telegram';
  var resultEl = document.querySelector('.comm-pill-result[data-active="1"]');
  var result = resultEl ? resultEl.getAttribute('data-val') : '已联系上';
  var occurredAt = document.getElementById('comm-occurred-at').value || new Date().toISOString();
  var summaryEl = document.getElementById('comm-summary');
  var summary = summaryEl ? summaryEl.value.trim() : '';
  var text = channel + ' · ' + result;
  if (summary) text += '：' + summary;
  // 创建跟进事件（始终创建）— 先建事件拿到 ID，再写 comm_record
  var commTitleVal = ((document.getElementById('comm-follow-up-title') || {}).value || '').trim();
  var newEventStatus = window._commStatus || '跟进中';
  var fuEvents = [];
  try { fuEvents = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
  // 关闭该客户现有活跃事件
  fuEvents.forEach(function(e) {
    if (e.client_uid === uid && e.status === '跟进中') {
      e.status = '已结束'; e.done_note = '被新事件替代'; e.done_at = new Date().toISOString();
    }
  });
  var clientNameEl = document.getElementById('client-uid');
  var newEventId    = 'fu_' + uid + '_' + Date.now();
  var newEventTitle = commTitleVal || summary || '主动沟通';
  var initActivities = [{ type: '创建', note: text, occurred_at: new Date().toISOString() }];
  if (newEventStatus === '已结束') {
    initActivities.push({ type: '结束', note: '', occurred_at: new Date().toISOString() });
  }
  fuEvents.push({
    id: newEventId, client_uid: uid,
    client_name: clientNameEl ? clientNameEl.textContent : uid,
    status: newEventStatus, created_at: new Date().toISOString(),
    title: newEventTitle,
    activities: initActivities
  });
  sessionStorage.setItem('follow_up_events', JSON.stringify(fuEvents));

  // 写 comm_record（带 event 关联）
  var commKey = 'comm_records_' + uid;
  var records = [];
  try { records = JSON.parse(sessionStorage.getItem(commKey) || '[]'); } catch(e) {}
  var rec = { date: occurredAt, bd: 'BD', channel: channel, result: result, occurred_at: occurredAt, summary: summary, text: text };
  if (commTitleVal) { rec.title = commTitleVal; }
  rec.event_id = newEventId; rec.event_title = newEventTitle;
  records.unshift(rec);
  sessionStorage.setItem(commKey, JSON.stringify(records));
  sessionStorage.setItem('last_contact_' + uid, new Date().toISOString());

  location.reload();
};

window._commStatus = '跟进中';
window.selectCommStatus = function(status) {
  window._commStatus = status;
  var styles = {
    '跟进中': { bg: 'rgba(77,166,255,0.15)',  color: '#4DA6FF', border: '#4DA6FF' },
    '已结束': { bg: 'rgba(14,203,129,0.12)',  color: '#0ECB81', border: '#0ECB81' },
  };
  ['跟进中','已结束'].forEach(function(s) {
    var idMap = { '跟进中': 'comm-status-following', '已结束': 'comm-status-done' };
    var btn = document.getElementById(idMap[s]);
    if (!btn) return;
    if (s === status) {
      btn.style.background = styles[s].bg; btn.style.color = styles[s].color; btn.style.borderColor = styles[s].border; btn.style.fontWeight = '600';
    } else {
      btn.style.background = '#1E2329'; btn.style.color = '#848E9C'; btn.style.borderColor = '#2E3440'; btn.style.fontWeight = '400';
    }
  });
};

var _markDoneEventId = null;
window.markEventDone = function(eventId) {
  _markDoneEventId = eventId;
  var el = document.getElementById('mark-done-note');
  if (el) el.value = '';
  document.getElementById('mark-done-sheet').style.display = 'flex';
};
window.closeDoneSheet = function() {
  document.getElementById('mark-done-sheet').style.display = 'none';
  _markDoneEventId = null;
};
window.confirmEventDone = function() {
  if (!_markDoneEventId) return;
  var note = (document.getElementById('mark-done-note') || {}).value || '';
  var fuEvents = [];
  try { fuEvents = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
  fuEvents.forEach(function(e) {
    if (e.id === _markDoneEventId) {
      e.status = '已结束';
      e.done_note = note.trim();
      e.done_at = new Date().toISOString();
    }
  });
  sessionStorage.setItem('follow_up_events', JSON.stringify(fuEvents));
  window.closeDoneSheet();
  location.reload();
};
window.postponeEvent = function() {
  if (!_markDoneEventId) return;
  var fuEvents = [];
  try { fuEvents = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
  fuEvents.forEach(function(e) {
    if (e.id === _markDoneEventId) {
      var d = new Date(e.follow_up_at || new Date()); d.setDate(d.getDate() + 3);
      var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
      e.follow_up_at = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
      e.status = '跟进中';
    }
  });
  sessionStorage.setItem('follow_up_events', JSON.stringify(fuEvents));
  window.closeDoneSheet();
  location.reload();
};
window.setEventFollowing = function(eventId) {
  var fuEvents = [];
  try { fuEvents = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
  fuEvents.forEach(function(e) { if (e.id === eventId) e.status = '跟进中'; });
  sessionStorage.setItem('follow_up_events', JSON.stringify(fuEvents));
  location.reload();
};

// === 档案 Tab JS ===
window.editNickname = function() {
  document.getElementById('nickname-display-row').style.display = 'none';
  document.getElementById('nickname-edit-row').style.removeProperty('display');
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var cur = localStorage.getItem('nickname_' + uid) || '';
  document.getElementById('nickname-input').value = cur;
  document.getElementById('nickname-input').focus();
};

window.saveNickname = function() {
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var val = document.getElementById('nickname-input').value.trim();
  localStorage.setItem('nickname_' + uid, val);
  document.getElementById('nickname-val').textContent = val || '未设置';
  document.getElementById('nickname-val').style.color = val ? '#EAECEF' : '#474D57';
  document.getElementById('nickname-edit-row').style.display = 'none';
  document.getElementById('nickname-display-row').style.display = '';
  var nnSpan = document.getElementById('top-nickname');
  if (nnSpan) nnSpan.textContent = val;
};

window.renderContacts = function() {
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var contacts = [];
  try { contacts = JSON.parse(localStorage.getItem('contacts_' + uid) || '[]'); } catch(e) {}
  var list = document.getElementById('contact-list');
  if (!list) return;
  if (contacts.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = contacts.map(function(c, i) {
    return '<div class="flex items-center justify-between py-2 border-b border-[#2E3440]">'
      + '<div class="flex items-center gap-2">'
      + '<span class="text-[11px] bg-[#2B3139] text-[#848E9C] px-2 py-0.5 rounded-full">' + c.channel + '</span>'
      + '<span class="text-[12px] text-[#EAECEF]">' + c.value + '</span>'
      + '</div>'
      + '<button onclick="deleteContact(' + i + ')" class="text-[#474D57] text-[14px] px-1">×</button>'
      + '</div>';
  }).join('');
};

window.openContactForm = function() {
  document.getElementById('contact-form').style.display = 'block';
};
window.closeContactForm = function() {
  document.getElementById('contact-form').style.display = 'none';
  document.getElementById('contact-value').value = '';
};
window.updateContactPlaceholder = function() {
  var ch = document.getElementById('contact-channel').value;
  var ph = { '电话': '+86 138...', '邮件': 'user@example.com' };
  document.getElementById('contact-value').placeholder = ph[ch] || '@username';
};
window.saveContact = function() {
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var channel = document.getElementById('contact-channel').value;
  var value = document.getElementById('contact-value').value.trim();
  if (!value) return;
  var contacts = [];
  try { contacts = JSON.parse(localStorage.getItem('contacts_' + uid) || '[]'); } catch(e) {}
  contacts.push({ channel: channel, value: value });
  localStorage.setItem('contacts_' + uid, JSON.stringify(contacts));
  closeContactForm();
  renderContacts();
};
window.deleteContact = function(idx) {
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var contacts = [];
  try { contacts = JSON.parse(localStorage.getItem('contacts_' + uid) || '[]'); } catch(e) {}
  contacts.splice(idx, 1);
  localStorage.setItem('contacts_' + uid, JSON.stringify(contacts));
  renderContacts();
};

// 所有 window.* 函数定义完毕后，执行档案 tab 初始化
window.renderContacts();

  // === 笔记（FAB + 抽屉 + 时间轴列表）===
  function renderNotesList() {
    var listEl = document.getElementById('notes-list');
    if (!notes.length) {
      listEl.innerHTML = '<p class="text-[12px] text-[#474D57] text-center py-6">还没有笔记</p>';
      return;
    }
    var items = notes.slice().reverse().map(function(n) {
      return '<div class="relative">'
        + '<div class="absolute -left-[17px] top-[5px] w-2 h-2 rounded-full bg-[#F0B90B]"></div>'
        + '<div class="text-[10px] text-[#848E9C]">' + timeAgo(n.created_at) + '</div>'
        + '<p class="text-[12px] text-[#EAECEF] mt-0.5 leading-relaxed">' + esc(n.text) + '</p>'
        + '</div>';
    }).join('');
    listEl.innerHTML = '<div class="border-l-2 border-[#2E3440] pl-3 space-y-4">' + items + '</div>';
  }

  window.openNote = function() {
    var overlay = document.getElementById('note-drawer-overlay');
    var drawer = document.getElementById('note-drawer');
    overlay.classList.remove('hidden');
    drawer.classList.remove('hidden');
    drawer.style.display = 'flex';
    document.getElementById('note-input').value = '';
    renderNotesList();
    setTimeout(function() { document.getElementById('note-input').focus(); }, 50);
  };

  window.closeNote = function() {
    document.getElementById('note-drawer-overlay').classList.add('hidden');
    var drawer = document.getElementById('note-drawer');
    drawer.classList.add('hidden');
    drawer.style.display = '';
  };

  window.saveNote = function() {
    var text = document.getElementById('note-input').value.trim();
    if (!text) return;
    notes.push({ id: Date.now(), text: text, created_at: new Date().toISOString() });
    localStorage.setItem(notesKey, JSON.stringify(notes));
    document.getElementById('note-input').value = '';
    renderNotesList();
    document.getElementById('note-input').focus();
  };

  // FAB 滚动隐藏
  (function() {
    var fab = document.getElementById('note-fab');
    if (!fab) return;
    var lastScrollY = window.scrollY;
    var ticking = false;
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() {
          var currentY = window.scrollY;
          if (currentY > lastScrollY + 10) {
            fab.style.opacity = '0';
            fab.style.pointerEvents = 'none';
            fab.style.transform = 'scale(0.8)';
          } else if (currentY < lastScrollY - 5) {
            fab.style.opacity = '1';
            fab.style.pointerEvents = '';
            fab.style.transform = 'scale(1)';
          }
          lastScrollY = currentY;
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });
  })();
</script>
