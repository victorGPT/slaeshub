<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0B0E11" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 特别关注</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; color: #EAECEF; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    button, a { -webkit-tap-highlight-color: transparent; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .top-nav { height: 52px; position: sticky; top: 0; z-index: 30; background: #0B0E11; border-bottom: 1px solid #2E3440; display: flex; align-items: center; justify-content: center; }
    .event-list-inner { padding: 12px 16px 116px; }
    .event-card { background: #1E2329; border: 1px solid #2E3440; border-radius: 16px; padding: 14px; margin-bottom: 10px; box-sizing: border-box; }
    .event-card.closed { opacity: 0.4; }
    .event-card.closed .event-card-line { text-decoration: line-through; }
    .event-card-anchor { display: block; text-decoration: none; color: inherit; }
    .event-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .event-card-meta-group { min-width: 0; flex: 1; }
    .event-card-client { font-size: 11px; color: #848E9C; line-height: 1.35; }
    .event-card-title { margin-top: 8px; font-size: 14px; font-weight: 600; line-height: 1.5; color: #EAECEF; word-break: break-word; }
    .event-card-bottom-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .event-type-badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; font-size: 10px; color: #F0B90B; background: rgba(240,185,11,0.12); border: 1px solid rgba(240,185,11,0.22); }
    .event-created-at { font-size: 11px; color: #848E9C; }
    .event-deadline-badge { display: inline-flex; align-items: center; justify-content: center; padding: 3px 10px; border-radius: 999px; border: 1px solid; font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .event-card-actions { display: flex; gap: 8px; margin-top: 12px; }
    .event-footer-btn { flex: 1; height: 34px; border-radius: 10px; border: 1px solid #2E3440; background: #2B3139; color: #EAECEF; font-size: 12px; cursor: pointer; }
    .event-footer-btn-danger { color: #F6465D; border-color: rgba(246,70,93,0.25); background: rgba(246,70,93,0.08); }
    .event-footer-btn-disabled { pointer-events: none; opacity: 0.55; }
    .event-empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 24px 128px; color: #848E9C; text-align: center; }
    .event-empty-icon { font-size: 36px; color: #474D57; margin-bottom: 14px; }
    .event-empty-title { font-size: 15px; color: #EAECEF; }
    .event-empty-desc { margin-top: 6px; font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div>
    <div style="height:44px;background:#0B0E11;display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-sizing:border-box;">
      <span style="font-size:12px;font-weight:600;color:#EAECEF;">9:41</span>
      <div style="display:flex;align-items:center;gap:6px;color:#EAECEF;">
        <i class="fa-solid fa-signal" style="font-size:12px;"></i>
        <i class="fa-solid fa-wifi" style="font-size:12px;"></i>
        <i class="fa-solid fa-battery-full" style="font-size:13px;"></i>
      </div>
    </div>

    <div class="top-nav">
      <h1 style="margin:0;font-size:17px;font-weight:700;color:#EAECEF;letter-spacing:0.02em;">特别关注</h1>
    </div>

    <div id="event-list"></div>
  </div>

  <div class="fixed-bar" style="background:#0B0E11;border-top:1px solid #2E3440;z-index:30;">
    <div style="display:flex;align-items:center;justify-content:space-around;height:56px;">
      <a href="home.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-house" style="font-size:18px;color:#848E9C;"></i>
        <span style="font-size:10px;color:#848E9C;">首页</span>
      </a>
      <a href="clients.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-users" style="font-size:18px;color:#848E9C;"></i>
        <span style="font-size:10px;color:#848E9C;">客户</span>
      </a>
      <a href="events.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-bell" style="font-size:18px;color:#848E9C;"></i>
        <span style="font-size:10px;color:#848E9C;">事件</span>
      </a>
      <a href="star.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-star" style="font-size:18px;color:#F0B90B;"></i>
        <span style="font-size:10px;color:#F0B90B;font-weight:600;">特别关注</span>
      </a>
      <a href="profile.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-user" style="font-size:18px;color:#848E9C;"></i>
        <span style="font-size:10px;color:#848E9C;">我的</span>
      </a>
    </div>
    <div style="height:env(safe-area-inset-bottom,0px);"></div>
  </div>

  <script src="mock-events.js"></script>
  <script src="event-center-shared.js"></script>
  <script>
    window.EventCenterShared.mountEventCenter({
      pageMode: 'star',
      listId: 'event-list'
    });
  </script>
</body>
</html>
