<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 事件中心</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <div class="w-[60px]"></div>
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">事件中心</h1>
    <div class="w-[60px]"></div>
  </div>

  <!-- Upgrade Banner -->
  <div class="mx-4 mt-6 mb-6 flex flex-col items-center text-center py-8">
    <div class="w-16 h-16 rounded-2xl bg-[#1E2329] border border-[#2E3440] flex items-center justify-center mb-4">
      <i class="fa-solid fa-arrow-up-from-bracket text-[#F0B90B] text-[24px]"></i>
    </div>
    <p class="text-[15px] font-semibold text-[#EAECEF] mb-1">事件系统升级中</p>
    <p class="text-[12px] text-[#848E9C]">正在对齐资沉框架，以下为示例事件</p>
  </div>

  <!-- Static Event Cards -->
  <div class="px-4 pb-[100px] space-y-3">

    <!-- Event 1: Churn Warning (red) -->
    <a href="event-thread.html" class="block bg-[#1E2329] rounded-xl border border-[#2E3440] p-4 active:bg-[#2B3139]">
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 bg-[#2D1519]">
          <i class="fa-solid fa-arrow-trend-down text-[16px] text-[#F6465D]"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2">
              <span class="text-[10px] px-2 py-0.5 rounded-full bg-[#2D1519] text-[#F6465D]">资沉流失预警</span>
              <span class="text-[14px] font-semibold text-[#EAECEF]">张伟</span>
            </div>
            <span class="text-[11px] text-[#474D57] flex-shrink-0">2小时前</span>
          </div>
          <p class="text-[12px] text-[#848E9C] truncate">近7天资沉下降 15%</p>
        </div>
        <i class="fa-solid fa-chevron-right text-[#848E9C] text-[12px] flex-shrink-0 mt-3"></i>
      </div>
    </a>

    <!-- Event 2: Maturity Reminder (gold) -->
    <div class="block bg-[#1E2329] rounded-xl border border-[#2E3440] p-4">
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 bg-[#2D1B00]">
          <i class="fa-solid fa-clock text-[16px] text-[#F0B90B]"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2">
              <span class="text-[10px] px-2 py-0.5 rounded-full bg-[#2D1B00] text-[#F0B90B]">理财到期提醒</span>
              <span class="text-[14px] font-semibold text-[#EAECEF]">李芳</span>
            </div>
            <span class="text-[11px] text-[#474D57] flex-shrink-0">5小时前</span>
          </div>
          <p class="text-[12px] text-[#848E9C] truncate">500万理财即将到期</p>
        </div>
        <i class="fa-solid fa-chevron-right text-[#848E9C] text-[12px] flex-shrink-0 mt-3"></i>
      </div>
    </div>

    <!-- Event 3: Growth Notification (green) -->
    <div class="block bg-[#1E2329] rounded-xl border border-[#2E3440] p-4">
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 bg-[#0D2620]">
          <i class="fa-solid fa-arrow-trend-up text-[16px] text-[#0ECB81]"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2">
              <span class="text-[10px] px-2 py-0.5 rounded-full bg-[#0D2620] text-[#0ECB81]">资沉增长通知</span>
              <span class="text-[14px] font-semibold text-[#EAECEF]">王强</span>
            </div>
            <span class="text-[11px] text-[#474D57] flex-shrink-0">1天前</span>
          </div>
          <p class="text-[12px] text-[#848E9C] truncate">近7天资沉增长 23%</p>
        </div>
        <i class="fa-solid fa-chevron-right text-[#848E9C] text-[12px] flex-shrink-0 mt-3"></i>
      </div>
    </div>

  </div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

</body>
</html>
