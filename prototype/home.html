<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0B0E11" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    @keyframes starTickerScroll {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="flex-shrink-0 h-[52px] bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <span class="text-[15px] font-black" style="color:#F0B90B;letter-spacing:-0.5px">SH</span><h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">首页</h1><a href="profile.html" class="w-8 h-8 flex items-center justify-center rounded-full"><i class="fa-solid fa-circle-user text-[20px] text-[#474D57]"></i></a>
  </div>

  <!-- Search Bar -->
  <div class="flex-shrink-0 bg-[#0B0E11] px-4 py-1.5 relative z-20">
    <div class="flex items-center bg-[#1E2329] rounded-lg px-3 py-2 border border-[#2E3440]">
      <i class="fa-solid fa-magnifying-glass text-[12px] text-[#848E9C] mr-2"></i>
      <input id="search-input" type="text" placeholder="搜索客户名字或 UID..."
             class="flex-1 bg-transparent text-[13px] text-[#EAECEF] outline-none placeholder-[#474D57]"
             oninput="onSearchInput()" />
      <button id="search-clear" onclick="clearSearch()" class="hidden text-[#848E9C] text-[12px] ml-2 bg-transparent border-0 cursor-pointer">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <!-- Search Results Dropdown -->
    <div id="search-dropdown" class="hidden absolute left-0 right-0 top-full z-40 mx-4 bg-[#1E2329] rounded-b-lg border border-t-0 border-[#2E3440] max-h-[320px] overflow-y-auto shadow-lg"></div>
  </div>

  <!-- Scrollable Content -->
  <div class="py-2 pb-[calc(56px+env(safe-area-inset-bottom,34px)+8px)]" id="main-content"></div>

  <div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">首页</span>
    </a>
    <a href="star.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-list-check text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">待办</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">事件</span>
    </a>
  </div>
  <div style="height:env(safe-area-inset-bottom,0px)"></div>
</div>

<!-- Tooltip overlay -->
<div id="tip-overlay" onclick="hideTip()" style="display:none;position:fixed;inset:0;z-index:100"></div>
<div id="tip-box" style="display:none;position:fixed;z-index:101;background:#2B3139;border:1px solid #2E3440;border-radius:10px;padding:10px 14px;max-width:180px;font-size:12px;color:#EAECEF;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,0.5)"></div>

<script src="mock-data.js"></script>
<script src="mock-seed.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;

  // ---------- Data helpers ----------

  // 金额格式化（K/M/B）
  function fmt(val, withSign) {
    var abs = Math.abs(val);
    var sign = withSign ? (val >= 0 ? '+' : '-') : (val < 0 ? '-' : '');
    if (abs >= 1e9) return sign + (abs / 1e9).toFixed(1) + 'B';
    if (abs >= 1e6) return sign + (abs / 1e6).toFixed(1) + 'M';
    if (abs >= 1e3) return sign + (abs / 1e3).toFixed(1) + 'K';
    return (withSign && val > 0 ? '+' : (val < 0 ? '-' : '')) + Math.round(abs).toLocaleString();
  }
  function fmtUSDT(val, showSign) { return fmt(val, showSign); }
  function fmtWan(val) { return fmt(val, true); }

  // ---------- 排序 ----------

  // 按资沉降序，取前十，同时带7天贡献数据
  var rankList = D.clients.slice().sort(function(a, b) {
    return (b.fMean || 0) - (a.fMean || 0);
  }).slice(0, 10);

  // ---------- Render helpers ----------

  var TIPS = {
    deposit:      '资沉：客户过去滚动7日持仓资产均值（USDT）\n变化%：过去7日资沉 vs 过去8周滚动均值',
    contribution: '7天贡献：交易所过去滚动7日从该客户获得的盈利\n变化%：过去7日贡献 vs 过去8周滚动均值',
  };

  window.showTip = function(col, el) {
    var box = document.getElementById('tip-box');
    var overlay = document.getElementById('tip-overlay');
    box.innerHTML = (TIPS[col] || '').replace(/\n/g, '<br>');
    var rect = el.getBoundingClientRect();
    var boxW = 180;
    var left = Math.min(rect.left, window.innerWidth - boxW - 12);
    box.style.left = Math.max(12, left) + 'px';
    box.style.top = (rect.bottom + 6) + 'px';
    box.style.display = 'block';
    overlay.style.display = 'block';
  };
  window.hideTip = function() {
    document.getElementById('tip-box').style.display = 'none';
    document.getElementById('tip-overlay').style.display = 'none';
  };

  function tipIcon(col) {
    return '<i onclick="event.stopPropagation();showTip(\'' + col + '\',this)" class="fa-regular fa-circle-question" style="color:#474D57;font-size:9px;margin-left:3px;cursor:pointer"></i>';
  }

  function renderRankTableHeader() {
    return '<div style="display:grid;grid-template-columns:1fr 128px 104px;padding:7px 12px 5px;border-bottom:1px solid #2E3440">'
      + '<span style="font-size:13px;font-weight:600;color:#848E9C">客户</span>'
      + '<span style="font-size:13px;font-weight:600;color:#848E9C;display:flex;align-items:center;gap:2px">资沉' + tipIcon('deposit') + '</span>'
      + '<span style="font-size:13px;font-weight:600;color:#848E9C;display:flex;align-items:center;gap:2px">7天贡献' + tipIcon('contribution') + '</span>'
      + '</div>';
  }

  function renderRankTableRows(list) {
    return list.map(function(c, idx) {
      var border = idx < list.length - 1 ? 'border-bottom:1px solid #2E3440;' : '';

      // 资沉
      var depositVal = c.fMean != null ? c.fMean : null;
      var depositChgPct = null;
      if (depositVal != null && c.weeks && c.weeks.length > 0) {
        var thisWeek = c.weeks[c.weeks.length - 1];
        depositChgPct = depositVal > 0 ? ((thisWeek - depositVal) / depositVal * 100) : 0;
      }
      var dChgColor = depositChgPct != null ? (depositChgPct >= 0 ? '#0ECB81' : '#F6465D') : null;
      var dChgBg    = depositChgPct != null ? (depositChgPct >= 0 ? 'rgba(14,203,129,0.15)' : 'rgba(246,70,93,0.15)') : null;
      var depositHTML = depositVal != null
        ? '<div style="display:flex;align-items:center;gap:4px;flex-wrap:nowrap">'
        +   '<span style="font-size:13px;font-weight:700;color:#F0B90B;white-space:nowrap">' + fmt(depositVal, false) + '</span>'
        +   (depositChgPct != null ? '<span style="font-size:9px;font-weight:600;color:' + dChgColor + ';background:' + dChgBg + ';padding:1px 4px;border-radius:3px;white-space:nowrap">' + (depositChgPct >= 0 ? '+' : '') + depositChgPct.toFixed(1) + '%</span>' : '')
        + '</div>'
        : '<span style="font-size:13px;color:#474D57">—</span>';

      // 7天贡献
      var contribVal = c.netContribution && c.netContribution.total != null ? c.netContribution.total : null;
      var contribWow = c.netContribution && c.netContribution.wow != null ? c.netContribution.wow * 100 : null;
      var cColor    = contribVal != null ? (contribVal >= 0 ? '#0ECB81' : '#F6465D') : '#474D57';
      var cChgColor = contribWow != null ? (contribWow >= 0 ? '#0ECB81' : '#F6465D') : null;
      var cChgBg    = contribWow != null ? (contribWow >= 0 ? 'rgba(14,203,129,0.15)' : 'rgba(246,70,93,0.15)') : null;
      var profitHTML = contribVal != null
        ? '<div style="display:flex;align-items:center;gap:4px;flex-wrap:nowrap">'
        +   '<span style="font-size:13px;font-weight:600;color:' + cColor + ';white-space:nowrap">' + fmt(contribVal, false) + '</span>'
        +   (contribWow != null ? '<span style="font-size:9px;font-weight:600;color:' + cChgColor + ';background:' + cChgBg + ';padding:1px 4px;border-radius:3px;white-space:nowrap">' + (contribWow >= 0 ? '+' : '') + contribWow.toFixed(1) + '%</span>' : '')
        + '</div>'
        : '<span style="font-size:13px;color:#474D57">—</span>';

      return '<a href="' + (c.detailHref || 'client-detail.html?uid=' + c.uid) + '" '
        + 'style="display:grid;grid-template-columns:1fr 128px 104px;align-items:center;padding:10px 12px;' + border + 'text-decoration:none">'
        + '<div>'
        +   '<div style="font-size:12px;font-weight:600;color:#EAECEF">' + c.uid + '</div>'
        +   (c.name ? '<div style="font-size:11px;color:#848E9C;margin-top:1px">' + c.name + '</div>' : '')
        + '</div>'
        + '<div>' + depositHTML + '</div>'
        + '<div>' + profitHTML  + '</div>'
        + '</a>';
    }).join('');
  }

  function renderRankTable() {
    return renderRankTableHeader()
      + renderRankTableRows(rankList);
  }

  // ---------- 推荐客户 / 跟进事件 ----------

  // ---------- 待办（静态列表，星标事件） ----------

  function buildTodoSection() {
    var fuEvents = [], flagged = [], closed = [];
    try { fuEvents = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    try { flagged = JSON.parse(localStorage.getItem('slaesh_flagged') || '[]'); } catch(e) {}
    try { closed = JSON.parse(localStorage.getItem('slaesh_closed') || '[]'); } catch(e) {}

    var evMap = {};
    fuEvents.forEach(function(ev) { if (ev.id) evMap[ev.id] = ev; });
    var closedSet = {};
    closed.forEach(function(id) { closedSet[String(id)] = true; });

    var items = flagged
      .map(function(f) {
        var ev = evMap[f.fuId];
        if (!ev || closedSet[f.fuId]) return null;
        return { ev: ev };
      })
      .filter(Boolean)
      .sort(function(a, b) {
        return new Date(b.ev.created_at) - new Date(a.ev.created_at);
      });

    var countBadge = items.length > 0
      ? '<span style="font-size:10px;color:#F0B90B;background:rgba(240,185,11,0.12);border:1px solid rgba(240,185,11,0.25);border-radius:999px;padding:1px 7px">' + items.length + '</span>'
      : '';

    var contentHtml;
    if (items.length === 0) {
      contentHtml = '<div style="padding:20px 16px;text-align:center;color:#848E9C;font-size:13px">暂无待办<br><span style="font-size:11px">在事件页加入待办后将出现在这里</span></div>';
    } else {
      contentHtml = items.map(function(item, i) {
        var ev = item.ev;
        var nick = localStorage.getItem('nickname_' + ev.client_uid) || '';
        var clientLabel = ev.client_uid + (nick ? ' · ' + nick : '');
        var createdDate = ev.created_at ? (function() { var d = new Date(ev.created_at); return (d.getMonth()+1) + '月' + d.getDate() + '日'; })() : '';
        var border = i < items.length - 1 ? 'border-bottom:1px solid #2E3440;' : '';
        return '<a href="follow-up-thread.html?fuId=' + ev.id + '" style="display:flex;align-items:center;gap:10px;padding:10px 14px;' + border + 'text-decoration:none">'
          + '<i class="fa-solid fa-star" style="font-size:11px;color:#F0B90B;flex-shrink:0"></i>'
          + '<div style="flex:1;min-width:0">'
          + '<div style="font-size:13px;color:#EAECEF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (ev.title || '—') + '</div>'
          + '<div style="margin-top:2px;font-size:10px;color:#848E9C">' + clientLabel + '</div>'
          + '</div>'
          + (createdDate ? '<span style="font-size:10px;color:#474D57;white-space:nowrap;flex-shrink:0">' + createdDate + '</span>' : '')
          + '</a>';
      }).join('');
    }

    return '<div style="margin:0 16px 12px">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'
      +   '<i class="fa-solid fa-circle-check" style="color:#F0B90B;font-size:12px"></i>'
      +   '<span style="font-size:13px;font-weight:600;color:#848E9C">待办</span>'
      +   countBadge
      + '</div>'
      + '<div style="background:#1E2329;border-radius:12px;border:1px solid #2E3440;overflow:hidden">'
      + contentHtml
      + '<a href="star.html" style="display:flex;align-items:center;justify-content:center;gap:4px;padding:11px 16px;border-top:1px solid #2E3440;text-decoration:none;font-size:13px;font-weight:600;color:#F0B90B">'
      +   '<span>查看全部待办</span><i class="fa-solid fa-chevron-right" style="font-size:10px"></i>'
      + '</a>'
      + '</div>'
      + '</div>';
  }

  // ---------- 事件（垂直滚动跑马灯） ----------

  function buildEventsTickerSection() {
    var fuEvents = [];
    try { fuEvents = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}

    // 按创建时间降序，取全部
    var items = fuEvents.slice().sort(function(a, b) {
      return new Date(b.created_at) - new Date(a.created_at);
    });

    if (items.length === 0) {
      return '<div style="margin:0 16px 12px">'
        + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'
        +   '<i class="fa-solid fa-bell" style="color:#F0B90B;font-size:12px"></i>'
        +   '<span style="font-size:13px;font-weight:600;color:#848E9C">事件</span>'
        + '</div>'
        + '<div style="background:#1E2329;border-radius:12px;border:1px solid #2E3440;padding:20px 16px;text-align:center;color:#848E9C;font-size:13px">暂无事件</div>'
        + '</div>';
    }

    var TYPE_COLORS = {
      '大额充值': '#0ECB81', '大额提现': '#F6465D',
      '大额亏损': '#F6465D', '大额盈利': '#0ECB81',
    };

    var rowH = 52;
    var visibleRows = Math.min(items.length, 3);
    var containerH = rowH * visibleRows + 1;

    function rowHtml(ev) {
      var nick = localStorage.getItem('nickname_' + ev.client_uid) || '';
      var clientLabel = (ev.client_name || ev.client_uid) + (nick ? ' · ' + nick : '');
      var typeColor = TYPE_COLORS[ev.type] || '#848E9C';
      return '<a href="follow-up-thread.html?fuId=' + ev.id + '" '
        + 'style="display:flex;align-items:center;gap:10px;padding:0 14px;height:' + rowH + 'px;border-bottom:1px solid #2E3440;text-decoration:none;flex-shrink:0;box-sizing:border-box">'
        + '<span style="font-size:10px;padding:1px 7px;border-radius:999px;background:' + typeColor + '1a;color:' + typeColor + ';border:1px solid ' + typeColor + '33;white-space:nowrap;flex-shrink:0">' + (ev.type || '事件') + '</span>'
        + '<div style="flex:1;min-width:0">'
        +   '<div style="font-size:13px;color:#EAECEF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (ev.title || '—') + '</div>'
        +   '<div style="margin-top:2px;font-size:10px;color:#848E9C">' + clientLabel + '</div>'
        + '</div>'
        + '</a>';
    }

    // 数量足够才滚动，少于等于3条静态展示
    var needScroll = items.length > 3;
    var allRows = needScroll ? items.concat(items).map(rowHtml).join('') : items.map(rowHtml).join('');
    var duration = (items.length * 2.5).toFixed(1);
    var innerStyle = needScroll
      ? 'display:flex;flex-direction:column;animation:starTickerScroll ' + duration + 's linear infinite'
      : 'display:flex;flex-direction:column';

    return '<div style="margin:0 16px 12px">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'
      +   '<i class="fa-solid fa-bell" style="color:#F0B90B;font-size:12px"></i>'
      +   '<span style="font-size:13px;font-weight:600;color:#848E9C">事件</span>'
      +   '<span style="font-size:10px;color:#848E9C;background:rgba(132,142,156,0.12);border:1px solid rgba(132,142,156,0.2);border-radius:999px;padding:1px 7px">' + items.length + '</span>'
      + '</div>'
      + '<div style="background:#1E2329;border-radius:12px;border:1px solid #2E3440;overflow:hidden">'
      +   '<div style="height:' + containerH + 'px;overflow:hidden;position:relative">'
      +     '<div id="events-ticker-inner" style="' + innerStyle + '">' + allRows + '</div>'
      +   '</div>'
      +   '<a href="events.html" style="display:flex;align-items:center;justify-content:center;gap:4px;padding:11px 16px;border-top:1px solid #2E3440;text-decoration:none;font-size:13px;font-weight:600;color:#F0B90B">'
      +     '<span>查看全部事件</span><i class="fa-solid fa-chevron-right" style="font-size:10px"></i>'
      +   '</a>'
      + '</div>'
      + '</div>';
  }

  // ---------- 用户排名（4 Tab） ----------

  function buildRankSection() {
    var moreFooter = '<a href="clients.html" '
      + 'style="display:flex;align-items:center;justify-content:center;gap:4px;'
      + 'padding:11px 16px;border-top:1px solid #2E3440;text-decoration:none;'
      + 'font-size:13px;font-weight:600;color:#F0B90B">'
      + '<span>查看全部客户</span>'
      + '<i class="fa-solid fa-chevron-right" style="font-size:10px"></i>'
      + '</a>';

    return '<div style="margin:0 16px 12px">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'
      +   '<i class="fa-solid fa-chart-bar" style="color:#F0B90B;font-size:12px"></i>'
      +   '<span style="font-size:13px;font-weight:600;color:#848E9C;flex:1">用户排名</span>'
      +   '<span id="refresh-time" style="font-size:11px;color:#474D57">--:--</span>'
      + '</div>'
      + '<div style="background:#1E2329;border-radius:12px;border:1px solid #2E3440;overflow:hidden">'
      + renderRankTable()
      + moreFooter
      + '</div>'
      + '</div>';
  }

  // ---------- 注入页面 ----------

  document.getElementById('main-content').innerHTML =
    buildEventsTickerSection()
  + buildTodoSection()
  + buildRankSection();

  // 事件跑马灯 hover 暂停
  var eventsTicker = document.getElementById('events-ticker-inner');
  if (eventsTicker) {
    eventsTicker.addEventListener('mouseenter', function() { eventsTicker.style.animationPlayState = 'paused'; });
    eventsTicker.addEventListener('mouseleave', function() { eventsTicker.style.animationPlayState = 'running'; });
  }

  // ---------- Search ----------

  function renderSearchResults(query) {
    var dropdown = document.getElementById('search-dropdown');
    var clearBtn = document.getElementById('search-clear');

    if (!query) {
      dropdown.classList.add('hidden');
      clearBtn.classList.add('hidden');
      return;
    }

    clearBtn.classList.remove('hidden');
    var q = query.toLowerCase();
    var matches = D.clients.filter(function(c) {
      return c.name.toLowerCase().indexOf(q) !== -1 || c.uid.toLowerCase().indexOf(q) !== -1;
    }).slice(0, 20);

    if (matches.length === 0) {
      dropdown.innerHTML = '<div class="text-center py-6 text-[13px] text-[#848E9C]">未找到匹配客户</div>';
      dropdown.classList.remove('hidden');
      return;
    }

    dropdown.innerHTML = matches.map(function(c) {
      var nick = localStorage.getItem('nickname_' + c.uid) || '';
      return '<a href="client-detail.html?uid=' + c.uid + '" class="flex items-center justify-between px-4 py-3 border-b border-[#2E3440] last:border-0 active:bg-[#2B3139]">'
        + '<div>'
        +   '<div class="text-[13px] font-medium text-[#EAECEF]">' + c.uid + '</div>'
        +   (nick ? '<div class="text-[11px] text-[#848E9C] mt-0.5">' + nick + '</div>' : '')
        + '</div>'
        + '<i class="fa-solid fa-chevron-right text-[10px] text-[#474D57] flex-shrink-0"></i>'
        + '</a>';
    }).join('');

    dropdown.classList.remove('hidden');
  }

  window.onSearchInput = function() {
    var query = document.getElementById('search-input').value.trim();
    renderSearchResults(query);
  };

  window.clearSearch = function() {
    document.getElementById('search-input').value = '';
    renderSearchResults('');
    document.getElementById('search-input').focus();
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('search-input').value = '';
      renderSearchResults('');
    }
  });

  // Clear search state on page load
  document.getElementById('search-input').value = '';
  document.getElementById('search-dropdown').classList.add('hidden');
  document.getElementById('search-clear').classList.add('hidden');

  // 刷新时间
  var now = new Date();
  var hh = String(now.getHours()).padStart(2, '0');
  var mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('refresh-time').textContent = '更新于 ' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + hh + ':' + mm;

})();
</script>

</body>
</html>
