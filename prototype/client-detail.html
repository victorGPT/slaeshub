<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>客户详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center">
      <i class="fa-solid fa-chevron-left text-[16px] text-[#EAECEF]"></i>
    </button>
    <h1 class="text-[17px] font-bold text-[#EAECEF]">客户详情</h1>
    <div class="w-8"></div>
  </div>

  <!-- Page Content -->
  <div id="page-content" class="overflow-y-auto pb-[120px]"></div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;
  var uid = new URLSearchParams(location.search).get('uid');
  var c = uid ? D.clientsById[uid] : null;

  if (!c) {
    document.getElementById('page-content').innerHTML =
      '<div class="mx-4 mt-8 bg-[#1E2329] rounded-xl border border-[#2E3440] p-6 text-center text-[#848E9C]">未找到客户数据</div>';
    return;
  }

  // Format fRecent as display string
  function formatWan(val) {
    var wan = val / 10000;
    if (wan >= 1) return '$ ' + Math.round(wan).toLocaleString() + ' 万';
    return '$ ' + wan.toFixed(1) + ' 万';
  }

  var fRecentDisplay = formatWan(c.fRecent);
  var trendColor = c.adjustedTrendF > 0 ? '#0ECB81' : (c.adjustedTrendF < 0 ? '#F6465D' : '#848E9C');
  var trendSign = c.adjustedTrendF > 0 ? '+' : '';
  var trendPct = trendSign + (c.adjustedTrendF * 100).toFixed(1) + '%';
  var absArrow = c.absChange > 0 ? ' \\u2191' : (c.absChange < 0 ? ' \\u2193' : '');

  // All 6 business lines
  var allBizLines = ['合约', '杠杆', '理财', '金融卡', '云算力', 'Mini合约'];
  var bizSet = {};
  c.bizLines.forEach(function(b) { bizSet[b] = true; });

  var bizHTML = allBizLines.map(function(line) {
    var active = bizSet[line];
    if (active) {
      return '<div class="flex items-center gap-1.5">'
        + '<i class="fa-solid fa-check text-[12px] text-[#0ECB81]"></i>'
        + '<span class="text-[13px] text-[#EAECEF]">' + line + '</span>'
        + '</div>';
    } else {
      return '<div class="flex items-center gap-1.5">'
        + '<i class="fa-solid fa-xmark text-[12px] text-[#848E9C]"></i>'
        + '<span class="text-[13px] text-[#848E9C]">' + line + '</span>'
        + '</div>';
    }
  }).join('');

  // Load BD notes from localStorage
  var noteKey = 'bd_note_' + c.uid;
  var savedNote = localStorage.getItem(noteKey) || '';

  var html = ''
    // Client header
    + '<div class="px-4 pt-4 pb-3">'
    +   '<div class="text-[20px] font-bold text-[#EAECEF] mb-1">' + c.name + '</div>'
    +   '<div class="flex items-center gap-2">'
    +     '<span class="text-[13px] text-[#848E9C]">UID: ' + c.uid + '</span>'
    +     '<span class="text-[11px] px-2 py-0.5 rounded-full" style="background:' + c.statusBadge.bg + ';color:' + c.statusBadge.text + '">' + c.status + '</span>'
    +   '</div>'
    + '</div>'

    // Deposit card
    + '<div class="mx-4 mb-3 bg-[#1E2329] rounded-xl border border-[#2E3440] p-4">'
    +   '<div class="text-[13px] text-[#848E9C] mb-1">当前资沉</div>'
    +   '<div class="text-[28px] font-bold text-[#EAECEF] mb-3">' + c.depositDisplay + '</div>'
    +   '<div class="flex items-center gap-4 pb-3 border-b border-[#2E3440]">'
    +     '<div class="flex-1">'
    +       '<div class="text-[11px] text-[#848E9C] mb-0.5">30日均值</div>'
    +       '<div class="text-[15px] font-semibold text-[#EAECEF]">' + c.depositDisplay + '</div>'
    +     '</div>'
    +     '<div class="flex-1">'
    +       '<div class="text-[11px] text-[#848E9C] mb-0.5">7日均值</div>'
    +       '<div class="text-[15px] font-semibold text-[#EAECEF]">' + fRecentDisplay + '</div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="pt-3 flex items-center justify-between">'
    +     '<div>'
    +       '<span class="text-[12px] text-[#848E9C]">趋势(去市场): </span>'
    +       '<span class="text-[14px] font-bold" style="color:' + trendColor + '">' + trendPct + '</span>'
    +     '</div>'
    +     '<div>'
    +       '<span class="text-[12px] text-[#848E9C]">绝对变化: </span>'
    +       '<span class="text-[14px] font-bold" style="color:' + trendColor + '">' + c.absChangeDisplay + absArrow + '</span>'
    +     '</div>'
    +   '</div>'
    + '</div>'

    // Reason analysis
    + '<div class="mx-4 mb-3">'
    +   '<div class="text-[14px] font-semibold text-[#EAECEF] mb-2">原因分析</div>'
    +   '<div class="bg-[#1E2329] rounded-xl border border-[#2E3440] p-4">'
    +     '<div class="text-[13px] text-[#EAECEF]">' + c.reasonTag + '</div>'
    +   '</div>'
    + '</div>'

    // Suggested action
    + '<div class="mx-4 mb-3">'
    +   '<div class="text-[14px] font-semibold text-[#EAECEF] mb-2">建议动作</div>'
    +   '<div class="bg-[#1E2329] rounded-xl border border-[#2E3440] p-4">'
    +     '<div class="text-[13px] text-[#F0B90B]"><i class="fa-solid fa-arrow-right text-[11px] mr-1"></i>' + c.suggestedAction + '</div>'
    +   '</div>'
    + '</div>'

    // Business participation
    + '<div class="mx-4 mb-3">'
    +   '<div class="text-[14px] font-semibold text-[#EAECEF] mb-2">业务参与情况</div>'
    +   '<div class="bg-[#1E2329] rounded-xl border border-[#2E3440] p-4">'
    +     '<div class="grid grid-cols-3 gap-3">' + bizHTML + '</div>'
    +   '</div>'
    + '</div>'

    // BD notes
    + '<div class="mx-4 mb-3">'
    +   '<div class="text-[14px] font-semibold text-[#EAECEF] mb-2">BD 备注</div>'
    +   '<div class="bg-[#1E2329] rounded-xl border border-[#2E3440] p-4">'
    +     '<textarea id="bd-note" class="w-full bg-[#2B3139] text-[#EAECEF] text-[13px] rounded-lg p-3 border border-[#2E3440] outline-none resize-none min-h-[100px]" placeholder="添加备注...">' + savedNote.replace(/</g, '&lt;') + '</textarea>'
    +   '</div>'
    + '</div>'

    // Follow-up records placeholder
    + '<div class="mx-4 mb-6">'
    +   '<div class="text-[14px] font-semibold text-[#EAECEF] mb-2">跟进记录</div>'
    +   '<div class="bg-[#1E2329] rounded-xl border border-[#2E3440] p-4">'
    +     '<div class="text-[13px] text-[#848E9C]">暂无跟进记录，后续版本将支持添加跟进。</div>'
    +   '</div>'
    + '</div>';

  document.getElementById('page-content').innerHTML = html;

  // Auto-save BD notes on input
  var noteEl = document.getElementById('bd-note');
  if (noteEl) {
    noteEl.addEventListener('input', function() {
      localStorage.setItem(noteKey, noteEl.value);
    });
  }
})();
</script>

</body>
</html>
