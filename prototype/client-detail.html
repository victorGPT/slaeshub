    tailwind.config = {

            'hub-bg':         '#0B0E11',

            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }

  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .tab-btn { transition: color 0.15s; }
    .tab-btn.active { color: #F0B90B; }
    .tab-btn.active .tab-line { background: #F0B90B; }
    .tab-line { height: 2px; background: transparent; transition: background 0.15s; }

    .event-card { background: #1E2329; border: 1px solid #2E3440; border-radius: 16px; padding: 14px; margin-bottom: 10px; box-sizing: border-box; }
    .event-card.closed { opacity: 0.4; }
    .event-type-badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; font-size: 10px; color: #F0B90B; background: rgba(240,185,11,0.12); border: 1px solid rgba(240,185,11,0.22); }
  </style>

<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div id="sticky-top" class="sticky top-0 z-20 bg-[#0B0E11]">
    <!-- Nav bar -->
    <div class="h-[44px] border-b border-[#2E3440] flex items-center justify-between px-4">
      <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center">
        <i class="fa-solid fa-chevron-left text-[16px] text-[#EAECEF]"></i>
      </button>
      <h1 class="text-[16px] font-bold text-[#EAECEF]">客户详情</h1>
      <div class="w-8"></div>
    </div>

    <!-- Unified Header Card -->
    <div class="mx-3 mt-2 mb-2 bg-[#1E2329] rounded-2xl border border-[#2E3440] overflow-hidden">
      <!-- Row 1: Identity -->
      <div class="flex items-center gap-3 px-4 pt-3 pb-2">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <button id="uid-copy-btn" onclick="copyUid()" class="flex items-center gap-1.5 active:opacity-70">
              <span id="client-uid" class="text-[16px] font-bold text-[#EAECEF] tabular-nums tracking-wide"></span>
              <i class="fa-regular fa-copy text-[10px] text-[#474D57]"></i>
            </button>
            <span id="top-nickname" class="text-[12px] text-[#848E9C]"></span>
          </div>
        </div>
        <span id="from-badge" class="text-[9px] px-1.5 py-[1px] rounded hidden flex-shrink-0"></span>
      </div>

      <!-- Row 2: Tags -->
      <div id="tags-row" class="px-4 pb-2 flex flex-wrap gap-1"></div>

      <!-- Row 3: 资沉 + 7天贡献（左右平分） -->
      <div style="display:grid;grid-template-columns:1fr 1fr;padding:10px 16px 14px;gap:0">
        <div style="padding-right:12px">
          <div class="text-[10px] text-[#474D57] mb-1 flex items-center gap-1">资沉<i onclick="event.stopPropagation();showDetailTip('deposit',this)" class="fa-regular fa-circle-question" style="color:#474D57;font-size:9px;cursor:pointer"></i></div>
          <span id="deposit-hero" class="text-[22px] font-bold text-[#F0B90B] tracking-tight leading-none block"></span>
          <div id="deposit-delta" class="flex items-center gap-1 mt-1.5"></div>
        </div>
        <div style="padding-left:12px">
          <div class="text-[10px] text-[#474D57] mb-1 flex items-center gap-1">7天贡献<i onclick="event.stopPropagation();showDetailTip('contribution',this)" class="fa-regular fa-circle-question" style="color:#474D57;font-size:9px;cursor:pointer"></i></div>
          <span id="contribution-hero" class="text-[22px] font-bold leading-none block">--</span>
          <div id="contribution-delta" class="flex items-center gap-1 mt-1.5"></div>
        </div>
      </div>

      <span id="data-refresh-time" style="display:block;text-align:right;padding:0 16px 10px;font-size:9px;color:#474D57"></span>

      <!-- Row 5: Last Contact -->
      <div id="last-contact-row" class="hidden px-4 pb-3 flex items-center justify-between"></div>
      <!-- Row 6: Active Follow-up (hidden when none) -->
      <div id="active-followup-row" class="hidden px-4 pb-3 flex items-center justify-between"></div>
    </div>

    <!-- Tab Bar -->
    <div class="flex border-b border-[#2E3440]">
      <button class="tab-btn active flex-1 py-2 text-center text-[13px] font-medium text-[#848E9C]" data-tab="assets">
        <span>资产</span>
        <div class="tab-line mt-1 mx-auto w-10 rounded-full"></div>
      </button>
      <button class="tab-btn flex-1 py-2 text-center text-[13px] font-medium text-[#848E9C]" data-tab="events">
        <span>事件</span>
        <div class="tab-line mt-1 mx-auto w-10 rounded-full"></div>
      </button>
      <button class="tab-btn flex-1 py-2 text-center text-[13px] font-medium text-[#848E9C]" data-tab="profile">
        <span>档案</span>
        <div class="tab-line mt-1 mx-auto w-10 rounded-full"></div>
      </button>
    </div>
  </div>

  <!-- Tab Content -->
  <div id="tab-assets" class="tab-content pb-[120px]"></div>
  <div id="tab-events" class="tab-content pb-[120px] hidden"></div>
  <div id="tab-profile" class="tab-content pb-[120px] hidden"></div>

</div>

<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>

    <a href="star.html" class="flex flex-col items-center gap-0.5">

    <a href="clients.html" class="flex flex-col items-center gap-0.5">

<!-- Tooltip overlay -->
<div id="tip-overlay" onclick="hideTip()" style="display:none;position:fixed;inset:0;z-index:100"></div>
<div id="tip-box" style="display:none;position:fixed;z-index:101;background:#2B3139;border:1px solid #2E3440;border-radius:10px;padding:10px 14px;max-width:180px;font-size:12px;color:#EAECEF;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,0.5)"></div>

<script src="mock-data.js"></script>
<script src="event-center-shared.js"></script>
<script src="mock-seed.js"></script>
<script>
var DETAIL_TIPS = {
  deposit:  '客户过去滚动7日持仓资产均值（USDT）；变化% = 过去7日资沉 vs 过去8周滚动均值',
  contribution: '7天贡献：交易所过去滚动7日从该客户获得的盈利\n变化%：过去7日贡献 vs 过去8周滚动均值',
  distCard:   '客户各业务线持仓资产占比，总量为过去 7 天均值；变化率为当前值与过去 8 周均值的对比',
  flowCard:   '过去 8 周每周充值（绿）与提现（红）对比，右侧为历史周均净流入，W8 = 本周',
  contributionCard: '各业务线过去滚动7日对交易所的净贡献明细（手续费+点差-返佣-理财利息）',
  pnlCard:    '过去滚动7日各品种客户持仓盈亏明细，正值对平台有利（客户亏损），负值反之',
};
window.showDetailTip = function(key, el) {
  var box = document.getElementById('tip-box');
  var overlay = document.getElementById('tip-overlay');
  box.innerHTML = (DETAIL_TIPS[key] || '').replace(/\n/g, '<br>');
  var rect = el.getBoundingClientRect();
  var boxW = 180;
  var left = Math.min(rect.left, window.innerWidth - boxW - 12);
  box.style.left = Math.max(12, left) + 'px';
  box.style.top = (rect.bottom + 6) + 'px';
  box.style.display = 'block';
  overlay.style.display = 'block';
};
window.hideTip = function() {
  document.getElementById('tip-box').style.display = 'none';
  document.getElementById('tip-overlay').style.display = 'none';
};

function esc(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function timeAgo(isoStr) {
  if (!isoStr) return '';
  var now = new Date(), then = new Date(isoStr);
  if (isNaN(then.getTime())) return '';
  var diff = Math.floor((now - then) / 1000);
  if (diff < 3600) return '刚刚';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  var days = Math.floor(diff / 86400);
  if (days < 7) return days + '天前';
  if (days < 30) return Math.floor(days / 7) + '周前';
  return (then.getMonth() + 1) + '月' + then.getDate() + '日';
}
(function() {
  var D = window.PROTOTYPE_DATA;
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var fromParam = params.get('from');
  var c = uid ? D.clientsById[uid] : null;

  if (!c) {
    document.getElementById('tab-events').innerHTML =
      '<div class="mx-4 mt-8 bg-[#1E2329] rounded-xl border border-[#2E3440] p-6 text-center text-[#848E9C]">未找到客户数据</div>';
    return;
  }

  function esc(s) { return String(s).replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // --- timeAgo（从 worktree-1 引入）---
  function timeAgo(isoStr) {
    if (!isoStr) return '';
    var now = new Date();
    var then = new Date(isoStr);
    if (isNaN(then.getTime())) return '';
    var diff = Math.floor((now - then) / 1000);
    if (diff < 3600) return '刚刚';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    var days = Math.floor(diff / 86400);
    if (days < 7) return days + '天前';
    if (days < 30) return Math.floor(days / 7) + '周前';
    return (then.getMonth() + 1) + '月' + then.getDate() + '日';
  }

  // --- Platform averages (across all clients) ---
  var allClients = D.clients;
  var platAvg = { depositChg: 0, flowNetChg: 0, profitChg: 0, pnlChg: 0 };
  var platCounts = { depositChg: 0, flowNetChg: 0, profitChg: 0, pnlChg: 0 };

  allClients.forEach(function(cl) {
    var w = cl.weeks;
    var thisW = w[w.length - 1];
    var avg8 = 0;
    for (var j = 0; j < w.length - 1; j++) avg8 += w[j];
    avg8 = avg8 / (w.length - 1);
    if (avg8 > 0) { platAvg.depositChg += (thisW - avg8) / avg8; platCounts.depositChg++; }

    var nc = cl.netContribution;
    if (nc && nc.total !== undefined) {
      if (nc.wow !== undefined) { platAvg.profitChg += nc.wow; platCounts.profitChg++; }
    }

    var pnl = cl.clientPnl;
    if (pnl && pnl.weeklyAvg8w && Math.abs(pnl.weeklyAvg8w.value) > 0) {
      var pnlRate = (pnl.total7d.value - pnl.weeklyAvg8w.value) / Math.abs(pnl.weeklyAvg8w.value);
      platAvg.pnlChg += pnlRate;
      platCounts.pnlChg++;
    }
  });

  platAvg.depositChg = platCounts.depositChg > 0 ? (platAvg.depositChg / platCounts.depositChg * 100) : 0;
  platAvg.profitChg = platCounts.profitChg > 0 ? (platAvg.profitChg / platCounts.profitChg * 100) : 0;
  platAvg.pnlChg = platCounts.pnlChg > 0 ? (platAvg.pnlChg / platCounts.pnlChg * 100) : 0;

  function fmtAvg(v) {
    var s = v >= 0 ? '+' : '';
    var col = v >= 0 ? '#0ECB81' : '#F6465D';
    return '<span style="color:' + col + '">' + s + v.toFixed(1) + '%</span>';
  }

  // --- Seeded random ---
  function seededRandom(seed) {
    var x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  // --- Flow data ---
  var flowWeeks = [];
  var seedBase = parseInt(c.uid, 10) || 1;
  for (var i = 1; i < c.weeks.length; i++) {
    var delta = c.weeks[i] - c.weeks[i - 1];
    var r = seededRandom(seedBase + i);
    var inflow, outflow;
    if (delta > 0) {
      inflow = delta * (1.2 + r * 0.6);
      outflow = inflow - delta;
    } else if (delta < 0) {
      outflow = Math.abs(delta) * (1.2 + r * 0.6);
      inflow = outflow - Math.abs(delta);
    } else {
      inflow = c.fMean * (0.01 + r * 0.04);
      outflow = inflow * (0.95 + seededRandom(seedBase + i + 100) * 0.1);
    }
    flowWeeks.push({ inflow: Math.round(inflow), outflow: Math.round(outflow) });
  }

  var thisWeekFlow = flowWeeks[flowWeeks.length - 1];
  var baselineWeeks = flowWeeks.slice(0, -1);

  // 统一 USDT 格式化
  function fmtUSDT(val, showSign) {
    var abs = Math.abs(val);
    var sign = showSign ? (val >= 0 ? '+' : '-') : (val < 0 ? '-' : '');
    var num = abs >= 1000000 ? (abs / 1000000).toFixed(1) + 'M'
            : abs >= 1000   ? (abs / 1000).toFixed(1) + 'K'
            :                  Math.round(abs).toString();
    return sign + '$' + num;
  }
  function fmtFlow(v) { return fmtUSDT(v, false); }

  // === HEADER CARD ===
  document.getElementById('client-uid').textContent = c.uid;

  // top-nickname（从 worktree-1 引入）
  var nnSpan = document.getElementById('top-nickname');
  if (nnSpan) nnSpan.textContent = localStorage.getItem('nickname_' + uid) || '';

  // Favorite（与列表页共用 slaeshub_favs 数组）
  var FAV_KEY = 'slaeshub_favs';
  function getFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch(e) { return []; } }
  var isFav = getFavs().indexOf(c.uid) !== -1;
  window.toggleFav = function() {
    isFav = !isFav;
    var arr = getFavs();
    if (isFav) { if (arr.indexOf(c.uid) === -1) arr.push(c.uid); }
    else { arr = arr.filter(function(id) { return id !== c.uid; }); }
    localStorage.setItem(FAV_KEY, JSON.stringify(arr));
  };

  // From badge
  var fromMap = {
    'event': { label: '事件', bg: 'rgba(77,166,255,0.12)', color: '#4DA6FF' },
    'clients': { label: '列表', bg: 'rgba(132,142,156,0.1)', color: '#848E9C' },
    'search': { label: '搜索', bg: 'rgba(132,142,156,0.1)', color: '#848E9C' }
  };
  if (fromParam && fromMap[fromParam]) {
    var fb = document.getElementById('from-badge');
    fb.textContent = fromMap[fromParam].label;
    fb.style.background = fromMap[fromParam].bg;
    fb.style.color = fromMap[fromParam].color;
    fb.classList.remove('hidden');
  }

  // 资沉
  document.getElementById('deposit-hero').textContent = fmtUSDT(c.fMean);


  // 7天贡献
  var contribEl = document.getElementById('contribution-hero');
  var contribDeltaEl = document.getElementById('contribution-delta');
  var contribVal = c.netContribution && c.netContribution.total != null ? c.netContribution.total : null;
  if (contribVal !== null) {
    var contribColor = contribVal >= 0 ? '#0ECB81' : '#F6465D';
    contribEl.textContent = fmtUSDT(contribVal, false);
    contribEl.style.color = contribColor;
    if (c.netContribution.wow != null) {
      var wowPct = c.netContribution.wow * 100;
      var wColor = wowPct >= 0 ? '#0ECB81' : '#F6465D';
      var wBg    = wowPct >= 0 ? 'rgba(14,203,129,0.15)' : 'rgba(246,70,93,0.15)';
      contribDeltaEl.innerHTML = '<span style="font-size:9px;font-weight:600;color:'+wColor+';background:'+wBg+';padding:1px 5px;border-radius:3px">'+(wowPct>=0?'+':'')+wowPct.toFixed(1)+'%</span>';
    }
  } else {
    contribEl.textContent = '--';
    contribEl.style.color = '#848E9C';
  }

  // 刷新时间
  var refreshEl = document.getElementById('data-refresh-time');
  if (refreshEl && D.generatedAt) {
    var d = new Date(D.generatedAt);
    var mo = d.getMonth() + 1, dd2 = d.getDate();
    var hh2 = String(d.getHours()).padStart(2,'0'), mm2 = String(d.getMinutes()).padStart(2,'0');
    refreshEl.textContent = '更新于 ' + mo + '月' + dd2 + '日 ' + hh2 + ':' + mm2;
  }

  // commRecords: 需在 tags 之前定义（活跃度标签会用到）
  var commRecords = [];
  try { commRecords = JSON.parse(sessionStorage.getItem('comm_records_' + uid) || '[]'); } catch(e) {}

  // --- System Tags（排名型，直观无需理解）---
  var sysTags = [];

  // 资沉排名：全平台，前100才显示
  var depositRank = allClients.filter(function(cl) { return cl.fMean > c.fMean; }).length + 1;
  if (depositRank <= 100) {
    sysTags.push({ label: '资沉 #' + depositRank, color: '#F0B90B', bg: 'rgba(240,185,11,0.12)' });
  }

  // 利润贡献排名：全平台，前100才显示
  var myProfit = c.netContribution ? c.netContribution.total : 0;
  var profitRank = allClients.filter(function(cl) {
    return (cl.netContribution ? cl.netContribution.total : 0) > myProfit;
  }).length + 1;
  if (profitRank <= 100) {
    sysTags.push({ label: '利润 #' + profitRank, color: '#F0B90B', bg: 'rgba(240,185,11,0.12)' });
  }

  // 交易盈亏排名：全平台，前100才显示
  var myPnl = c.clientPnl && c.clientPnl.total7d ? c.clientPnl.total7d.value : 0;
  var pnlRank = allClients.filter(function(cl) {
    return (cl.clientPnl && cl.clientPnl.total7d ? cl.clientPnl.total7d.value : 0) > myPnl;
  }).length + 1;
  if (pnlRank <= 100) {
    var prc = '#F0B90B';
    var prb = 'rgba(240,185,11,0.12)';
    sysTags.push({ label: '盈亏 #' + pnlRank, color: prc, bg: prb });
  }

  var manualTagKey = 'bd_tags_' + c.uid;
  var manualTags = [];
  try { manualTags = JSON.parse(localStorage.getItem(manualTagKey) || '[]'); } catch(e) {}

  function renderTags() {
    var tagsHtml = '';
    sysTags.forEach(function(t) {
      tagsHtml += '<span class="text-[9px] px-1.5 py-[2px] rounded border font-medium" style="color:' + t.color + ';border-color:' + t.color + '30;background:' + t.bg + '">' + t.label + '</span>';
    });
    manualTags.forEach(function(t, i) {
      tagsHtml += '<span class="text-[9px] px-1.5 py-[2px] rounded bg-[#2B3139] text-[#EAECEF] inline-flex items-center gap-1">'
        + esc(t)
        + '<i class="fa-solid fa-xmark text-[7px] text-[#474D57] cursor-pointer hover:text-[#F6465D]" onclick="removeTag(' + i + ')"></i>'
        + '</span>';
    });
    tagsHtml += '<span class="text-[9px] px-1.5 py-[2px] rounded border border-dashed border-[#474D57] text-[#474D57] cursor-pointer" onclick="openTagSheet()">+ 标签</span>';
    document.getElementById('tags-row').innerHTML = tagsHtml;
  }

  window.removeTag = function(idx) {
    manualTags.splice(idx, 1);
    localStorage.setItem(manualTagKey, JSON.stringify(manualTags));
    renderTags();
  };

  window.openTagSheet = function() {
    document.getElementById('tag-sheet').style.display = 'flex';
    document.getElementById('tag-custom-input').value = '';
    document.querySelectorAll('.preset-tag-btn').forEach(function(btn) {
      var already = manualTags.indexOf(btn.getAttribute('data-val')) !== -1;
      btn.style.opacity = already ? '0.35' : '1';
      btn.style.pointerEvents = already ? 'none' : '';
    });
  };
  window.closeTagSheet = function() {

    + '<option>Telegram</option><option>WhatsApp</option><option>微信</option><option>Discord</option><option>电话</option><option>邮件</option><option>其他</option>'
    + '</select>'
    + '<input id="contact-value" type="text" class="flex-1 bg-[#2B3139] text-[#EAECEF] text-[12px] rounded-lg px-3 py-2 border border-[#2E3440] outline-none" placeholder="@username" />'
    + '</div>'
    + '<div class="flex gap-2">'
    + '<button onclick="saveContact()" class="flex-1 py-2 rounded-lg text-[13px] font-semibold bg-[#F0B90B] text-[#0B0E11]">保存</button>'
    + '<button onclick="closeContactForm()" class="py-2 px-4 rounded-lg text-[13px] text-[#848E9C] border border-[#2E3440]">取消</button>'
    + '</div>'
    + '</div>'
    + '</div>'
    + '<div class="mx-4 mt-3 mb-6 bg-[#1E2329] rounded-xl border border-[#2E3440] p-4">'
    + '<div class="flex items-center justify-between mb-3">'
    + '<div class="text-[13px] font-semibold text-[#EAECEF]">笔记</div>'
    + '<button onclick="openNote()" style="font-size:11px;color:#F0B90B;background:none;border:none;cursor:pointer">+ 新增</button>'
    + '</div>'
    + '<div id="profile-notes-list"></div>'
    + '</div>';

  // 初始化档案 tab（renderContacts 在 IIFE 外定义，延迟调用）
  (function initProfile() {
    var nn = localStorage.getItem('nickname_' + uid) || '';
    var nnVal = document.getElementById('nickname-val');
    if (nnVal) { nnVal.textContent = nn || '未设置'; nnVal.style.color = nn ? '#EAECEF' : '#474D57'; }

})();


// === 档案 Tab JS ===
window.editNickname = function() {
  document.getElementById('nickname-display-row').style.display = 'none';
  document.getElementById('nickname-edit-row').style.removeProperty('display');
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var cur = localStorage.getItem('nickname_' + uid) || '';
  document.getElementById('nickname-input').value = cur;
  document.getElementById('nickname-input').focus();
};

window.saveNickname = function() {
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var val = document.getElementById('nickname-input').value.trim();
  localStorage.setItem('nickname_' + uid, val);
  document.getElementById('nickname-val').textContent = val || '未设置';
  document.getElementById('nickname-val').style.color = val ? '#EAECEF' : '#474D57';
  document.getElementById('nickname-edit-row').style.display = 'none';
  document.getElementById('nickname-display-row').style.display = '';
  var nnSpan = document.getElementById('top-nickname');
  if (nnSpan) nnSpan.textContent = val;
};

window.renderContacts = function() {
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var contacts = [];
  try { contacts = JSON.parse(localStorage.getItem('contacts_' + uid) || '[]'); } catch(e) {}
  var list = document.getElementById('contact-list');
  if (!list) return;
  if (contacts.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = contacts.map(function(c, i) {
    return '<div class="flex items-center justify-between py-2 border-b border-[#2E3440]">'
      + '<div class="flex items-center gap-2">'
      + '<span class="text-[11px] bg-[#2B3139] text-[#848E9C] px-2 py-0.5 rounded-full">' + c.channel + '</span>'
      + '<span class="text-[12px] text-[#EAECEF]">' + c.value + '</span>'
      + '</div>'
      + '<button onclick="deleteContact(' + i + ')" class="text-[#474D57] text-[14px] px-1">×</button>'
      + '</div>';
  }).join('');
};

window.openContactForm = function() {
  document.getElementById('contact-form').style.display = 'block';
};
window.closeContactForm = function() {
  document.getElementById('contact-form').style.display = 'none';
  document.getElementById('contact-value').value = '';
};
window.updateContactPlaceholder = function() {
  var ch = document.getElementById('contact-channel').value;
  var ph = { '电话': '+86 138...', '邮件': 'user@example.com' };
  document.getElementById('contact-value').placeholder = ph[ch] || '@username';
};
window.saveContact = function() {
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var channel = document.getElementById('contact-channel').value;
  var value = document.getElementById('contact-value').value.trim();
  if (!value) return;
  var contacts = [];
  try { contacts = JSON.parse(localStorage.getItem('contacts_' + uid) || '[]'); } catch(e) {}
  contacts.push({ channel: channel, value: value });
  localStorage.setItem('contacts_' + uid, JSON.stringify(contacts));
  closeContactForm();
  renderContacts();
};
window.deleteContact = function(idx) {
  var params = new URLSearchParams(location.search);
  var uid = params.get('uid');
  var contacts = [];
  try { contacts = JSON.parse(localStorage.getItem('contacts_' + uid) || '[]'); } catch(e) {}
  contacts.splice(idx, 1);
  localStorage.setItem('contacts_' + uid, JSON.stringify(contacts));
  renderContacts();
};

// 所有 window.* 函数定义完毕后，执行档案 tab 初始化
window.renderContacts();
// renderNotesList 在下方定义，延迟调用
setTimeout(function() { if (typeof renderNotesList === 'function') renderNotesList(); }, 0);

  // === 笔记（FAB + 抽屉 + 档案 Tab 时间轴）===
  var _noteParams = new URLSearchParams(location.search);
  var _noteUid = _noteParams.get('uid');
  var notesKey = 'notes_' + _noteUid;
  var notes = [];
  try { notes = JSON.parse(localStorage.getItem(notesKey) || '[]'); } catch(e) {}

  function buildNotesHtml(emptyMsg) {
    if (!notes.length) {
      return '<p style="font-size:12px;color:#474D57;text-align:center;padding:24px 0">' + emptyMsg + '</p>';
    }
    var items = notes.slice().reverse().map(function(n) {
      return '<div class="relative">'
        + '<div class="absolute -left-[17px] top-[5px] w-2 h-2 rounded-full bg-[#F0B90B]"></div>'
        + '<div class="text-[10px] text-[#848E9C]">' + timeAgo(n.created_at) + '</div>'
        + '<p class="text-[12px] text-[#EAECEF] mt-0.5 leading-relaxed">' + esc(n.text) + '</p>'
        + '</div>';
    }).join('');
    return '<div class="border-l-2 border-[#2E3440] pl-3 space-y-4">' + items + '</div>';
  }

  function renderNotesList() {
    var drawerList = document.getElementById('notes-list');
    if (drawerList) drawerList.innerHTML = buildNotesHtml('还没有笔记');
    var profileList = document.getElementById('profile-notes-list');
    if (profileList) profileList.innerHTML = buildNotesHtml('还没有笔记');
  }

  window.openNote = function() {
    var overlay = document.getElementById('note-drawer-overlay');
    var drawer = document.getElementById('note-drawer');
    overlay.classList.remove('hidden');
    drawer.classList.remove('hidden');
    drawer.style.display = 'flex';
    document.getElementById('note-input').value = '';
    renderNotesList();
    setTimeout(function() { document.getElementById('note-input').focus(); }, 50);
  };

  window.closeNote = function() {
    document.getElementById('note-drawer-overlay').classList.add('hidden');
    var drawer = document.getElementById('note-drawer');
    drawer.classList.add('hidden');
    drawer.style.display = '';
  };

  window.saveNote = function() {
    var text = document.getElementById('note-input').value.trim();
    if (!text) return;
    notes.push({ id: Date.now(), text: text, created_at: new Date().toISOString() });
    localStorage.setItem(notesKey, JSON.stringify(notes));
    renderNotesList();
    closeNote();
  };

  // FAB 滚动隐藏
  (function() {
    var fab = document.getElementById('note-fab');
    if (!fab) return;
    var lastScrollY = window.scrollY;
    var ticking = false;
    window.addEventListener('scroll', function() {
      if (!ticking) {
        requestAnimationFrame(function() {
          var currentY = window.scrollY;
          if (currentY > lastScrollY + 10) {
            fab.style.opacity = '0';
            fab.style.pointerEvents = 'none';
            fab.style.transform = 'scale(0.8)';
          } else if (currentY < lastScrollY - 5) {
            fab.style.opacity = '1';
            fab.style.pointerEvents = '';
            fab.style.transform = 'scale(1)';
          }
          lastScrollY = currentY;
          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });
  })();
</script>
