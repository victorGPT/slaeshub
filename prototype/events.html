<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0B0E11" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 事件中心</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; color: #EAECEF; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    button, a { -webkit-tap-highlight-color: transparent; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .top-nav { height: 52px; position: sticky; top: 0; z-index: 30; background: #0B0E11; border-bottom: 1px solid #2E3440; display: flex; align-items: center; justify-content: center; }
    .event-embedded-tabs { position: sticky; top: 52px; z-index: 24; background: #0B0E11; display: flex; gap: 8px; padding: 10px 16px 12px; border-bottom: 1px solid #2E3440; }
    .event-embedded-tab { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: #2B3139; color: #848E9C; border: 1px solid #2E3440; border-radius: 999px; padding: 8px 12px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .event-embedded-tab.active { background: rgba(240,185,11,0.15); color: #F0B90B; border-color: rgba(240,185,11,0.4); }
    .event-tab-badge { font-size: 11px; color: #F0B90B; }
    #event-filters { position: sticky; top: 52px; z-index: 20; background: #0B0E11; }
    .event-filter-shell { position: relative; padding: 10px 0; border-bottom: 1px solid #2E3440; background: #0B0E11; }
    .event-filter-scroll { display: flex; align-items: center; gap: 8px; overflow-x: auto; padding: 0 16px; white-space: nowrap; scrollbar-width: none; }
    .event-filter-fade::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 42px; pointer-events: none; background: linear-gradient(270deg, #0B0E11 0%, rgba(11,14,17,0) 100%); }
    .event-filter-pill { display: inline-flex; align-items: center; justify-content: center; background: #2B3139; color: #848E9C; border: 1px solid #2E3440; border-radius: 999px; padding: 5px 12px; font-size: 12px; line-height: 1.2; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
    .event-filter-pill.active { background: rgba(240,185,11,0.15); color: #F0B90B; border-color: rgba(240,185,11,0.4); }
    .event-list-inner { padding: 12px 16px 116px; }
    .event-card { background: #1E2329; border: 1px solid #2E3440; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; box-sizing: border-box; }
    .event-card.closed { opacity: 0.4; }
    .event-type-badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 999px; font-size: 10px; color: #F0B90B; background: rgba(240,185,11,0.12); border: 1px solid rgba(240,185,11,0.22); flex-shrink: 0; }
    .event-star-btn { width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; background: none; border: none; padding: 0; cursor: pointer; flex-shrink: 0; }
    .event-deadline-badge { display: inline-flex; align-items: center; justify-content: center; padding: 2px 8px; border-radius: 999px; border: 1px solid; font-size: 10px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .event-chooser { display: flex; gap: 8px; margin-top: 10px; }
    .event-chooser-btn { background: #2B3139; color: #EAECEF; border: 1px solid #2E3440; border-radius: 999px; padding: 5px 14px; font-size: 12px; cursor: pointer; }
    .event-list-inner { padding: 12px 16px 120px; }
    .event-empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 24px 128px; color: #848E9C; text-align: center; }
    .event-empty-icon { font-size: 36px; color: #474D57; margin-bottom: 14px; }
    .event-empty-title { font-size: 15px; color: #EAECEF; }
    .event-empty-desc { margin-top: 6px; font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <div>
    <div style="height:44px;background:#0B0E11;display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-sizing:border-box;">
      <span style="font-size:12px;font-weight:600;color:#EAECEF;">9:41</span>
      <div style="display:flex;align-items:center;gap:6px;color:#EAECEF;">
        <i class="fa-solid fa-signal" style="font-size:12px;"></i>
        <i class="fa-solid fa-wifi" style="font-size:12px;"></i>
        <i class="fa-solid fa-battery-full" style="font-size:13px;"></i>
      </div>
    </div>

    <div class="top-nav">
      <h1 style="margin:0;font-size:17px;font-weight:700;color:#EAECEF;letter-spacing:0.02em;">事件中心</h1>
    </div>

    <div id="event-filters"></div>
    <div id="event-list"></div>
  </div>

  <div class="fixed-bar" style="background:#0B0E11;border-top:1px solid #2E3440;z-index:30;">
    <div style="display:flex;align-items:center;justify-content:space-around;height:56px;">
      <a href="home.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-house" style="font-size:18px;color:#848E9C;"></i>
        <span style="font-size:10px;color:#848E9C;">首页</span>
      </a>
      <a href="star.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-list-check" style="font-size:18px;color:#848E9C;"></i>
        <span style="font-size:10px;color:#848E9C;">待办</span>
      </a>
      <a href="clients.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-users" style="font-size:18px;color:#848E9C;"></i>
        <span style="font-size:10px;color:#848E9C;">客户</span>
      </a>
      <a href="events.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-bell" style="font-size:18px;color:#F0B90B;"></i>
        <span style="font-size:10px;color:#F0B90B;font-weight:600;">事件</span>
      </a>
      <a href="profile.html" style="display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;">
        <i class="fa-solid fa-user" style="font-size:18px;color:#848E9C;"></i>
        <span style="font-size:10px;color:#848E9C;">我的</span>
      </a>
    </div>
    <div style="height:env(safe-area-inset-bottom,0px);"></div>
  </div>

  <script src="mock-events.js"></script>
  <script src="event-center-shared.js"></script>
  <script>
    window.EventCenterShared.mountEventCenter({
      pageMode: 'all',
      filtersId: 'event-filters',
      listId: 'event-list'
    });
  </script>
</body>
</html>
