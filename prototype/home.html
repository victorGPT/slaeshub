<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full h-screen flex flex-col" style="max-height: 852px;">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="flex-shrink-0 h-[52px] bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-center px-4">
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">首页</h1>
  </div>

  <!-- Search Bar -->
  <div class="flex-shrink-0 bg-[#0B0E11] px-4 py-1.5 relative z-20">
    <div class="flex items-center bg-[#1E2329] rounded-lg px-3 py-2 border border-[#2E3440]">
      <i class="fa-solid fa-magnifying-glass text-[12px] text-[#848E9C] mr-2"></i>
      <input id="search-input" type="text" placeholder="搜索客户名字或 UID..."
             class="flex-1 bg-transparent text-[13px] text-[#EAECEF] outline-none placeholder-[#474D57]"
             oninput="onSearchInput()" />
      <button id="search-clear" onclick="clearSearch()" class="hidden text-[#848E9C] text-[12px] ml-2 bg-transparent border-0 cursor-pointer">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <!-- Search Results Dropdown -->
    <div id="search-dropdown" class="hidden absolute left-0 right-0 top-full z-40 mx-4 bg-[#1E2329] rounded-b-lg border border-t-0 border-[#2E3440] max-h-[320px] overflow-y-auto shadow-lg"></div>
  </div>

  <!-- Scrollable Content -->
  <div class="overflow-y-auto flex-1 py-2" id="main-content"></div>

  <!-- Bottom Tab Bar -->
  <div class="flex-shrink-0 bg-[#0B0E11] border-t border-[#2E3440]">
    <div class="flex items-center justify-around h-[56px]">
      <a href="home.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-house text-[18px] text-[#F0B90B]"></i>
        <span class="text-[10px] text-[#F0B90B] font-semibold">首页</span>
      </a>
      <a href="clients.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
        <span class="text-[10px] text-[#848E9C]">客户</span>
      </a>
      <a href="events.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
        <span class="text-[10px] text-[#848E9C]">事件</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
        <span class="text-[10px] text-[#848E9C]">我的</span>
      </a>
    </div>
    <div class="h-[34px]"></div>
  </div>

</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;

  // ---------- Data helpers ----------

  // 取本周净变化：weeks 最后两项之差
  function weekDelta(client) {
    var w = client.weeks;
    if (!w || w.length < 2) return 0;
    return w[w.length - 1] - w[w.length - 2];
  }

  // 金额格式化（入金/出金列使用）
  function fmtWan(val) {
    var abs = Math.abs(val);
    if (abs >= 10000) return (val > 0 ? '+' : '-') + (abs / 10000).toFixed(1) + '万';
    return (val > 0 ? '+' : '') + Math.round(val).toLocaleString();
  }

  // ---------- 排序 ----------

  // 1. 资沉前五：fMean 降序
  var top5Deposit = D.clients.slice().sort(function(a, b) {
    return (b.fMean || 0) - (a.fMean || 0);
  }).slice(0, 5);

  // 2. 本周入金前五：本周净变化 > 0，降序
  var top5Inflow = D.clients.slice().filter(function(c) {
    return weekDelta(c) > 0;
  }).sort(function(a, b) {
    return weekDelta(b) - weekDelta(a);
  }).slice(0, 5);

  // 3. 本周出金前五：本周净变化 < 0，绝对值降序
  var top5Outflow = D.clients.slice().filter(function(c) {
    return weekDelta(c) < 0;
  }).sort(function(a, b) {
    return Math.abs(weekDelta(b)) - Math.abs(weekDelta(a));
  }).slice(0, 5);

  // 4. 利润贡献前五：netContribution.total 降序
  var top5Profit = D.clients.slice().sort(function(a, b) {
    var va = (a.netContribution && a.netContribution.total) ? a.netContribution.total : 0;
    var vb = (b.netContribution && b.netContribution.total) ? b.netContribution.total : 0;
    return vb - va;
  }).slice(0, 5);

  // ---------- Render helpers ----------

  function rankBadge(rank) {
    var bg = rank === 1 ? '#F0B90B' : '#2E3440';
    var color = rank === 1 ? '#0B0E11' : '#848E9C';
    return '<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:' + bg + ';color:' + color + ';font-size:10px;font-weight:700;flex-shrink:0">' + rank + '</span>';
  }

  function lastContact(c) {
    var evts = D.eventsByClientUid[c.uid];
    if (!evts || evts.length === 0) return { label: '未联系', color: '#F6465D' };
    var minH = Infinity;
    evts.forEach(function(e) { if (e.age_hours < minH) minH = e.age_hours; });
    var label = minH < 24 ? '今天联系' : Math.floor(minH / 24) + '天前联系';
    var color = minH >= 720 ? '#F6465D' : minH >= 168 ? '#F0B90B' : '#0ECB81';
    return { label: label, color: color };
  }

  // section 卡片包装：mx-4 mb-3
  function buildSection(iconClass, iconColor, title, sortParam, rows) {
    var header = '<div style="display:flex;align-items:center;padding:12px 16px 12px 16px;border-bottom:1px solid #2E3440">'
      + '<i class="' + iconClass + '" style="color:' + iconColor + ';font-size:14px;margin-right:8px"></i>'
      + '<span style="font-size:14px;font-weight:700;color:#EAECEF;flex:1">' + title + '</span>'
      + '<a href="clients.html?sort=' + sortParam + '" style="font-size:11px;color:#848E9C;text-decoration:none">查看更多 →</a>'
      + '</div>';

    var rowsHtml = rows.map(function(r, idx) {
      var border = (idx < rows.length - 1) ? 'border-bottom:1px solid #2E3440;' : '';
      var lc = lastContact(r.client);
      var label = r.client.name ? r.client.uid + ' (' + r.client.name + ')' : r.client.uid;
      return '<a href="' + r.href + '" style="display:flex;align-items:center;gap:10px;padding:11px 16px;' + border + 'text-decoration:none">'
        + rankBadge(idx + 1)
        + '<span style="flex:1;font-size:13px;color:#EAECEF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + label + '</span>'
        + '<span style="font-size:13px;font-weight:700;color:' + r.rightColor + ';flex-shrink:0;margin-left:8px">' + r.right + '</span>'
        + '<span style="font-size:11px;color:' + lc.color + ';flex-shrink:0;margin-left:8px;min-width:30px;text-align:right">' + lc.label + '</span>'
        + '</a>';
    }).join('');

    return '<div style="background:#1E2329;border-radius:12px;border:1px solid #2E3440;margin:0 16px 12px 16px;overflow:hidden">'
      + header
      + rowsHtml
      + '</div>';
  }

  // ---------- 构建每个 section 的行数据 ----------

  var sec1Rows = top5Deposit.map(function(c) {
    return { client: c, href: c.detailHref || ('client-detail.html?uid=' + c.uid), right: c.depositDisplay, rightColor: '#F0B90B' };
  });

  var sec2Rows = top5Inflow.map(function(c) {
    return { client: c, href: c.detailHref || ('client-detail.html?uid=' + c.uid), right: fmtWan(weekDelta(c)), rightColor: '#0ECB81' };
  });

  var sec3Rows = top5Outflow.map(function(c) {
    return { client: c, href: c.detailHref || ('client-detail.html?uid=' + c.uid), right: fmtWan(weekDelta(c)), rightColor: '#F6465D' };
  });

  var sec4Rows = top5Profit.map(function(c) {
    var total = (c.netContribution && c.netContribution.total) ? c.netContribution.total : 0;
    var display = c.netContribution && c.netContribution.totalDisplay
      ? c.netContribution.totalDisplay
      : (total >= 10000 ? (total / 10000).toFixed(1) + '万' : Math.round(total).toLocaleString());
    return { client: c, href: c.detailHref || ('client-detail.html?uid=' + c.uid), right: display, rightColor: '#4DA6FF' };
  });

  // ---------- 收藏 section ----------

  function buildFavsSection() {
    var FAV_KEY = 'slaeshub_favs';
    var favUids = [];
    try { favUids = JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch(e) {}
    var favClients = favUids.map(function(uid) {
      return D.clients.filter(function(c) { return c.uid === uid; })[0];
    }).filter(Boolean).sort(function(a, b) { return b.fMean - a.fMean; });

    var header = '<div style="display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #2E3440">'
      + '<i class="fa-solid fa-star" style="color:#F0B90B;font-size:14px;margin-right:8px"></i>'
      + '<span style="font-size:14px;font-weight:700;color:#EAECEF;flex:1">我的收藏</span>'
      + '<a href="clients.html?sort=favs" style="font-size:11px;color:#848E9C;text-decoration:none">查看全部 →</a>'
      + '</div>';

    var body;
    if (favClients.length === 0) {
      body = '<div style="padding:20px 16px;text-align:center;color:#848E9C;font-size:13px">还没有收藏的客户<br><span style="font-size:11px">在客户列表点击 ☆ 添加</span></div>';
    } else {
      body = favClients.map(function(c, idx) {
        var border = idx < favClients.length - 1 ? 'border-bottom:1px solid #2E3440;' : '';
        var lc = lastContact(c);
        var label = c.name ? c.uid + ' (' + c.name + ')' : c.uid;
        return '<a href="' + (c.detailHref || 'client-detail.html?uid=' + c.uid) + '" style="display:flex;align-items:center;gap:10px;padding:11px 16px;' + border + 'text-decoration:none">'
          + '<span style="flex:1;font-size:13px;color:#EAECEF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + label + '</span>'
          + '<span style="font-size:13px;font-weight:700;color:#F0B90B;flex-shrink:0;margin-left:8px">' + c.depositDisplay + '</span>'
          + '<span style="font-size:11px;color:' + lc.color + ';flex-shrink:0;margin-left:8px;min-width:42px;text-align:right">' + lc.label + '</span>'
          + '</a>';
      }).join('');
    }

    return '<div style="background:#1E2329;border-radius:12px;border:1px solid #2E3440;margin:0 16px 12px 16px;overflow:hidden">'
      + header + body + '</div>';
  }

  // ---------- 注入页面 ----------

  document.getElementById('main-content').innerHTML =
    buildFavsSection()
  + buildSection('fa-solid fa-trophy',               '#F0B90B', '资沉前五',     'deposit',  sec1Rows)
  + buildSection('fa-solid fa-arrow-down-to-line',   '#0ECB81', '本周入金前五', 'inflow',   sec2Rows)
  + buildSection('fa-solid fa-arrow-up-from-line',   '#F6465D', '本周出金前五', 'outflow',  sec3Rows)
  + buildSection('fa-solid fa-sack-dollar',          '#4DA6FF', '利润贡献前五', 'profit',   sec4Rows);

  // ---------- Search ----------

  function getStatusLabel(c) {
    var rate = c.adjustedTrendRate;
    var pct = Math.abs(rate * 100).toFixed(1);
    if (rate <= -0.01) return { label: '流失 ' + pct + '%', bg: 'rgba(246,70,93,0.15)', color: '#F6465D' };
    if (rate >= 0.01)  return { label: '增长 ' + pct + '%', bg: 'rgba(14,203,129,0.15)', color: '#0ECB81' };
    return { label: '稳定', bg: 'rgba(132,142,156,0.15)', color: '#848E9C' };
  }

  function renderSearchResults(query) {
    var dropdown = document.getElementById('search-dropdown');
    var clearBtn = document.getElementById('search-clear');

    if (!query) {
      dropdown.classList.add('hidden');
      clearBtn.classList.add('hidden');
      return;
    }

    clearBtn.classList.remove('hidden');
    var q = query.toLowerCase();
    var matches = D.clients.filter(function(c) {
      return c.name.toLowerCase().indexOf(q) !== -1 || c.uid.toLowerCase().indexOf(q) !== -1;
    }).slice(0, 20);

    if (matches.length === 0) {
      dropdown.innerHTML = '<div class="text-center py-6 text-[13px] text-[#848E9C]">未找到匹配客户</div>';
      dropdown.classList.remove('hidden');
      return;
    }

    dropdown.innerHTML = matches.map(function(c) {
      var sl = getStatusLabel(c);
      return '<a href="client-detail.html?uid=' + c.uid + '" class="flex items-center justify-between px-4 py-3 border-b border-[#2E3440] last:border-0 active:bg-[#2B3139]">'
        + '<div class="min-w-0">'
        +   '<div class="flex items-center gap-2">'
        +     '<span class="text-[13px] font-medium text-[#EAECEF] truncate">' + c.name + '</span>'
        +     '<span class="text-[11px] text-[#474D57]">UID ' + c.uid + '</span>'
        +   '</div>'
        +   '<div class="flex items-center gap-2 mt-0.5">'
        +     '<span class="text-[12px] text-[#EAECEF]">' + c.depositDisplay + '</span>'
        +     '<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:' + sl.bg + ';color:' + sl.color + '">' + sl.label + '</span>'
        +   '</div>'
        + '</div>'
        + '<i class="fa-solid fa-chevron-right text-[10px] text-[#474D57] flex-shrink-0"></i>'
        + '</a>';
    }).join('');

    dropdown.classList.remove('hidden');
  }

  window.onSearchInput = function() {
    var query = document.getElementById('search-input').value.trim();
    renderSearchResults(query);
  };

  window.clearSearch = function() {
    document.getElementById('search-input').value = '';
    renderSearchResults('');
    document.getElementById('search-input').focus();
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('search-input').value = '';
      renderSearchResults('');
    }
  });

  // Clear search state on page load
  document.getElementById('search-input').value = '';
  document.getElementById('search-dropdown').classList.add('hidden');
  document.getElementById('search-clear').classList.add('hidden');

})();
</script>

</body>
</html>
