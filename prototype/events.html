<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 事件中心</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .filter-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filter-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <div class="w-[60px]"></div>
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">事件中心</h1>
    <div class="w-[60px]"></div>
  </div>

  <!-- Filter Pills -->
  <div class="filter-scroll px-4 py-3 flex gap-2" id="filter-bar">
    <button data-filter="全部" class="filter-pill active flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">全部</button>
    <button data-filter="待处理" class="filter-pill flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">待处理</button>
    <button data-filter="跟进中" class="filter-pill flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">跟进中</button>
    <button data-filter="已完成" class="filter-pill flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">已完成</button>
    <button data-filter="已忽略" class="filter-pill flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">已忽略</button>
  </div>

  <!-- Stats Summary -->
  <div id="stats-bar" class="px-4 py-2 flex items-center gap-1 text-[11px] text-[#848E9C]"></div>

  <!-- Event List -->
  <div id="event-list" class="pb-[100px]"></div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script>
(function() {
  var STATUS_COLORS = {
    '待处理': { bg: 'rgba(240,185,11,0.15)',   text: '#F0B90B' },
    '跟进中': { bg: 'rgba(77,166,255,0.15)',   text: '#4DA6FF' },
    '已完成': { bg: 'rgba(14,203,129,0.15)',   text: '#0ECB81' },
    '已忽略': { bg: 'rgba(132,142,156,0.15)',  text: '#848E9C' }
  };
  var todayStr = new Date().toISOString().split('T')[0];
  var currentFilter = '全部';
  var _markDoneId = null;

  function loadEvents() {
    var arr = [];
    try { arr = JSON.parse(sessionStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    return arr;
  }

  function daysLabel(fuAt) {
    var d = Math.round((new Date(fuAt) - new Date(todayStr)) / 86400000);
    if (d < 0) return { text: '逾期' + Math.abs(d) + '天', color: '#F6465D' };
    if (d === 0) return { text: '今天', color: '#F0B90B' };
    if (d === 1) return { text: '明天', color: '#F0B90B' };
    return { text: d + '天后', color: '#4DA6FF' };
  }

  function sortScore(ev) {
    // 逾期最前，已完成/已忽略最后
    if (ev.status === '已完成' || ev.status === '已忽略') return 99999;
    var d = Math.round((new Date(ev.follow_up_at) - new Date(todayStr)) / 86400000);
    return d; // 逾期为负（最小值 = 最前）
  }

  function filtered(events) {
    if (currentFilter === '全部') return events;
    return events.filter(function(e) { return e.status === currentFilter; });
  }

  function renderStats(events) {
    var pending = 0, following = 0, total = events.length;
    events.forEach(function(e) {
      if (e.status === '待处理') pending++;
      if (e.status === '跟进中') following++;
    });
    document.getElementById('stats-bar').innerHTML =
      '共 ' + total + ' 个跟进事件 · '
      + '<span style="color:#F0B90B">' + pending + ' 待处理</span> · '
      + '<span style="color:#4DA6FF">' + following + ' 跟进中</span>';
  }

  function renderList(events) {
    var container = document.getElementById('event-list');
    if (events.length === 0) {
      container.innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;color:#848E9C">'
        + '<i class="fa-solid fa-inbox" style="font-size:40px;margin-bottom:12px;color:#474D57"></i>'
        + '<span style="font-size:14px">暂无跟进事件</span>'
        + '<a href="clients.html" style="font-size:12px;color:#4DA6FF;margin-top:8px">打开客户列表，记录主动沟通</a>'
        + '</div>';
      return;
    }

    container.innerHTML = events.map(function(ev) {
      var sc = STATUS_COLORS[ev.status] || STATUS_COLORS['已忽略'];
      var dl = daysLabel(ev.follow_up_at);
      var isDone = ev.status === '已完成' || ev.status === '已忽略';
      return '<div class="px-4 py-3 border-b border-[#2E3440]">'
        + '<div class="flex items-start justify-between gap-2">'
        + '<a href="follow-up-thread.html?fuId=' + ev.id + '" class="flex-1 min-w-0 active:opacity-70">'
        + '<div class="flex items-center gap-1.5 mb-1">'
        + '<span style="background:#4DA6FF;width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0"></span>'
        + '<span style="font-size:13px;font-weight:600;color:#EAECEF">' + ev.client_name + '</span>'
        + '<span style="font-size:10px;padding:1px 6px;border-radius:9999px;background:' + sc.bg + ';color:' + sc.text + '">' + ev.status + '</span>'
        + '</div>'
        + '<div style="font-size:13px;font-weight:600;color:#EAECEF;margin-bottom:2px">' + (ev.title || ev.follow_up_note || '—') + '</div>'
        + (ev.follow_up_note && ev.title ? '<div style="font-size:11px;color:#848E9C;margin-bottom:2px">' + ev.follow_up_note + '</div>' : '')
        + '<div style="font-size:11px;color:' + dl.color + ';font-weight:500">' + dl.text + ' · ' + ev.follow_up_at + '</div>'
        + (ev.done_note ? '<div style="font-size:11px;color:#848E9C;margin-top:3px">"' + ev.done_note + '"</div>' : '')
        + '</a>'
        + (!isDone
          ? '<div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">'
            + (ev.status === '待处理' ? '<button onclick="setFollowing(\'' + ev.id + '\')" style="font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid #2E3440;color:#848E9C;background:none;cursor:pointer">跟进</button>' : '')
            + '<button onclick="openDoneSheet(\'' + ev.id + '\')" style="font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid #0ECB81;color:#0ECB81;background:none;cursor:pointer">完成</button>'
            + '</div>'
          : '')
        + '</div>'
        + '</div>';
    }).join('');
  }

  function updatePills() {
    document.querySelectorAll('.filter-pill').forEach(function(p) {
      var active = p.getAttribute('data-filter') === currentFilter;
      p.style.background = active ? '#F0B90B' : '#1E2329';
      p.style.color = active ? '#0B0E11' : '#848E9C';
    });
  }

  function render() {
    var all = loadEvents().sort(function(a, b) { return sortScore(a) - sortScore(b); });
    var shown = filtered(all);
    updatePills();
    renderStats(all);
    renderList(shown);
  }

  // filter pill clicks
  document.getElementById('filter-bar').addEventListener('click', function(e) {
    var p = e.target.closest('.filter-pill');
    if (!p) return;
    currentFilter = p.getAttribute('data-filter');
    render();
  });

  // mark-done sheet
  window.openDoneSheet = function(id) {
    _markDoneId = id;
    document.getElementById('mark-done-note').value = '';
    document.getElementById('mark-done-sheet').style.display = 'flex';
  };
  window.closeDoneSheet = function() {
    document.getElementById('mark-done-sheet').style.display = 'none';
    _markDoneId = null;
  };
  window.confirmDone = function() {
    if (!_markDoneId) return;
    var note = document.getElementById('mark-done-note').value.trim();
    var evs = loadEvents();
    evs.forEach(function(e) {
      if (e.id === _markDoneId) { e.status = '已完成'; e.done_note = note; e.done_at = new Date().toISOString(); }
    });
    sessionStorage.setItem('follow_up_events', JSON.stringify(evs));
    window.closeDoneSheet();
    render();
  };
  window.postpone = function() {
    if (!_markDoneId) return;
    var evs = loadEvents();
    evs.forEach(function(e) {
      if (e.id === _markDoneId) {
        var d = new Date(e.follow_up_at || new Date()); d.setDate(d.getDate() + 3);
        var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
        e.follow_up_at = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
        e.status = '跟进中';
      }
    });
    sessionStorage.setItem('follow_up_events', JSON.stringify(evs));
    window.closeDoneSheet();
    render();
  };
  window.setFollowing = function(id) {
    var evs = loadEvents();
    evs.forEach(function(e) { if (e.id === id) e.status = '跟进中'; });
    sessionStorage.setItem('follow_up_events', JSON.stringify(evs));
    render();
  };

  render();
})();
</script>

<!-- Mark Done Bottom Sheet -->
<div id="mark-done-sheet" style="display:none;position:fixed;inset:0;z-index:50;align-items:flex-end;justify-content:center" onclick="if(event.target===this)window.closeDoneSheet()">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6)"></div>
  <div style="position:relative;width:393px;background:#1E2329;border-radius:16px 16px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom))">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <span style="font-size:15px;font-weight:600;color:#EAECEF">标记完成</span>
      <button onclick="window.closeDoneSheet()" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#848E9C;font-size:18px;background:none;border:0;cursor:pointer">✕</button>
    </div>
    <div style="font-size:11px;color:#848E9C;margin-bottom:4px">备注（选填）</div>
    <textarea id="mark-done-note" rows="3" style="width:100%;background:#2B3139;color:#EAECEF;font-size:13px;border-radius:8px;padding:10px 12px;border:1px solid #2E3440;outline:none;resize:none;margin-bottom:16px;box-sizing:border-box;font-family:inherit" placeholder="记录一下结果..."></textarea>
    <div style="display:flex;gap:8px">
      <button onclick="window.confirmDone()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;background:#F0B90B;color:#0B0E11;border:0;cursor:pointer">确认完成</button>
      <button onclick="window.postpone()" style="padding:12px 16px;border-radius:12px;font-size:13px;color:#4DA6FF;border:1px solid #4DA6FF;background:none;cursor:pointer">推迟3天</button>
    </div>
  </div>
</div>

</body>
</html>
