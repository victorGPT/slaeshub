<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Hub — Prototype</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #08090b;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(240, 185, 11, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240, 185, 11, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .page-title {
      color: #EAECEF;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0.6;
    }

    .device-frame {
      position: relative;
      width: 393px;
      height: 852px;
      border-radius: 44px;
      overflow: hidden;
      border: 2px solid #2B3139;
      box-shadow:
        0 0 0 1px rgba(240, 185, 11, 0.08),
        0 25px 80px rgba(0, 0, 0, 0.6),
        0 0 120px rgba(240, 185, 11, 0.04);
      background: #0B0E11;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
    }

    .device-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0B0E11;
    }

    .nav-pills {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .nav-pill {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #2B3139;
      background: transparent;
      color: #848E9C;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-pill:hover, .nav-pill.active {
      background: #F0B90B;
      color: #0B0E11;
      border-color: #F0B90B;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <p class="page-title">Sales Hub · Prototype</p>

  <div class="device-frame">
    <div class="dynamic-island"></div>
    <iframe id="app-frame" src="clients.html"></iframe>
  </div>

  <div class="nav-pills">
    <button class="nav-pill active" onclick="nav('clients.html', this)">客户列表</button>
    <button class="nav-pill" onclick="nav('client-detail.html', this)">客户详情</button>
    <button class="nav-pill" onclick="nav('events.html', this)">事件中心</button>
    <button class="nav-pill" onclick="nav('event-thread.html', this)">事件线程</button>
    <button class="nav-pill" onclick="nav('profile.html', this)">我的</button>
  </div>

  <script>
    function nav(page, el) {
      document.getElementById('app-frame').src = page;
      document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
    }
  </script>
</body>
</html>
