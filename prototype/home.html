<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full h-screen flex flex-col" style="max-height: 852px;">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- 1. Search Bar (~48px) -->
  <div class="flex-shrink-0 bg-[#0B0E11] px-4 py-1.5 relative z-20">
    <div class="flex items-center bg-[#1E2329] rounded-lg px-3 py-2 border border-[#2E3440]">
      <i class="fa-solid fa-magnifying-glass text-[12px] text-[#848E9C] mr-2"></i>
      <input id="search-input" type="text" placeholder="搜索客户名字或 UID..."
             class="flex-1 bg-transparent text-[13px] text-[#EAECEF] outline-none placeholder-[#474D57]"
             oninput="onSearchInput()" />
      <button id="search-clear" onclick="clearSearch()" class="hidden text-[#848E9C] text-[12px] ml-2 bg-transparent border-0 cursor-pointer">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <!-- Search Results Dropdown -->
    <div id="search-dropdown" class="hidden absolute left-0 right-0 top-full z-40 mx-4 bg-[#1E2329] rounded-b-lg border border-t-0 border-[#2E3440] max-h-[320px] overflow-y-auto shadow-lg"></div>
  </div>

  <!-- 2. Summary Row (~28px) -->
  <div id="summary-row" class="flex-shrink-0 px-4 py-1"></div>

  <!-- 3. Hero Card (~140px) -->
  <div id="hero-card" class="flex-shrink-0 px-4 py-1.5"></div>

  <!-- 4. Small Rows x4 (~224px) -->
  <div id="small-rows" class="flex-shrink-0 flex-1 min-h-0"></div>

  <!-- 5. Progress Bar (~48px) -->
  <div id="progress-bar" class="flex-shrink-0 px-4 py-2"></div>

  <!-- 6. Bottom Tab Bar + safe area (~90px) -->
  <div class="flex-shrink-0 bg-[#0B0E11] border-t border-[#2E3440]">
    <div class="flex items-center justify-around h-[56px]">
      <a href="home.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-house text-[18px] text-[#F0B90B]"></i>
        <span class="text-[10px] text-[#F0B90B] font-semibold">首页</span>
      </a>
      <a href="clients.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
        <span class="text-[10px] text-[#848E9C]">客户</span>
      </a>
      <a href="events.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
        <span class="text-[10px] text-[#848E9C]">事件</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
        <span class="text-[10px] text-[#848E9C]">我的</span>
      </a>
    </div>
    <div class="h-[34px]"></div>
  </div>

</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;

  var URGENCY_ORDER = { critical: 0, warning: 1, info: 2 };
  var TASK_COLORS = {
    '待处理': { bg: 'rgba(246,70,93,0.15)', text: '#F6465D' },
    '跟进中': { bg: 'rgba(77,166,255,0.15)', text: '#4DA6FF' },
    '已完成': { bg: 'rgba(14,203,129,0.15)', text: '#0ECB81' },
    '已忽略': { bg: 'rgba(132,142,156,0.15)', text: '#848E9C' }
  };

  // Build watchlist: top 30 clients by fMean
  var watchlistUids = D.clients.slice().sort(function(a, b) {
    return b.fMean - a.fMean;
  }).slice(0, 30).map(function(c) { return c.uid; });

  var watchlistSet = {};
  watchlistUids.forEach(function(uid) { watchlistSet[uid] = true; });

  // Client lookup by uid
  var clientMap = {};
  D.clients.forEach(function(c) { clientMap[c.uid] = c; });

  // Filter: watchlist + active states, sort by urgency
  var activeEvents = D.events.filter(function(e) {
    return watchlistSet[e.client_uid] &&
           (e.task_state === '待处理' || e.task_state === '跟进中');
  }).sort(function(a, b) {
    return (URGENCY_ORDER[a.urgency] || 9) - (URGENCY_ORDER[b.urgency] || 9);
  });

  // Count all handled events today (已完成 + 已忽略, watchlist only)
  var handledCount = D.events.filter(function(e) {
    return watchlistSet[e.client_uid] &&
           (e.task_state === '已完成' || e.task_state === '已忽略');
  }).length;

  var totalEvents = activeEvents.length + handledCount;
  var pendingCount = activeEvents.filter(function(e) { return e.task_state === '待处理'; }).length;
  var ongoingCount = activeEvents.filter(function(e) { return e.task_state === '跟进中'; }).length;

  // ---------- 2. Summary Row ----------
  function renderSummary() {
    var el = document.getElementById('summary-row');
    el.innerHTML =
      '<div class="flex items-center justify-between text-[12px]">'
      + '<div class="flex items-center gap-1.5">'
      +   '<span class="text-[#EAECEF] font-medium">今日</span>'
      +   '<span class="text-[#848E9C]">&middot;</span>'
      +   '<span class="text-[#F6465D]">' + pendingCount + ' 待处理</span>'
      +   '<span class="text-[#848E9C]">&middot;</span>'
      +   '<span class="text-[#4DA6FF]">' + ongoingCount + ' 跟进中</span>'
      + '</div>'
      + '<a href="events.html" class="text-[#848E9C]">全部 ›</a>'
      + '</div>';
  }

  // ---------- 3. Hero Card ----------
  function renderHeroCard() {
    var el = document.getElementById('hero-card');

    if (activeEvents.length === 0) {
      // Empty state
      el.innerHTML =
        '<div class="bg-[#1E2329] rounded-xl border border-[#2E3440] p-5 flex flex-col items-center justify-center" style="height:140px">'
        + '<i class="fa-solid fa-circle-check text-[36px] text-[#0ECB81] mb-2"></i>'
        + '<span class="text-[15px] font-medium text-[#EAECEF]">所有事件已处理</span>'
        + '</div>';
      return;
    }

    var evt = activeEvents[0];
    var client = clientMap[evt.client_uid];
    var tc = TASK_COLORS[evt.task_state] || TASK_COLORS['已忽略'];
    var urgencyDot = evt.urgency === 'critical' ? '#F6465D' : evt.urgency === 'warning' ? '#F0B90B' : '#4DA6FF';

    el.innerHTML =
      '<a href="event-thread.html?id=' + evt.id + '" class="block bg-[#1E2329] rounded-xl border border-[#2E3440] p-4 active:bg-[#2B3139]" style="height:140px">'
      // Row 1: type + urgency dot + time
      + '<div class="flex items-center justify-between mb-2">'
      +   '<div class="flex items-center gap-2">'
      +     '<span class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:' + urgencyDot + '"></span>'
      +     '<span class="text-[13px] font-medium text-[#848E9C]">' + evt.type + (evt.sub_type ? ' · ' + evt.sub_type : '') + '</span>'
      +   '</div>'
      +   '<span class="text-[11px] text-[#848E9C]">' + evt.time_ago + '</span>'
      + '</div>'
      // Row 2: client name + deposit
      + '<div class="flex items-center gap-2 mb-1.5">'
      +   '<span class="text-[15px] font-bold text-[#EAECEF]">' + evt.client_name + '</span>'
      +   (client ? '<span class="text-[11px] text-[#848E9C]">资沉 ' + client.depositDisplay + '</span>' : '')
      + '</div>'
      // Row 3: amount (big)
      + '<div class="text-[24px] font-bold mb-1.5" style="color:' + evt.color + ';line-height:1.1">' + evt.amount_display + '</div>'
      // Row 4: suggested action
      + '<div class="flex items-center justify-between">'
      +   '<span class="text-[12px] text-[#F0B90B] truncate mr-2"><i class="fa-solid fa-bolt mr-1"></i>' + (evt.action || '') + '</span>'
      +   '<span class="text-[10px] px-2 py-0.5 rounded-full flex-shrink-0" style="background:' + tc.bg + ';color:' + tc.text + '">' + evt.task_state + '</span>'
      + '</div>'
      + '</a>';
  }

  // ---------- 4. Small Rows x4 ----------
  function renderSmallRows() {
    var el = document.getElementById('small-rows');

    if (activeEvents.length === 0) {
      // Empty: recommend clients with oldest last event
      var staleClients = watchlistUids.map(function(uid) {
        var evts = D.eventsByClientUid[uid] || [];
        var lastTime = evts.length > 0 ? evts[0].time_ago : '无事件';
        return { uid: uid, name: (clientMap[uid] || {}).name || uid, deposit: (clientMap[uid] || {}).depositDisplay || '', lastTime: lastTime, evtCount: evts.length };
      }).sort(function(a, b) {
        // fewer/no events = more stale
        return a.evtCount - b.evtCount;
      }).slice(0, 3);

      var html = '<div class="px-4 pt-1">';
      staleClients.forEach(function(c) {
        html +=
          '<a href="client-detail.html?uid=' + c.uid + '" class="flex items-center justify-between py-3 border-b border-[#2E3440] active:bg-[#2B3139]">'
          + '<div class="flex items-center gap-2 min-w-0">'
          +   '<span class="text-[10px] px-1.5 py-0.5 rounded bg-[rgba(77,166,255,0.15)] text-[#4DA6FF] flex-shrink-0">推荐</span>'
          +   '<span class="text-[13px] text-[#EAECEF] truncate">' + c.name + '</span>'
          +   '<span class="text-[11px] text-[#848E9C]">' + c.deposit + '</span>'
          + '</div>'
          + '<span class="text-[11px] text-[#474D57] flex-shrink-0">' + c.lastTime + '</span>'
          + '</a>';
      });
      // pad remaining rows to keep layout stable
      var remaining = 4 - staleClients.length;
      for (var i = 0; i < remaining; i++) {
        html += '<div class="py-3 border-b border-[#2E3440]">&nbsp;</div>';
      }
      html += '</div>';
      el.innerHTML = html;
      return;
    }

    var rows = activeEvents.slice(1, 5);
    var html = '<div class="px-4">';

    rows.forEach(function(evt) {
      var tc = TASK_COLORS[evt.task_state] || TASK_COLORS['已忽略'];
      html +=
        '<a href="event-thread.html?id=' + evt.id + '" class="flex items-center justify-between py-2.5 border-b border-[#2E3440] active:bg-[#2B3139]">'
        + '<div class="flex items-center gap-2 min-w-0 flex-1">'
        +   '<span class="w-1.5 h-1.5 rounded-full flex-shrink-0" style="background:' + evt.color + '"></span>'
        +   '<span class="text-[13px] font-medium text-[#EAECEF] truncate">' + evt.client_name + '</span>'
        +   '<span class="text-[11px] text-[#848E9C] flex-shrink-0">' + evt.type + '</span>'
        + '</div>'
        + '<div class="flex items-center gap-2 flex-shrink-0 ml-2">'
        +   '<span class="text-[13px] font-bold" style="color:' + evt.color + '">' + evt.amount_display + '</span>'
        +   '<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:' + tc.bg + ';color:' + tc.text + '">' + evt.task_state + '</span>'
        + '</div>'
        + '</a>';
    });

    // pad if fewer than 4
    var remaining = 4 - rows.length;
    for (var i = 0; i < remaining; i++) {
      html += '<div class="py-2.5 border-b border-[#2E3440]">&nbsp;</div>';
    }
    html += '</div>';
    el.innerHTML = html;
  }

  // ---------- 5. Progress Bar ----------
  function renderProgress() {
    var el = document.getElementById('progress-bar');

    if (activeEvents.length === 0) {
      // All done
      el.innerHTML =
        '<div class="flex items-center gap-3">'
        + '<div class="flex-1 h-1.5 rounded-full bg-[#2E3440] overflow-hidden">'
        +   '<div class="h-full rounded-full bg-[#0ECB81]" style="width:100%"></div>'
        + '</div>'
        + '<span class="text-[12px] text-[#0ECB81] flex-shrink-0 whitespace-nowrap">今日已处理 ' + handledCount + ' 条 ✓</span>'
        + '</div>';
      return;
    }

    var pct = totalEvents > 0 ? Math.round(handledCount / totalEvents * 100) : 0;
    var extraCount = activeEvents.length > 5 ? activeEvents.length - 5 : 0;
    var progressText = extraCount > 0
      ? '还有 ' + (activeEvents.length - 5 + 5) + ' 条待处理'
      : '已处理 ' + handledCount + '/' + totalEvents;

    // If more than 5 events, show overflow text
    if (activeEvents.length > 5) {
      progressText = '还有 ' + (activeEvents.length - 5) + ' 条待处理';
    }

    el.innerHTML =
      '<div class="flex items-center gap-3">'
      + '<div class="flex-1 h-1.5 rounded-full bg-[#2E3440] overflow-hidden">'
      +   '<div class="h-full rounded-full bg-[#F0B90B] transition-all" style="width:' + pct + '%"></div>'
      + '</div>'
      + '<a href="events.html" class="text-[12px] text-[#848E9C] flex-shrink-0 whitespace-nowrap">' + progressText + ' · 查看全部 →</a>'
      + '</div>';
  }

  // ---------- Search (preserved from original) ----------
  function getStatusLabel(c) {
    var rate = c.adjustedTrendRate;
    var r2 = c.rSquared;
    if (r2 < 0.5) return { label: '波动不定', bg: 'rgba(132,142,156,0.15)', color: '#848E9C' };
    if (rate <= -0.04) return { label: '快速流失', bg: 'rgba(246,70,93,0.15)', color: '#F6465D' };
    if (rate <= -0.02) return { label: '缓慢流失', bg: 'rgba(240,160,48,0.15)', color: '#F0A030' };
    if (rate >= 0.04) return { label: '快速增长', bg: 'rgba(14,203,129,0.15)', color: '#0ECB81' };
    if (rate >= 0.02) return { label: '缓慢增长', bg: 'rgba(14,203,129,0.10)', color: '#0ECB81' };
    return { label: '稳定', bg: 'rgba(132,142,156,0.15)', color: '#848E9C' };
  }

  function renderSearchResults(query) {
    var dropdown = document.getElementById('search-dropdown');
    var clearBtn = document.getElementById('search-clear');

    if (!query) {
      dropdown.classList.add('hidden');
      clearBtn.classList.add('hidden');
      return;
    }

    clearBtn.classList.remove('hidden');
    var q = query.toLowerCase();
    var matches = D.clients.filter(function(c) {
      return c.name.toLowerCase().indexOf(q) !== -1 || c.uid.toLowerCase().indexOf(q) !== -1;
    }).slice(0, 20);

    if (matches.length === 0) {
      dropdown.innerHTML = '<div class="text-center py-6 text-[13px] text-[#848E9C]">未找到匹配客户</div>';
      dropdown.classList.remove('hidden');
      return;
    }

    dropdown.innerHTML = matches.map(function(c) {
      var sl = getStatusLabel(c);
      return '<a href="client-detail.html?uid=' + c.uid + '" class="flex items-center justify-between px-4 py-3 border-b border-[#2E3440] last:border-0 active:bg-[#2B3139]">'
        + '<div class="min-w-0">'
        +   '<div class="flex items-center gap-2">'
        +     '<span class="text-[13px] font-medium text-[#EAECEF] truncate">' + c.name + '</span>'
        +     '<span class="text-[11px] text-[#474D57]">UID ' + c.uid + '</span>'
        +   '</div>'
        +   '<div class="flex items-center gap-2 mt-0.5">'
        +     '<span class="text-[12px] text-[#EAECEF]">' + c.depositDisplay + '</span>'
        +     '<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:' + sl.bg + ';color:' + sl.color + '">' + sl.label + '</span>'
        +   '</div>'
        + '</div>'
        + '<i class="fa-solid fa-chevron-right text-[10px] text-[#474D57] flex-shrink-0"></i>'
        + '</a>';
    }).join('');

    dropdown.classList.remove('hidden');
  }

  window.onSearchInput = function() {
    var query = document.getElementById('search-input').value.trim();
    renderSearchResults(query);
  };

  window.clearSearch = function() {
    document.getElementById('search-input').value = '';
    renderSearchResults('');
    document.getElementById('search-input').focus();
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('search-input').value = '';
      renderSearchResults('');
    }
  });

  // ---------- Init ----------
  renderSummary();
  renderHeroCard();
  renderSmallRows();
  renderProgress();
})();
</script>

</body>
</html>
