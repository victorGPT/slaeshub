<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 销售工作台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <div class="w-[60px]"></div>
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">销售工作台</h1>
    <div class="flex items-center gap-4">
      <i class="fa-solid fa-magnifying-glass text-[#848E9C] text-[16px]"></i>
      <div class="relative">
        <i class="fa-solid fa-bell text-[#848E9C] text-[16px]"></i>
        <span class="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-[#F6465D]"></span>
      </div>
    </div>
  </div>

  <!-- Three Tabs -->
  <div class="flex bg-[#0B0E11] sticky top-[52px] z-10 border-b border-[#2E3440]" id="tab-bar">
    <button onclick="switchTab('total')" id="tab-total"
      class="flex-1 py-3 text-[14px] font-semibold text-[#F0B90B] border-b-2 border-[#F0B90B] relative">
      资沉总量
    </button>
    <button onclick="switchTab('churn')" id="tab-churn"
      class="flex-1 py-3 text-[14px] text-[#848E9C] border-b-2 border-transparent relative">
      资沉流失
      <span id="badge-churn" class="absolute -top-0.5 right-2 min-w-[18px] h-[18px] flex items-center justify-center rounded-full bg-[#F6465D] text-[10px] text-white font-bold px-1"></span>
    </button>
    <button onclick="switchTab('growth')" id="tab-growth"
      class="flex-1 py-3 text-[14px] text-[#848E9C] border-b-2 border-transparent relative">
      资沉增长
      <span id="badge-growth" class="absolute -top-0.5 right-2 min-w-[18px] h-[18px] flex items-center justify-center rounded-full bg-[#0ECB81] text-[10px] text-white font-bold px-1"></span>
    </button>
  </div>

  <!-- Subtitle -->
  <div class="px-4 pt-3 pb-1">
    <p id="subtitle" class="text-[11px] text-[#848E9C]"></p>
  </div>

  <!-- Card List -->
  <div id="card-list" class="overflow-y-auto pb-[100px]" style="scrollbar-width:none;"></div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script src="mock-data.js"></script>
<script>
(function() {
  const D = window.PROTOTYPE_DATA;
  let currentTab = 'total';

  // Initialize badge counts
  document.getElementById('badge-churn').textContent = D.churnUids.length;
  document.getElementById('badge-growth').textContent = D.growthUids.length;

  function getUidsForTab(tab) {
    switch(tab) {
      case 'total':  return D.depositRankUids;
      case 'churn':  return D.churnUids;
      case 'growth': return D.growthUids;
      default:       return D.depositRankUids;
    }
  }

  function getTrendColor(adjustedTrendF) {
    if (adjustedTrendF > 0) return '#0ECB81';
    if (adjustedTrendF < 0) return '#F6465D';
    return '#848E9C';
  }

  function getSubtitle(tab) {
    switch(tab) {
      case 'total':
        return '按当前资沉总量排序 \u00b7 全部重点客户';
      case 'churn':
        return '盘子越大、掉得越快，优先级越高 \u00b7 近期市场 ' + D.platformTrendDisplay;
      case 'growth':
        return '盘子越大、涨得越快，越值得放大 \u00b7 近期市场 ' + D.platformTrendDisplay;
      default:
        return '';
    }
  }

  function cardHTML(c, rank) {
    var color = getTrendColor(c.adjustedTrendF);
    var absChangePart = c.status !== '稳定'
      ? '<span class="text-[10px] text-[#848E9C]">(' + c.absChangeDisplay + ')</span>'
      : '';

    return '<a href="' + c.detailHref + '" class="block bg-[#1E2329] rounded-xl border border-[#2E3440] p-4 mx-4 mb-2 active:bg-[#2B3139]">'
      + '<div class="flex items-center justify-between mb-2">'
      +   '<div class="flex items-center gap-2">'
      +     '<span class="text-[13px] font-bold w-6 text-hub-gold">#' + rank + '</span>'
      +     '<span class="text-[14px] font-semibold text-[#EAECEF]">' + c.name + '</span>'
      +   '</div>'
      +   '<span class="text-[18px] font-bold text-[#EAECEF]">' + c.depositDisplay + '</span>'
      + '</div>'
      + '<div class="flex items-center gap-2 mb-2">'
      +   '<span class="text-[10px] px-2 py-0.5 rounded-full" style="background:' + c.statusBadge.bg + ';color:' + c.statusBadge.text + '">' + c.status + '</span>'
      +   '<span class="text-[11px]" style="color:' + color + '">' + c.trendDisplay + '</span>'
      +   absChangePart
      + '</div>'
      + '<div class="text-[11px] text-[#848E9C] mb-1">' + c.reasonTag + '</div>'
      + '<div class="text-[11px] text-[#F0B90B]">\u2192 ' + c.suggestedAction + '</div>'
      + '</a>';
  }

  function renderCards(tab) {
    var uids = getUidsForTab(tab);
    var container = document.getElementById('card-list');
    container.innerHTML = uids.map(function(uid, i) {
      var c = D.clientsById[uid];
      return cardHTML(c, i + 1);
    }).join('');
  }

  function updateTabStyles(tab) {
    var tabs = ['total', 'churn', 'growth'];
    tabs.forEach(function(t) {
      var el = document.getElementById('tab-' + t);
      if (t === tab) {
        el.className = 'flex-1 py-3 text-[14px] font-semibold text-[#F0B90B] border-b-2 border-[#F0B90B] relative';
      } else {
        el.className = 'flex-1 py-3 text-[14px] text-[#848E9C] border-b-2 border-transparent relative';
      }
    });
  }

  window.switchTab = function(tab) {
    currentTab = tab;
    updateTabStyles(tab);
    document.getElementById('subtitle').textContent = getSubtitle(tab);
    renderCards(tab);
  };

  // Initial render
  switchTab('total');
})();
</script>

</body>
</html>
