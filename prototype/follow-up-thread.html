<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0B0E11" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub — 任务详情</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg': '#0B0E11', 'hub-card': '#1E2329', 'hub-border': '#2E3440',
            'hub-gold': '#F0B90B', 'hub-red': '#F6465D', 'hub-green': '#0ECB81',
            'hub-blue': '#4DA6FF', 'hub-text': '#EAECEF', 'hub-muted': '#848E9C',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .pill-btn { padding: 5px 12px; border-radius: 999px; font-size: 12px; background: #2B3139; color: #848E9C; border: 1px solid #2E3440; cursor: pointer; white-space: nowrap; }
    .pill-btn.active { background: #F0B90B; color: #0B0E11; font-weight: 600; border-color: #F0B90B; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full pb-[100px]">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[44px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center">
      <i class="fa-solid fa-chevron-left text-[16px] text-[#EAECEF]"></i>
    </button>
    <h1 class="text-[16px] font-bold text-[#EAECEF]">任务详情</h1>
    <div class="w-8"></div>
  </div>

  <!-- ① 客户信息卡 -->
  <div id="client-card" class="mx-3 mt-2 mb-2 bg-[#1E2329] rounded-2xl border border-[#2E3440] overflow-hidden">
    <!-- Row 1: Identity -->
    <div class="flex items-center gap-3 px-4 pt-3 pb-2">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <button id="uid-btn" onclick="copyUid()" class="flex items-center gap-1.5 active:opacity-70">
            <span id="client-uid" class="text-[16px] font-bold text-[#EAECEF] tabular-nums tracking-wide"></span>
            <i class="fa-regular fa-copy text-[10px] text-[#474D57]"></i>
          </button>
          <span id="client-nickname" class="text-[12px] text-[#848E9C]"></span>
        </div>
      </div>
      <span id="from-badge" class="text-[9px] px-1.5 py-[1px] rounded hidden flex-shrink-0"></span>
      <button id="fav-btn" onclick="toggleFav()" class="w-8 h-8 flex items-center justify-center rounded-full bg-[#2B3139] flex-shrink-0 active:scale-95 transition-transform">
        <i id="fav-icon" class="fa-regular fa-star text-[14px] text-[#474D57]"></i>
      </button>
    </div>
    <!-- Row 2: Tags -->
    <div id="tags-row" class="px-4 pb-2 flex flex-wrap gap-1"></div>
    <!-- Row 3: 资沉主指标 -->
    <div class="px-4 pb-2">
      <div class="text-[10px] text-[#474D57] mb-0.5 flex items-center gap-1">资沉<i onclick="event.stopPropagation();showDetailTip('deposit',this)" class="fa-regular fa-circle-question" style="color:#474D57;font-size:9px;cursor:pointer"></i></div>
      <div class="flex items-baseline gap-2">
        <span id="deposit-hero" class="text-[28px] font-bold text-[#EAECEF] tracking-tight leading-none"></span>
        <div id="deposit-delta" class="flex items-center gap-0.5 text-[11px]"></div>
      </div>
    </div>
    <!-- Row 4: 充提 / 月利润贡献 / 月交易盈亏 -->
    <div class="flex px-4 pb-3 gap-0">
      <div class="flex-1">
        <div class="text-[10px] text-[#474D57] mb-0.5 flex items-center gap-1">充提<i onclick="event.stopPropagation();showDetailTip('cashflow',this)" class="fa-regular fa-circle-question" style="color:#474D57;font-size:9px;cursor:pointer"></i></div>
        <span id="cashflow-hero" class="text-[15px] font-bold leading-none">--</span>
      </div>
      <div class="flex-1">
        <div class="text-[10px] text-[#474D57] mb-0.5 flex items-center gap-1">月利润贡献<i onclick="event.stopPropagation();showDetailTip('profit',this)" class="fa-regular fa-circle-question" style="color:#474D57;font-size:9px;cursor:pointer"></i></div>
        <span id="profit-hero" class="text-[15px] font-bold leading-none">--</span>
      </div>
      <div class="flex-1">
        <div class="text-[10px] text-[#474D57] mb-0.5 flex items-center gap-1">月交易盈亏<i onclick="event.stopPropagation();showDetailTip('pnl',this)" class="fa-regular fa-circle-question" style="color:#474D57;font-size:9px;cursor:pointer"></i></div>
        <span id="pnl-hero" class="text-[15px] font-bold text-[#848E9C] leading-none">--</span>
      </div>
    </div>
    <div class="flex justify-end px-4 pb-2 -mt-1">
      <span id="data-refresh-time" class="text-[9px] text-[#474D57]"></span>
    </div>
  </div>

  <div class="px-4 pb-1 -mt-1 flex justify-end">
    <a id="full-profile-link" href="#" class="text-[11px] text-[#4DA6FF]">查看完整资料 →</a>
  </div>

  <!-- ② 事件详情卡 -->
  <div class="mx-3 mt-3 bg-[#1E2329] rounded-2xl border border-[#2E3440] p-4">
    <!-- 类型 + 来源 + 时间 -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span id="event-type-badge" style="font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(240,185,11,0.12);border:1px solid rgba(240,185,11,0.22);color:#F0B90B"></span>
      <span id="event-source-badge" style="font-size:10px;padding:2px 8px;border-radius:999px;background:#2B3139;color:#848E9C"></span>
      <span style="flex:1"></span>
      <span id="event-time" style="font-size:11px;color:#474D57"></span>
    </div>
    <!-- 主要内容 -->
    <div id="event-goal" style="font-size:16px;font-weight:600;color:#EAECEF;line-height:1.4"></div>
    <!-- 说明（手动事件的备注） -->
    <div id="event-note" style="font-size:13px;color:#848E9C;margin-top:6px;line-height:1.5"></div>
  </div>

  <!-- ③ AI 行动建议 -->
  <div class="mx-3 mt-3 bg-[#1E2329] rounded-2xl border border-[#2E3440] p-4">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <i class="fa-solid fa-robot" style="color:#F0B90B;font-size:13px"></i>
      <span style="font-size:13px;font-weight:600;color:#EAECEF">AI 行动建议</span>
      <span style="font-size:10px;color:#474D57;margin-left:auto">仅供参考</span>
    </div>
    <div id="ai-strategy-tags" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>
    <div id="ai-suggestions" style="display:flex;flex-direction:column;gap:10px"></div>
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid #2E3440;font-size:10px;color:#474D57;line-height:1.6">
      基于事件类型与客户数据生成 · 建议仅供参考，请结合实际情况判断
    </div>
  </div>

  <!-- ③.5 处置工具包 -->
  <div class="mx-3 mt-3 bg-[#1E2329] rounded-2xl border border-[#2E3440] overflow-hidden">
    <div style="display:flex;align-items:center;gap:8px;padding:14px 16px 10px">
      <i class="fa-solid fa-wand-magic-sparkles" style="color:#0ECB81;font-size:12px"></i>
      <span style="font-size:13px;font-weight:600;color:#EAECEF">处置工具包</span>
    </div>
    <!-- Tab 选择 -->
    <div style="display:flex;gap:8px;padding:0 16px 12px">
      <button id="tool-tab-script" onclick="switchTool('script')"
        style="flex:1;height:34px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:rgba(0,203,129,0.12);color:#0ECB81;border:1px solid rgba(0,203,129,0.3)">话术模板</button>
      <button id="tool-tab-incentive" onclick="switchTool('incentive')"
        style="flex:1;height:34px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:#2B3139;color:#848E9C;border:1px solid #2E3440">发放礼金</button>
      <button id="tool-tab-meeting" onclick="switchTool('meeting')"
        style="flex:1;height:34px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;background:#2B3139;color:#848E9C;border:1px solid #2E3440">面谈邀约</button>
    </div>

    <!-- ── 话术模板面板 ── -->
    <div id="tool-panel-script" style="padding:0 16px 16px">
      <div id="script-style-pills" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px"></div>
      <div id="script-content" style="background:#2B3139;border:1px solid #2E3440;border-radius:10px;padding:12px;font-size:13px;color:#EAECEF;line-height:1.7;min-height:72px"></div>
      <button id="copy-script-btn" onclick="copyScript()"
        style="margin-top:8px;width:100%;height:38px;background:rgba(0,203,129,0.12);color:#0ECB81;border:1px solid rgba(0,203,129,0.3);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">
        <i class="fa-regular fa-copy" style="margin-right:6px"></i>复制话术
      </button>
    </div>

    <!-- ── 发放礼金面板 ── -->
    <div id="tool-panel-incentive" style="display:none;padding:0 16px 16px">
      <div style="font-size:11px;color:#474D57;margin-bottom:6px">礼金类型</div>
      <div style="display:flex;gap:6px;margin-bottom:14px">
        <button id="itype-USDT" onclick="selectIType('USDT')"
          style="flex:1;height:34px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:rgba(240,185,11,0.12);color:#F0B90B;border:1px solid rgba(240,185,11,0.3)">USDT</button>
        <button id="itype-现金" onclick="selectIType('现金')"
          style="flex:1;height:34px;border-radius:8px;font-size:12px;cursor:pointer;background:#2B3139;color:#848E9C;border:1px solid #2E3440">现金</button>
        <button id="itype-礼品" onclick="selectIType('礼品')"
          style="flex:1;height:34px;border-radius:8px;font-size:12px;cursor:pointer;background:#2B3139;color:#848E9C;border:1px solid #2E3440">礼品</button>
      </div>
      <div id="incentive-amount-block">
        <div style="font-size:11px;color:#474D57;margin-bottom:6px">金额档位</div>
        <div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">
          <button id="iamt-200" onclick="selectIAmt('200')"
            style="height:34px;padding:0 14px;border-radius:8px;font-size:12px;cursor:pointer;background:#2B3139;color:#848E9C;border:1px solid #2E3440">200U</button>
          <button id="iamt-500" onclick="selectIAmt('500')"
            style="height:34px;padding:0 14px;border-radius:8px;font-size:12px;cursor:pointer;background:#2B3139;color:#848E9C;border:1px solid #2E3440">500U</button>
          <button id="iamt-1000" onclick="selectIAmt('1000')"
            style="height:34px;padding:0 14px;border-radius:8px;font-size:12px;cursor:pointer;background:#2B3139;color:#848E9C;border:1px solid #2E3440">1000U</button>
          <input id="iamt-custom" type="number" placeholder="自填金额" oninput="onCustomAmt(this.value)"
            style="flex:1;height:34px;background:#2B3139;color:#EAECEF;font-size:12px;border:1px solid #2E3440;border-radius:8px;padding:0 10px;outline:none;caret-color:#F0B90B;box-sizing:border-box">
        </div>
      </div>
      <div id="incentive-gift-block" style="display:none;margin-bottom:12px">
        <div style="font-size:11px;color:#474D57;margin-bottom:6px">礼品说明</div>
        <input id="gift-desc" placeholder="填写礼品名称或说明"
          style="width:100%;height:34px;box-sizing:border-box;background:#2B3139;color:#EAECEF;font-size:13px;border:1px solid #2E3440;border-radius:8px;padding:0 10px;outline:none;caret-color:#F0B90B">
      </div>
      <textarea id="incentive-note" placeholder="备注（选填）" rows="2"
        style="width:100%;box-sizing:border-box;background:#2B3139;color:#EAECEF;border:1px solid #2E3440;border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;line-height:1.6;resize:none;outline:none;caret-color:#F0B90B;margin-bottom:8px"></textarea>
      <button onclick="recordIncentive()"
        style="width:100%;height:38px;background:rgba(240,185,11,0.12);color:#F0B90B;border:1px solid rgba(240,185,11,0.3);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">记录发放</button>
    </div>

    <!-- ── 面谈邀约面板 ── -->
    <div id="tool-panel-meeting" style="display:none;padding:0 16px 16px">
      <div style="font-size:11px;color:#474D57;margin-bottom:8px">严重等级</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
        <button id="mlvl-轻微" onclick="selectMLevel('轻微')"
          style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;cursor:pointer;background:#2B3139;border:1px solid #2E3440">
          <span style="font-size:13px;color:#EAECEF;font-weight:500">轻微</span>
          <span style="font-size:11px;color:#848E9C">常规维护，了解近况</span>
        </button>
        <button id="mlvl-中等" onclick="selectMLevel('中等')"
          style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;cursor:pointer;background:#2B3139;border:1px solid #2E3440">
          <span style="font-size:13px;color:#EAECEF;font-weight:500">中等</span>
          <span style="font-size:11px;color:#848E9C">有流失风险，需重点跟进</span>
        </button>
        <button id="mlvl-严重" onclick="selectMLevel('严重')"
          style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;cursor:pointer;background:#2B3139;border:1px solid #2E3440">
          <span style="font-size:13px;color:#EAECEF;font-weight:500">严重</span>

      <button onclick="recordMeeting()"
        style="width:100%;height:38px;background:rgba(77,166,255,0.12);color:#4DA6FF;border:1px solid rgba(77,166,255,0.3);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">记录面谈邀约</button>
    </div>
  </div>

  <!-- ④ 跟进记录 -->
  <div class="mx-3 mt-3 mb-4 bg-[#1E2329] rounded-2xl border border-[#2E3440] overflow-hidden">
    <div style="display:flex;align-items:center;gap:8px;padding:14px 16px 10px">
      <i class="fa-solid fa-pen-to-square" style="color:#4DA6FF;font-size:12px"></i>
      <span style="font-size:13px;font-weight:600;color:#EAECEF">跟进记录</span>
      <span id="fu-records-count" style="font-size:10px;color:#474D57;margin-left:auto"></span>
    </div>
    <!-- 已有记录列表 -->
    <div id="fu-records-list" style="padding:0 16px"></div>
    <!-- 输入区 -->
    <div style="padding:10px 16px 14px">
      <textarea id="fu-record-input" placeholder="记录跟进结果、客户反馈…" rows="3"

      <button onclick="addFuRecord()" style="margin-top:8px;width:100%;height:38px;background:rgba(77,166,255,0.12);color:#4DA6FF;border:1px solid rgba(77,166,255,0.3);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">保存记录</button>
    </div>
  </div>

</div>
</div>

<!-- Tooltip overlay -->

<div id="tip-box" style="display:none;position:fixed;z-index:101;background:#2B3139;border:1px solid #2E3440;border-radius:10px;padding:10px 14px;max-width:180px;font-size:12px;color:#EAECEF;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,0.5)"></div>

<!-- 底部操作栏 -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30 px-4 pt-3" style="padding-bottom:calc(0.75rem + env(safe-area-inset-bottom))">
  <!-- 跟进计划日期选择（默认隐藏） -->
  <div id="flag-chooser" style="display:none;flex-direction:column;gap:6px;margin-bottom:10px">
    <span style="font-size:11px;color:#474D57">计划跟进日期</span>
    <div style="display:flex;flex-direction:row;align-items:center;gap:8px">
      <button id="flag-today-btn" onclick="markFlagToday()" style="height:36px;padding:0 18px;background:#2B3139;color:#EAECEF;font-size:13px;border:1px solid #2E3440;border-radius:999px;cursor:pointer;white-space:nowrap">今天</button>
      <button onclick="markFlagPending()" style="height:36px;padding:0 18px;background:#2B3139;color:#848E9C;font-size:13px;border:1px solid #2E3440;border-radius:999px;cursor:pointer;white-space:nowrap">待定</button>
      <input type="date" id="flag-custom-date" style="flex:1;height:36px;background:#2B3139;color:#EAECEF;font-size:13px;border:1px solid #2E3440;border-radius:999px;padding:0 12px;outline:none;cursor:pointer" oninput="markFlagCustom(this.value)">
    </div>
  </div>
  <div style="display:flex;gap:8px">
    <button id="flag-btn" onclick="toggleFlagChooser()" style="flex:1;height:44px;font-size:14px;font-weight:500;border-radius:10px;cursor:pointer;background:rgba(240,185,11,0.12);color:#F0B90B;border:1px solid rgba(240,185,11,0.3)">列入跟进计划</button>
    <button id="close-event-btn" onclick="closeEvent()" style="flex:1;height:44px;background:#2B3139;color:#EAECEF;font-size:14px;font-weight:500;border:1px solid #2E3440;border-radius:10px;cursor:pointer">归档</button>
  </div>
</div>

<script>
var DETAIL_TIPS = {
  deposit:  '客户过去 7 天持仓资产均值（USDT）；旁边变化率为当前值与过去 8 周均值的偏差，反映中长期趋势',
  cashflow: '本周充值减提现估算合计，基于持仓周变化推算，仅供参考',
  profit:   '客户本月为平台贡献的可统计利润，含手续费、利差、理财利息等；由周数据 × 4.3 估算',
  pnl:      '客户本月交易持仓方向盈亏，含合约、杠杆、迷你等品种；由 7 日数据 × 4.3 估算',
};
window.showDetailTip = function(key, el) {
  var box = document.getElementById('tip-box');
  var overlay = document.getElementById('tip-overlay');
  box.textContent = DETAIL_TIPS[key] || '';
  var rect = el.getBoundingClientRect();
  var boxW = 180;
  var left = Math.min(rect.left, window.innerWidth - boxW - 12);
  box.style.left = Math.max(12, left) + 'px';
  box.style.top = (rect.bottom + 6) + 'px';
  box.style.display = 'block';
  overlay.style.display = 'block';
};
window.hideTip = function() {
  document.getElementById('tip-box').style.display = 'none';
  document.getElementById('tip-overlay').style.display = 'none';
};
</script>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var fuId = params.get('fuId');
  var shared = window.EventCenterShared;

    if (diff < 3600) return '刚刚';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    var days = Math.floor(diff / 86400);
    if (days < 7) return days + '天前';

      '简洁直接': '账户的问题我已经提交给技术那边了，我来盯着进度，今天内给您一个结果，不用您再跑一遍流程。',
      '亲切随和': '哥/姐，这个问题我已经帮您反映上去了，我来盯着，有消息第一时间告诉您，您不用自己去问。',
      '专业正式': '您好，账户风控问题我方已提交内部排查，我会全程跟进处理进度，预计今日内给您明确反馈。如需加急，我来协调走优先通道，无需您再单独申请。',
      '关怀体贴': '我知道账户被限制很影响操作，这个我来帮您处理。我已经把您的情况单独报上去了，让他们优先看，今天我会持续跟进，有任何进展我马上告诉您，您不用操心这边的流程。',
      '积极引导': '账户问题我已经在处理了，今天内能解决。这段时间我帮您先把想操作的方向记下来，等账户恢复了我第一时间帮您执行，不耽误您的节奏。'
    },
    '爆仓': {
      '简洁直接': '仓位平了，我已经帮您拉了这次的数据，等您准备好了我给您复盘一下，看下次怎么设能更稳。',
      '亲切随和': '哥/姐，这波确实很惨，我理解。您先缓缓，我帮您把这次的仓位数据整理一下，等您状态好了我们一起看，下一步怎么做我来帮您想。',
      '专业正式': '您好，我已记录此次强平的详细数据。等您方便时，我可以为您做一次完整的仓位复盘，分析触发原因并给出下一步的仓位管理建议，我来安排时间，您定就好。',
      '关怀体贴': '这次的事我看到了，不说「没事」，因为确实不是小事。您先照顾好自己，我已经把这次的数据留存好了，等您准备好了我陪您一起复盘，我来帮您把下一步想清楚。',
      '积极引导': '仓位平了之后，我帮您看了一下，这次主要是止损点设得太宽了。我给您整理了一个更保守的仓位方案，等您准备好重新进场的时候，我来帮您配置，这次设得稳一点。'
    }
  };
  var SCRIPT_FALLBACK = {
    '简洁直接': '了解到您账户近期有动态，我帮您看了一下相关数据，今天内整理好发给您，有问题我来处理。',
    '亲切随和': '刚看到您的账户有些变化，我帮您先查一下，整理好发给您，有什么需要我来帮您搞定。',
    '专业正式': '您好，我方注意到您账户近期有相关动态。我已开始整理相关数据，今日内发给您，如需进一步跟进请随时告知。',
    '关怀体贴': '看到您账户的情况，我想主动来问候一下。我已经开始帮您梳理相关数据，整理好了发给您，有什么需要我在。',
    '积极引导': '账户有些新动态，我已经在帮您分析了。整理好后发给您，您选一个方向，我来帮您执行。'
  };

  var _curStyle = '简洁直接';
  var _curIType = 'USDT';
  var _curIAmt = '';
  var _curMLevel = '';
  var SCRIPT_STYLES = ['简洁直接','亲切随和','专业正式','关怀体贴','积极引导'];

  window.switchTool = function(tab) {
    ['script','incentive','meeting'].forEach(function(t) {
      var panel = document.getElementById('tool-panel-' + t);
      var btn = document.getElementById('tool-tab-' + t);
      var active = t === tab;
      panel.style.display = active ? 'block' : 'none';
      if (active) {
        btn.style.background = 'rgba(0,203,129,0.12)'; btn.style.color = '#0ECB81';
        btn.style.borderColor = 'rgba(0,203,129,0.3)'; btn.style.fontWeight = '600';
      } else {
        btn.style.background = '#2B3139'; btn.style.color = '#848E9C';
        btn.style.borderColor = '#2E3440'; btn.style.fontWeight = '500';
      }
    });
  };

  function renderScriptPills() {
    var pills = document.getElementById('script-style-pills');
    pills.innerHTML = SCRIPT_STYLES.map(function(s) {
      var active = s === _curStyle;
      return '<button onclick="selectScriptStyle(\'' + s + '\')" style="padding:4px 10px;border-radius:999px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;'
        + (active ? 'background:#0ECB81;color:#0B0E11;font-weight:600;border:1px solid #0ECB81'
                  : 'background:#2B3139;color:#848E9C;border:1px solid #2E3440')
        + '">' + s + '</button>';
    }).join('');
  }

  function updateScriptText() {
    var map = SCRIPT_TEMPLATES[ev.type] || SCRIPT_FALLBACK;
    document.getElementById('script-content').textContent = map[_curStyle] || '';
  }

  window.selectScriptStyle = function(style) {
    _curStyle = style;
    renderScriptPills();
    updateScriptText();
  };

  window.copyScript = function() {
    var text = document.getElementById('script-content').textContent;
    if (!text) return;
    var btn = document.getElementById('copy-script-btn');
    navigator.clipboard.writeText(text).then(function() {
      btn.innerHTML = '<i class="fa-solid fa-check" style="margin-right:6px"></i>已复制';
      setTimeout(function() { btn.innerHTML = '<i class="fa-regular fa-copy" style="margin-right:6px"></i>复制话术'; }, 1500);
    });
  };

  window.selectIType = function(type) {
    _curIType = type;
    ['USDT','现金','礼品'].forEach(function(t) {
      var btn = document.getElementById('itype-' + t);
      var active = t === type;
      if (active) {
        btn.style.background = 'rgba(240,185,11,0.12)'; btn.style.color = '#F0B90B';
        btn.style.borderColor = 'rgba(240,185,11,0.3)'; btn.style.fontWeight = '600';
      } else {
        btn.style.background = '#2B3139'; btn.style.color = '#848E9C';
        btn.style.borderColor = '#2E3440'; btn.style.fontWeight = '500';
      }
    });
    document.getElementById('incentive-amount-block').style.display = type === '礼品' ? 'none' : 'block';
    document.getElementById('incentive-gift-block').style.display = type === '礼品' ? 'block' : 'none';
  };

  window.selectIAmt = function(amt) {
    _curIAmt = amt;
    document.getElementById('iamt-custom').value = '';
    ['200','500','1000'].forEach(function(a) {
      var btn = document.getElementById('iamt-' + a);
      var active = a === amt;
      if (active) {
        btn.style.background = 'rgba(240,185,11,0.12)'; btn.style.color = '#F0B90B';
        btn.style.borderColor = 'rgba(240,185,11,0.3)'; btn.style.fontWeight = '600';
      } else {
        btn.style.background = '#2B3139'; btn.style.color = '#848E9C';
        btn.style.borderColor = '#2E3440'; btn.style.fontWeight = '500';
      }
    });
  };

  window.onCustomAmt = function(val) {
    _curIAmt = val;
    ['200','500','1000'].forEach(function(a) {
      var btn = document.getElementById('iamt-' + a);
      btn.style.background = '#2B3139'; btn.style.color = '#848E9C';
      btn.style.borderColor = '#2E3440'; btn.style.fontWeight = '500';
    });
  };

  window.recordIncentive = function() {
    var type = _curIType;
    var desc = '';
    if (type === '礼品') {
      desc = (document.getElementById('gift-desc').value.trim()) || '礼品';
    } else {
      var amt = _curIAmt || document.getElementById('iamt-custom').value.trim();
      if (!amt) { alert('请选择或填写金额'); return; }
      desc = amt + 'U ' + type;
    }
    var note = document.getElementById('incentive-note').value.trim();
    var text = '【发放礼金】' + desc + (note ? '  · ' + note : '');
    var list = loadRecords();
    list.push({ text: text, at: new Date().toISOString() });
    saveRecords(list);
    renderRecords();
    document.getElementById('incentive-note').value = '';
    document.getElementById('iamt-custom').value = '';
    _curIAmt = '';
    ['200','500','1000'].forEach(function(a) {
      var btn = document.getElementById('iamt-' + a);
      btn.style.background = '#2B3139'; btn.style.color = '#848E9C';
      btn.style.borderColor = '#2E3440'; btn.style.fontWeight = '500';
    });
  };

  var MEETING_COLORS = {
    '轻微': { bg:'rgba(0,203,129,0.08)', border:'rgba(0,203,129,0.3)', color:'#0ECB81' },
    '中等': { bg:'rgba(240,185,11,0.08)', border:'rgba(240,185,11,0.3)', color:'#F0B90B' },
    '严重': { bg:'rgba(246,70,93,0.08)', border:'rgba(246,70,93,0.3)', color:'#F6465D' }
  };

  window.selectMLevel = function(level) {
    _curMLevel = level;
    ['轻微','中等','严重'].forEach(function(l) {
      var btn = document.getElementById('mlvl-' + l);
      var active = l === level;
      var c = MEETING_COLORS[l];
      btn.style.background = active ? c.bg : '#2B3139';
      btn.style.borderColor = active ? c.border : '#2E3440';
      btn.querySelector('span').style.color = active ? c.color : '#EAECEF';
    });
  };

  window.recordMeeting = function() {
    if (!_curMLevel) { alert('请选择严重等级'); return; }
    var purpose = document.getElementById('meeting-purpose').value.trim();
    var text = '【面谈邀约】' + _curMLevel + (purpose ? '  · ' + purpose : '');
    var list = loadRecords();
    list.push({ text: text, at: new Date().toISOString() });
    saveRecords(list);
    renderRecords();
    document.getElementById('meeting-purpose').value = '';
    _curMLevel = '';
    ['轻微','中等','严重'].forEach(function(l) {
      var btn = document.getElementById('mlvl-' + l);
      btn.style.background = '#2B3139'; btn.style.borderColor = '#2E3440';
      btn.querySelector('span').style.color = '#EAECEF';
    });
  };

  // 初始化话术面板
  renderScriptPills();
  updateScriptText();

  // ── 特别关注 ──
  var shared2 = window.EventCenterShared;
  function getFlagged() { return shared2 ? shared2.loadFlagged(localStorage) : []; }
  function isFlagged() {
    return getFlagged().some(function(f) { return f.fuId === ev.id; });
  }
  function syncFlagBtn() {
    var btn = document.getElementById('flag-btn');
    if (isFlagged()) {
      btn.textContent = '已列入跟进 · 取消';
      btn.style.background = 'rgba(240,185,11,0.2)';
      btn.style.color = '#F0B90B';
    } else {
      btn.textContent = '列入跟进计划';
      btn.style.background = 'rgba(240,185,11,0.12)';
      btn.style.color = '#F0B90B';
    }
  }
  window.toggleFlagChooser = function() {
    if (isFlagged()) {
      // 已标记 → 直接取消
      if (shared2) shared2.saveFlagged(localStorage, shared2.removeFlaggedEntry(getFlagged(), ev.id));
      document.getElementById('flag-chooser').style.display = 'none';
      syncFlagBtn();
    } else {
      var chooser = document.getElementById('flag-chooser');
      chooser.style.display = chooser.style.display === 'none' ? 'flex' : 'none';
    }
  };
  function doMarkFlag(dateStr) {
    if (!shared2 || !dateStr) return;
    var next = shared2.upsertFlaggedEntry(getFlagged(), ev.id, dateStr, new Date().toISOString());
    shared2.saveFlagged(localStorage, next);
    document.getElementById('flag-chooser').style.display = 'none';
    syncFlagBtn();
  }
  window.markFlagToday = function() {
    doMarkFlag(new Date().toISOString().split('T')[0]);
  };
  window.markFlagPending = function() {
    doMarkFlag('pending');
  };
  window.markFlagCustom = function(dateStr) {
    if (dateStr) doMarkFlag(dateStr);
  };
  // 初始化 date input 最小值为今天
  document.getElementById('flag-custom-date').min = new Date().toISOString().split('T')[0];
  syncFlagBtn();

  function saveStatus(status) {
    var all = [];
    try { all = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    all.forEach(function(e) {
      if (e.id === ev.id) {
        e.status = status;
        if (doneNote !== undefined) { e.done_note = doneNote; e.done_at = new Date().toISOString(); }
        ev.status = e.status;
        ev.done_note = e.done_note;
      }
    });
    localStorage.setItem('follow_up_events', JSON.stringify(all));
  }

  // ── 编辑标题 ──
  window.enterEditMode = function() {
    var textarea = document.getElementById('task-title-edit');
    textarea.value = ev.title || '';
    document.getElementById('task-title-view').classList.add('hidden');
    textarea.classList.remove('hidden');
    document.getElementById('edit-actions').classList.remove('hidden');
    textarea.focus();
  };
  window.cancelEdit = function() {
    document.getElementById('task-title-view').classList.remove('hidden');
    document.getElementById('task-title-edit').classList.add('hidden');
    document.getElementById('edit-actions').classList.add('hidden');
  };
  window.saveEdit = function() {
    var newTitle = document.getElementById('task-title-edit').value.trim();
    if (!newTitle) return;
    ev.title = newTitle;
    var all = [];
    try { all = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    all.forEach(function(e) { if (e.id === ev.id) e.title = newTitle; });
    localStorage.setItem('follow_up_events', JSON.stringify(all));
    document.getElementById('event-goal').textContent = newTitle;
    window.cancelEdit();
  };

  // ── 归档（= 已结束，一键） ──
  window.closeEvent = function() {
    if (!shared || isEventClosed()) return;
    shared.saveClosed(localStorage, shared.closeEventIds(shared.loadClosed(localStorage), ev.id));
    syncCloseButton();
    if (history.length > 1) {
      history.back();
      return;
    }
    location.reload();
  };

  window.openDeleteSheet = function() {
    var sheet = document.getElementById('delete-sheet');
    sheet.style.display = 'flex';
  };
  window.closeDeleteSheet = function() {
    document.getElementById('delete-sheet').style.display = 'none';
  };
  window.confirmDelete = function() {
    var fuId = new URLSearchParams(location.search).get('fuId');
    var all = [];
    try { all = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    all = all.filter(function(e) { return e.id !== fuId; });
    localStorage.setItem('follow_up_events', JSON.stringify(all));
    if (shared) {
      shared.saveFlagged(localStorage, shared.removeFlaggedEntry(shared.loadFlagged(localStorage), fuId));
      shared.saveClosed(localStorage, shared.reopenEventIds(shared.loadClosed(localStorage), fuId));
    }
    history.back();
  };

  syncCloseButton();
})();
</script>

<!-- 删除确认 Sheet -->
<div id="delete-sheet" style="display:none;position:fixed;inset:0;z-index:50;align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeDeleteSheet()">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.6);pointer-events:none"></div>
  <div style="position:relative;width:393px;background:#1E2329;border-radius:16px 16px 0 0;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));z-index:1">
    <div style="font-size:15px;font-weight:600;color:#EAECEF;margin-bottom:6px">删除任务</div>
    <div style="font-size:13px;color:#848E9C;margin-bottom:20px">删除后无法恢复，确认删除这个任务吗？</div>
    <div style="display:flex;gap:8px">
      <button onclick="closeDeleteSheet()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;color:#848E9C;border:1px solid #2E3440;background:none;cursor:pointer">取消</button>
      <button onclick="confirmDelete()" style="flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:600;background:#F6465D;color:#fff;border:0;cursor:pointer">确认删除</button>
    </div>
  </div>
</div>
