<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0B0E11" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="flex-shrink-0 h-[52px] bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <span class="text-[15px] font-black" style="color:#F0B90B;letter-spacing:-0.5px">SH</span><h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">首页</h1><span class="w-[24px]"></span>
  </div>

  <!-- Search Bar -->
  <div class="flex-shrink-0 bg-[#0B0E11] px-4 py-1.5 relative z-20">
    <div class="flex items-center bg-[#1E2329] rounded-lg px-3 py-2 border border-[#2E3440]">
      <i class="fa-solid fa-magnifying-glass text-[12px] text-[#848E9C] mr-2"></i>
      <input id="search-input" type="text" placeholder="搜索客户名字或 UID..."
             class="flex-1 bg-transparent text-[13px] text-[#EAECEF] outline-none placeholder-[#474D57]"
             oninput="onSearchInput()" />
      <button id="search-clear" onclick="clearSearch()" class="hidden text-[#848E9C] text-[12px] ml-2 bg-transparent border-0 cursor-pointer">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <!-- Search Results Dropdown -->
    <div id="search-dropdown" class="hidden absolute left-0 right-0 top-full z-40 mx-4 bg-[#1E2329] rounded-b-lg border border-t-0 border-[#2E3440] max-h-[320px] overflow-y-auto shadow-lg"></div>
  </div>

  <!-- Scrollable Content -->
  <div class="py-2 pb-[calc(56px+env(safe-area-inset-bottom,34px)+8px)]" id="main-content"></div>

  <!-- Bottom Tab Bar -->
  <div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
    <div class="flex items-center justify-around h-[56px]">
      <a href="home.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-house text-[18px] text-[#F0B90B]"></i>
        <span class="text-[10px] text-[#F0B90B] font-semibold">首页</span>
      </a>
      <a href="clients.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
        <span class="text-[10px] text-[#848E9C]">客户</span>
      </a>
      <a href="events.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-bell text-[18px] text-[#848E9C]"></i>
        <span class="text-[10px] text-[#848E9C]">事件</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center gap-0.5">
        <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
        <span class="text-[10px] text-[#848E9C]">我的</span>
      </a>
    </div>
    <div style="height:env(safe-area-inset-bottom,34px)"></div>
  </div>

</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;

  // ---------- Data helpers ----------

  // 取本周净变化：weeks 最后两项之差
  function weekDelta(client) {
    var w = client.weeks;
    if (!w || w.length < 2) return 0;
    return w[w.length - 1] - w[w.length - 2];
  }

  // USDT 金额格式化
  // showSign=true：强制显示 +/-（用于变化量）
  function fmtUSDT(val, showSign) {
    var abs = Math.abs(val);
    var sign = showSign ? (val >= 0 ? '+' : '-') : (val < 0 ? '-' : '');
    var num = abs >= 1000000 ? (abs / 1000000).toFixed(1) + 'M'
            : abs >= 1000   ? (abs / 1000).toFixed(1) + 'K'
            :                  Math.round(abs).toString();
    return sign + '$' + num;
  }

  // 兼容旧调用
  function fmtWan(val) { return fmtUSDT(val, true); }

  // ---------- 排序 ----------

  // 1. 资沉前十：fMean 降序
  var top5Deposit = D.clients.slice().sort(function(a, b) {
    return (b.fMean || 0) - (a.fMean || 0);
  }).slice(0, 10);

  // 2. 本周入金前十：本周净变化 > 0，降序
  var top5Inflow = D.clients.slice().filter(function(c) {
    return weekDelta(c) > 0;
  }).sort(function(a, b) {
    return weekDelta(b) - weekDelta(a);
  }).slice(0, 10);

  // 3. 本周出金前十：本周净变化 < 0，绝对值降序
  var top5Outflow = D.clients.slice().filter(function(c) {
    return weekDelta(c) < 0;
  }).sort(function(a, b) {
    return Math.abs(weekDelta(b)) - Math.abs(weekDelta(a));
  }).slice(0, 10);

  // 4. 利润贡献前十：netContribution.total 降序
  var top5Profit = D.clients.slice().sort(function(a, b) {
    var va = (a.netContribution && a.netContribution.total) ? a.netContribution.total : 0;
    var vb = (b.netContribution && b.netContribution.total) ? b.netContribution.total : 0;
    return vb - va;
  }).slice(0, 10);

  // ---------- Render helpers ----------

  function rankBadge(rank) {
    var bg = rank === 1 ? '#F0B90B' : '#2E3440';
    var color = rank === 1 ? '#0B0E11' : '#848E9C';
    return '<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:' + bg + ';color:' + color + ';font-size:10px;font-weight:700;flex-shrink:0">' + rank + '</span>';
  }

  function buildRankRows(list, getVal, valColor) {
    return list.map(function(c, idx) {
      var border = idx < list.length - 1 ? 'border-bottom:1px solid #2E3440;' : '';
      var label = c.name ? c.uid + ' (' + c.name + ')' : c.uid;
      return '<a href="' + (c.detailHref || 'client-detail.html?uid=' + c.uid) + '" '
        + 'style="display:flex;align-items:center;gap:10px;padding:11px 16px;' + border + 'text-decoration:none">'
        + rankBadge(idx + 1)
        + '<span style="flex:1;font-size:13px;color:#EAECEF;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + label + '</span>'
        + '<span style="font-size:13px;font-weight:700;color:' + valColor + ';flex-shrink:0;margin-left:8px">' + getVal(c) + '</span>'
        + '</a>';
    }).join('');
  }

  // ---------- 智能推荐（占位） ----------

  function buildSmartSection() {
    var tabs = [
      { id: 'smart0', label: '推荐客户' },
      { id: 'smart1', label: '推荐事件' },
    ];

    var tabBar = tabs.map(function(t, i) {
      var active = i === 0;
      return '<button onclick="switchSmartTab(' + i + ')" id="smart-tab-' + i + '" '
        + 'style="flex:1;padding:10px 0;border:none;background:none;cursor:pointer;font-size:13px;font-weight:700;'
        + 'color:' + (active ? '#F0B90B' : '#848E9C') + ';'
        + 'border-bottom:2px solid ' + (active ? '#F0B90B' : 'transparent') + '">'
        + t.label + '</button>';
    }).join('');

    // 跟进中事件：从 sessionStorage follow_up_events 读取（前5条）
    var fuEvents = [];
    try { fuEvents = JSON.parse(localStorage.getItem('follow_up_events') || '[]'); } catch(e) {}
    var topTasks = fuEvents.filter(function(e) { return e.status === '跟进中'; }).slice(0, 5);

    var taskPanelHtml;
    if (topTasks.length === 0) {
      taskPanelHtml = '<div style="padding:24px 16px;text-align:center;color:#848E9C;font-size:13px">'
        + '暂无跟进事件<br><span style="font-size:11px">在客户详情中创建跟进事件后将显示在这里</span></div>';
    } else {
      taskPanelHtml = topTasks.map(function(ev) {
        var nick = localStorage.getItem('nickname_' + ev.client_uid) || '';
        var label = ev.client_uid + (nick ? ' (' + nick + ')' : '');
        return '<a href="follow-up-thread.html?fuId=' + ev.id + '" style="display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid #2E3440;text-decoration:none;active:opacity-70">'
          + '<div style="flex:1;min-width:0">'
          + '<div style="font-size:13px;color:#EAECEF;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (ev.title || '—') + '</div>'
          + '<div style="margin-top:3px;font-size:10px;color:#848E9C">' + label + '</div>'
          + '</div>'
          + '<i class="fa-solid fa-chevron-right" style="font-size:10px;color:#474D57;margin-top:3px;flex-shrink:0"></i>'
          + '</a>';
      }).join('');
    }

    var panels = [
      { content: '<div style="padding:24px 16px;text-align:center;color:#848E9C;font-size:13px">暂无推荐<br><span style="font-size:11px">将根据客户价值与沟通频率智能推荐</span></div>' },
      { content: taskPanelHtml },
    ].map(function(p, i) {
      return '<div id="smart-panel-' + i + '" style="display:' + (i === 0 ? 'block' : 'none') + '">'
        + p.content
        + '</div>';
    }).join('');

    return '<div style="margin:0 16px 12px">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'
      +   '<i class="fa-solid fa-sparkles" style="color:#F0B90B;font-size:12px"></i>'
      +   '<span style="font-size:13px;font-weight:600;color:#848E9C">智能推荐</span>'
      + '</div>'
      + '<div style="background:#1E2329;border-radius:12px;border:1px solid #2E3440;overflow:hidden">'
      + '<div style="display:flex;border-bottom:1px solid #2E3440">' + tabBar + '</div>'
      + panels
      + '</div>'
      + '</div>';
  }

  // ---------- 用户排名（4 Tab） ----------

  function buildRankSection() {
    var tabs = [
      { label: '资沉', color: '#F0B90B', sort: 'deposit',
        rows: buildRankRows(top5Deposit, function(c) { return fmtUSDT(c.fMean); }, '#EAECEF') },
      { label: '入金', color: '#0ECB81', sort: 'inflow',
        rows: buildRankRows(top5Inflow,  function(c) { return fmtWan(weekDelta(c)); }, '#0ECB81') },
      { label: '出金', color: '#F6465D', sort: 'outflow',
        rows: buildRankRows(top5Outflow, function(c) { return fmtWan(weekDelta(c)); }, '#F6465D') },
      { label: '利润', color: '#0ECB81', sort: 'profit',
        rows: buildRankRows(top5Profit,  function(c) {
          var t = (c.netContribution && c.netContribution.total) || 0;
          return fmtUSDT(t);
        }, '#0ECB81') },
    ];

    var tabBar = tabs.map(function(t, i) {
      var active = i === 0;
      return '<button onclick="switchRankTab(' + i + ')" id="rank-tab-' + i + '" '
        + 'data-color="' + t.color + '" '
        + 'style="flex:1;padding:10px 0;border:none;background:none;cursor:pointer;font-size:13px;font-weight:700;'
        + 'color:' + (active ? t.color : '#848E9C') + ';'
        + 'border-bottom:2px solid ' + (active ? t.color : 'transparent') + '">'
        + t.label + '</button>';
    }).join('');

    var panels = tabs.map(function(t, i) {
      return '<div id="rank-panel-' + i + '" style="display:' + (i === 0 ? 'block' : 'none') + '">'
        + t.rows
        + '</div>';
    }).join('');

    // 底部"查看更多"随 Tab 联动
    var firstTab = tabs[0];
    var moreFooter = '<a id="rank-more" href="clients.html?sort=' + firstTab.sort + '" '
      + 'style="display:flex;align-items:center;justify-content:center;gap:4px;'
      + 'padding:11px 16px;border-top:1px solid #2E3440;text-decoration:none;'
      + 'font-size:13px;font-weight:600;color:' + firstTab.color + '" '
      + 'data-sorts=\'' + JSON.stringify(tabs.map(function(t){ return t.sort; })) + '\' '
      + 'data-colors=\'' + JSON.stringify(tabs.map(function(t){ return t.color; })) + '\' '
      + 'data-labels=\'' + JSON.stringify(tabs.map(function(t){ return t.label; })) + '\'>'
      + '<span id="rank-more-label">查看更多' + firstTab.label + '</span>'
      + '<i class="fa-solid fa-chevron-right" style="font-size:10px"></i>'
      + '</a>';

    return '<div style="margin:0 16px 12px">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">'
      +   '<i class="fa-solid fa-chart-bar" style="color:#F0B90B;font-size:12px"></i>'
      +   '<span style="font-size:13px;font-weight:600;color:#848E9C;flex:1">用户排名</span>'
      +   '<span id="refresh-time" style="font-size:11px;color:#474D57">--:--</span>'
      + '</div>'
      + '<div style="background:#1E2329;border-radius:12px;border:1px solid #2E3440;overflow:hidden">'
      + '<div style="display:flex;border-bottom:1px solid #2E3440">' + tabBar + '</div>'
      + panels
      + moreFooter
      + '</div>'
      + '</div>';
  }

  // ---------- 注入页面 ----------

  document.getElementById('main-content').innerHTML =
    buildSmartSection()
  + buildRankSection();

  // ---------- Tab 切换 ----------

  window.switchSmartTab = function(idx) {
    [0, 1].forEach(function(i) {
      var active = i === idx;
      document.getElementById('smart-tab-' + i).style.color = active ? '#F0B90B' : '#848E9C';
      document.getElementById('smart-tab-' + i).style.borderBottomColor = active ? '#F0B90B' : 'transparent';
      document.getElementById('smart-panel-' + i).style.display = active ? 'block' : 'none';
    });
  };

  window.switchRankTab = function(idx) {
    [0, 1, 2, 3].forEach(function(i) {
      var active = i === idx;
      var btn = document.getElementById('rank-tab-' + i);
      var col = btn.getAttribute('data-color');
      btn.style.color = active ? col : '#848E9C';
      btn.style.borderBottomColor = active ? col : 'transparent';
      document.getElementById('rank-panel-' + i).style.display = active ? 'block' : 'none';
    });
    var more = document.getElementById('rank-more');
    var sorts  = JSON.parse(more.getAttribute('data-sorts'));
    var colors = JSON.parse(more.getAttribute('data-colors'));
    var labels = JSON.parse(more.getAttribute('data-labels'));
    more.href = 'clients.html?sort=' + sorts[idx];
    more.style.color = colors[idx];
    document.getElementById('rank-more-label').textContent = '查看更多' + labels[idx];
  };

  // ---------- Search ----------

  function getStatusLabel(c) {
    var rate = c.adjustedTrendRate;
    var pct = Math.abs(rate * 100).toFixed(1);
    if (rate <= -0.01) return { label: '流失 ' + pct + '%', bg: 'rgba(246,70,93,0.15)', color: '#F6465D' };
    if (rate >= 0.01)  return { label: '增长 ' + pct + '%', bg: 'rgba(14,203,129,0.15)', color: '#0ECB81' };
    return { label: '稳定', bg: 'rgba(132,142,156,0.15)', color: '#848E9C' };
  }

  function renderSearchResults(query) {
    var dropdown = document.getElementById('search-dropdown');
    var clearBtn = document.getElementById('search-clear');

    if (!query) {
      dropdown.classList.add('hidden');
      clearBtn.classList.add('hidden');
      return;
    }

    clearBtn.classList.remove('hidden');
    var q = query.toLowerCase();
    var matches = D.clients.filter(function(c) {
      return c.name.toLowerCase().indexOf(q) !== -1 || c.uid.toLowerCase().indexOf(q) !== -1;
    }).slice(0, 20);

    if (matches.length === 0) {
      dropdown.innerHTML = '<div class="text-center py-6 text-[13px] text-[#848E9C]">未找到匹配客户</div>';
      dropdown.classList.remove('hidden');
      return;
    }

    dropdown.innerHTML = matches.map(function(c) {
      var sl = getStatusLabel(c);
      return '<a href="client-detail.html?uid=' + c.uid + '" class="flex items-center justify-between px-4 py-3 border-b border-[#2E3440] last:border-0 active:bg-[#2B3139]">'
        + '<div class="min-w-0">'
        +   '<div class="flex items-center gap-2">'
        +     '<span class="text-[13px] font-medium text-[#EAECEF] truncate">' + c.name + '</span>'
        +     '<span class="text-[11px] text-[#474D57]">UID ' + c.uid + '</span>'
        +   '</div>'
        +   '<div class="flex items-center gap-2 mt-0.5">'
        +     '<span class="text-[12px] text-[#EAECEF]">' + c.depositDisplay + '</span>'
        +     '<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:' + sl.bg + ';color:' + sl.color + '">' + sl.label + '</span>'
        +   '</div>'
        + '</div>'
        + '<i class="fa-solid fa-chevron-right text-[10px] text-[#474D57] flex-shrink-0"></i>'
        + '</a>';
    }).join('');

    dropdown.classList.remove('hidden');
  }

  window.onSearchInput = function() {
    var query = document.getElementById('search-input').value.trim();
    renderSearchResults(query);
  };

  window.clearSearch = function() {
    document.getElementById('search-input').value = '';
    renderSearchResults('');
    document.getElementById('search-input').focus();
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('search-input').value = '';
      renderSearchResults('');
    }
  });

  // Clear search state on page load
  document.getElementById('search-input').value = '';
  document.getElementById('search-dropdown').classList.add('hidden');
  document.getElementById('search-clear').classList.add('hidden');

  // 刷新时间
  var now = new Date();
  var hh = String(now.getHours()).padStart(2, '0');
  var mm = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('refresh-time').textContent = '更新于 ' + hh + ':' + mm;

})();
</script>

</body>
</html>
