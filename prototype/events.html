<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sales Hub -- 事件中心</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hub-bg':         '#0B0E11',
            'hub-card':       '#1E2329',
            'hub-card-hover': '#2B3139',
            'hub-border':     '#2E3440',
            'hub-gold':       '#F0B90B',
            'hub-gold-text':  '#F8D33A',
            'hub-red':        '#F6465D',
            'hub-green':      '#0ECB81',
            'hub-blue':       '#4DA6FF',
            'hub-text':       '#EAECEF',
            'hub-muted':      '#848E9C',
            'hub-disabled':   '#474D57',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: #0B0E11; }
    ::-webkit-scrollbar { display: none; }
    html { background: #000; }
    html, body { width: 393px !important; margin: 0 auto !important; overflow-x: hidden; }
    .fixed-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 393px; }
    .filter-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filter-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-[#0B0E11] text-[#EAECEF]">
<div class="w-full">

  <!-- iOS Status Bar -->
  <div class="h-[44px] bg-[#0B0E11] flex items-center justify-between px-6 flex-shrink-0">
    <span class="text-[12px] font-semibold text-[#EAECEF]">9:41</span>
    <div class="flex items-center gap-1.5 text-[#EAECEF]">
      <i class="fa-solid fa-signal text-[12px]"></i>
      <i class="fa-solid fa-wifi text-[12px]"></i>
      <i class="fa-solid fa-battery-full text-[13px]"></i>
    </div>
  </div>

  <!-- Top Nav -->
  <div class="h-[52px] sticky top-0 z-20 bg-[#0B0E11] border-b border-[#2E3440] flex items-center justify-between px-4">
    <div class="w-[60px]"></div>
    <h1 class="text-[17px] font-bold text-[#EAECEF] tracking-wide">事件中心</h1>
    <div class="w-[60px]"></div>
  </div>

  <!-- Filter Pills -->
  <div class="filter-scroll px-4 py-3 flex gap-2" id="filter-bar">
    <button data-filter="全部" class="filter-pill active flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">全部</button>
    <button data-filter="待处理" class="filter-pill flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">待处理</button>
    <button data-filter="跟进中" class="filter-pill flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">跟进中</button>
    <button data-filter="已完成" class="filter-pill flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">已完成</button>
    <button data-filter="已忽略" class="filter-pill flex-shrink-0 px-3 py-1.5 rounded-full text-[12px] font-medium whitespace-nowrap transition-colors">已忽略</button>
  </div>

  <!-- Stats Summary -->
  <div id="stats-bar" class="px-4 py-2 flex items-center gap-1 text-[11px] text-[#848E9C]"></div>

  <!-- Event List -->
  <div id="event-list" class="pb-[100px]"></div>

</div>

<!-- Bottom Tab Bar -->
<div class="fixed-bar bg-[#0B0E11] border-t border-[#2E3440] z-30">
  <div class="flex items-center justify-around h-[56px]">
    <a href="home.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-house text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">首页</span>
    </a>
    <a href="clients.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-users text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">客户</span>
    </a>
    <a href="events.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-bell text-[18px] text-[#F0B90B]"></i>
      <span class="text-[10px] text-[#F0B90B] font-semibold">事件</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5">
      <i class="fa-solid fa-user text-[18px] text-[#848E9C]"></i>
      <span class="text-[10px] text-[#848E9C]">我的</span>
    </a>
  </div>
  <div class="h-[34px]"></div>
</div>

<script src="mock-data.js"></script>
<script>
(function() {
  var D = window.PROTOTYPE_DATA;

  var URGENCY_ORDER = { critical: 0, warning: 1, info: 2 };
  var TASK_COLORS = {
    '待处理': { bg: 'rgba(246,70,93,0.15)', text: '#F6465D' },
    '跟进中': { bg: 'rgba(77,166,255,0.15)', text: '#4DA6FF' },
    '已完成': { bg: 'rgba(14,203,129,0.15)', text: '#0ECB81' },
    '已忽略': { bg: 'rgba(132,142,156,0.15)', text: '#848E9C' }
  };

  function parseTimeAgo(s) {
    if (!s) return 9999;
    var m = s.match(/(\d+)/);
    var n = m ? parseInt(m[1], 10) : 9999;
    if (s.indexOf('分钟') !== -1) return n / 60;
    if (s.indexOf('小时') !== -1) return n;
    if (s.indexOf('天') !== -1) return n * 24;
    if (s.indexOf('周') !== -1) return n * 168;
    return 9999;
  }

  // All events sorted by time (newest first)
  var allEvents = D.events.slice().sort(function(a, b) {
    var aH = (typeof a.age_hours === 'number') ? a.age_hours : parseTimeAgo(a.time_ago);
    var bH = (typeof b.age_hours === 'number') ? b.age_hours : parseTimeAgo(b.time_ago);
    return aH - bH;
  });

  var currentFilter = '全部';

  function filterEvents(state) {
    if (state === '全部') return allEvents;
    return allEvents.filter(function(e) { return e.task_state === state; });
  }

  function renderStats(filtered) {
    var total = filtered.length;
    var pending = 0;
    var inProgress = 0;
    filtered.forEach(function(e) {
      if (e.task_state === '待处理') pending++;
      if (e.task_state === '跟进中') inProgress++;
    });

    document.getElementById('stats-bar').innerHTML =
      '共 ' + total + ' 个事件 · '
      + '<span class="text-[#F6465D]">' + pending + ' 待处理</span> · '
      + '<span class="text-[#4DA6FF]">' + inProgress + ' 跟进中</span>';
  }

  function renderEventList(filtered) {
    var container = document.getElementById('event-list');

    if (filtered.length === 0) {
      container.innerHTML =
        '<div class="flex flex-col items-center justify-center py-20 text-[#848E9C]">'
        + '<i class="fa-solid fa-inbox text-[40px] mb-3 text-[#474D57]"></i>'
        + '<span class="text-[14px]">没有符合条件的事件</span>'
        + '</div>';
      return;
    }

    container.innerHTML = filtered.map(function(evt) {
      var tc = TASK_COLORS[evt.task_state] || TASK_COLORS['已忽略'];
      return '<a href="event-thread.html?id=' + evt.id + '" class="block px-4 py-3 border-b border-[#2E3440] active:bg-[#2B3139]">'
        + '<div class="flex items-center gap-2 mb-1">'
        +   '<span class="w-2 h-2 rounded-full flex-shrink-0" style="background:' + evt.color + '"></span>'
        +   '<span class="text-[13px] font-medium text-[#EAECEF]">' + evt.client_name + '</span>'
        +   '<span class="text-[12px] text-[#848E9C]">&middot;</span>'
        +   '<span class="text-[12px] text-[#848E9C]">' + evt.type + '</span>'
        +   (evt.sub_type ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-[#2B3139] text-[#848E9C]">' + evt.sub_type + '</span>' : '')
        + '</div>'
        + '<div class="flex items-center justify-between">'
        +   '<div class="flex items-center gap-2">'
        +     '<span class="text-[14px] font-bold" style="color:' + evt.color + '">' + evt.amount_display + '</span>'
        +     '<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:' + tc.bg + ';color:' + tc.text + '">' + evt.task_state + '</span>'
        +   '</div>'
        +   '<span class="text-[10px] text-[#848E9C]">' + evt.time_ago + '</span>'
        + '</div>'
        + '</a>';
    }).join('');
  }

  function updatePillStyles() {
    var pills = document.querySelectorAll('.filter-pill');
    pills.forEach(function(pill) {
      var isActive = pill.getAttribute('data-filter') === currentFilter;
      if (isActive) {
        pill.style.background = '#F0B90B';
        pill.style.color = '#0B0E11';
      } else {
        pill.style.background = '#1E2329';
        pill.style.color = '#848E9C';
      }
    });
  }

  function render() {
    var filtered = filterEvents(currentFilter);
    updatePillStyles();
    renderStats(filtered);
    renderEventList(filtered);
  }

  // Bind filter pill clicks
  document.getElementById('filter-bar').addEventListener('click', function(e) {
    var pill = e.target.closest('.filter-pill');
    if (!pill) return;
    currentFilter = pill.getAttribute('data-filter');
    render();
  });

  // Initial render
  render();
})();
</script>

</body>
</html>
